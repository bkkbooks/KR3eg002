body:
  text: 卷之二春傷於風大意內經云春傷於風謂當春厥陰行令風木司權之候傷乎風也夫風邪之為病有輕重之分焉輕則曰冒重則曰傷又重則曰中如寒熱有汗是風傷衛分名曰傷風病也鼻塞咳嗽是風冒於表名曰冒風病也突然昏倒不省人事是風中於里名曰中風病也當分輕重淺深而治之且風為六氣之領袖能統諸氣如當春尚有餘寒則風中遂夾寒氣有感之者是為風寒其或天氣暴熱則風中遂夾熱氣有感之者是為風熱其或春雨連綿地中潮濕上泛則風中遂夾濕氣有感之者是為風濕倘春應溫而反寒非其時而有其氣有患寒熱如傷寒者是為寒疫此七者皆春令所傷之新邪感之即病與不即病之伏氣相去天淵當細辨之傷風傷風之病即仲景書中風傷衛之證也諸家已詳可毋細論耳然其初起之大概亦當述之夫風邪初客於衛頭痛發熱汗出惡風脈象浮緩者此宜解肌散表法治之經曰傷於風者頭先受之故有頭痛之證風並於衛營弱衛強故有發熱汗出之證汗出則腠疏故有惡風之證脈浮主表緩主風故用解肌散表之法以祛衛外之風倘脈浮緊發熱汗不出者不可與也當須識此勿令誤也若誤用之必生他變然則當按仲景法治之世俗每見鼻塞咳嗽遂謂傷風而不知其為冒風也冒風之病詳在下篇冒風冒風者風邪冒於皮毛而未傳經入里也汪訒庵曰輕為冒重為傷又重則為中可見冒風之病較傷風為輕淺耳近世每以冒風之病指為傷風不知傷風之病即仲景書中風傷衛之證也今謂冒風乃因風邪覆冒皮毛皮毛為肺之合故見惡風微熱鼻塞聲重頭痛咳嗽脈來濡滑而不浮緩此皆春時冒風之證據與風傷衛之有別也宜乎微辛輕解法治之倘或口渴喜飲是有伏氣內潛如脈數有汗為風溫脈緊無汗為春溫務宜區別而治庶幾無誤或問曰曾見靈胎書中有頭痛發熱咳嗽涕出俗語所謂傷風非仲聖傷寒論中之傷風也今先生竟以風傷衛分為傷風與靈胎相悖究竟誰是誰非曰靈胎所論之傷風即是書之冒風是書之傷風即仲聖書中風傷衛分之傷風據理而論當遵聖訓為是俗語為非曰觀先生所論之冒風較傷風為輕靈胎所論之傷風為至難治之疾一輕一重何其相反曰豐謂風邪初冒皮毛其證輕而且淺不難數服而瘥故曰輕也彼謂邪由皮毛而入於肺經年累月病機日深變成癆怯故曰至難治之疾也一論初起一論病成何相反之有中風中風之病如矢石之中人驟然而至也古人謂類中為多真中極少是書專為六氣而設故論真中為亟耳觀夫卒中之病在春中風為多在夏中暑為多在秋中濕為多在冬中寒為多是以中風之病詳於春令蓋風之中於人也忽然昏倒不省人事或喎斜舌強痰響喉間等證當其昏倒之時急以通關散取嚏有則可治無則多死口噤者用開關散擦牙軟之痰涎壅盛用諸吐法湧之此乃急則治標之法再考諸賢論治惟金匱分為四中最為確當堪為後學準繩一曰中經一曰中絡一曰中腑一曰中臟如左右不遂筋骨不用邪在經也當用順氣搜風法治之口眼喎斜肌膚不仁邪在絡也當用活血祛風法治之昏不識人便溺阻隔邪在腑也當用宣竅導痰法益以百順丸治之神昏不語唇緩涎流邪在臟也亦宜此法佐以牛黃清心丸治之如口開則心絕目合則肝絕手撒則脾絕鼾睡則肺絕遺溺則腎絕又有搖頭上竄汗出如油脈大無倫或小如纖皆不可治或問古人治中風每有中腑中臟中血脈之分中腑以小續命湯中臟以三化湯中血脈以大秦艽湯今既曰遵金匱之四中然與原文不符合者何曰此遵金鑑訂正之文諒無有誤耳曰論中又謂真中極少類中為多究竟真類何以別耶曰忽然昏倒真類皆有之證然類中者但無口眼喎斜不仁不用等證也曰真類既分不知類中有幾曰類中之病有八也一因氣虛之體煩勞過度清氣不升忽然昏冒為虛中也治宜補氣一因氣實之人暴怒氣逆忽然昏倒為氣中也治宜順氣一因七情過極五志之火內發卒然昏倒無知為火中也治宜涼膈一因過飽感受風寒或因惱怒氣鬱食阻忽然昏厥為食中也治宜宣消一因登塚入廟冷屋棲遲邪氣相侵卒然妄語頭面青黑昏不知人為惡中也治宜辟邪所有暑中論在卷四濕中論在卷六寒中論在卷八此八者皆稱為類中也程曦曰是書以金匱之四中為準繩而不以內經偏枯風痱風懿風痹四者為綱領何思之良久恍然有會蓋偏枯者半身不遂也風痱者四肢不舉也風懿者卒然不語也風痹者遍身疼痛也竊謂偏枯風痱風懿皆屬中風而風痹一病斷斷不能混入恐後學者以痹為中所以宗後聖而未宗先聖職是故耳江誠曰諸書以半身不遂分出左癱右瘓不用不仁蓋謂癱者坦也筋脈弛縱坦然不收瘓者渙也氣血渙散筋骨不用又謂右為不用左為不仁其實癱與不仁即論中之邪中乎絡也瘓與不用即論中之邪中乎經也今以此四中括之真所謂要言不煩矣風寒經云風為百病之長也以其能統諸氣耳夫春令之風多兼溫氣夏令之風多兼暑氣秋令之風多兼濕氣冬令之風多兼寒氣今風寒之病不論於冬而論於春令者蓋以風為重也如冬令之風寒以寒為重可知若此別之在春令辛溫不宜過劑在冬令辛熱亦可施之所以前人用藥宜分四時洵非謬也是論風寒者緣於初春尚有餘寒所至之風風中夾寒人感之者即寒熱頭痛汗出不多或咳嗽或體痠脈來浮大或兼弦緊是也宜以辛溫解表法治之然此病較當春之寒疫稍輕較冬令之傷寒則更輕矣治之得法不難一二劑而瘳但當審其兼證為要如兼痰者益以苓夏兼食者加入神楂隨證減增庶幾有效風熱春應溫而過熱是為非時之氣所感之風風中必夾熱氣故名風熱病耳此不但與風溫為兩途抑且與熱病為各異蓋風溫熱病皆伏氣也風熱之邪是新感也其初起寒微熱甚頭痛而昏或汗多或咳嗽或目赤或涕黃舌起黃苔脈來浮數是也當用辛涼解表法為先倘惡寒頭痛得瘥轉為口渴喜飲苔色黃焦此風熱之邪已化為火宜改清熱保津法治之倘或舌燥昏狂或發斑發疹當仿熱病門中之法治之或問曰嘗見昔賢所謂春應溫而反寒是為非時之氣今先生謂春應溫而過熱亦為非時之氣昔今之論何其相反請詳悉之答曰昔賢之論固非有謬豐之鄙論亦有所本今謂春應溫而過熱即金匱所謂至而太過禮記所謂春行夏令也昔賢謂春應溫而反寒即金匱所謂至而不去禮記所謂春行秋令也風濕風濕之病其證頭痛發熱微汗惡風骨節煩疼體重微腫小便欠利脈來浮緩是也羅謙甫云春夏之交人病如傷寒為風濕證也宜用五苓散自愈由是觀之風濕之邪多傷於太陽者不待言矣宜用兩解太陽法疏其膀胱之經複利其膀胱之腑也如風勝者多用羌防濕勝者多加苓澤陰虛之體脈中兼數宜加黃柏車前陽虛之體脈內兼遲宜入戟天附片醫者總宜分其風勝濕勝辨其陰虛陽虛庶無貽誤喻嘉言曰風濕之中人也風則上先受之濕則下先受之俱從太陽膀胱而入風傷其衛濕留關節風邪從陽而親上濕邪從陰而親下風邪無形而居外濕邪有形而居內上下內外之間邪相搏擊故顯汗出惡風短氣發熱頭痛骨節煩疼身重微腫等證此固宜從汗解第汗法與常法不同貴徐不貴驟驟則風去濕存徐則風濕俱去也豐按論風濕惟嘉言先生為白眉明出上下表里可謂批卻導竅矣更妙論汗之法貴徐不貴驟此五字誠為治風濕之金針學者不可以其近而忽之也寒疫叔和序例曰從春分以後至秋分節前天氣暴寒者皆為時行寒疫也考之金鑑又謂春應溫而反寒名曰寒疫據此而論春有是病而夏秋無是病也其實夏令之寒是為陰暑之病秋月之寒是為秋涼燥氣此分明夏秋不病寒疫當宗金鑑之訓寒疫在乎春令也蓋疫者役也若役使然大概眾人之病相似者皆可以疫名之此又與瘟疫之疫相懸霄壤須知瘟疫乃天地之厲氣寒疫乃反常之變氣也其初起頭痛身疼寒熱無汗或作嘔逆人迎之脈浮緊者宜用辛溫解表法治之觀此見證與冬令傷寒初客太陽無異因在春令所以不名傷寒又因眾人之病相同所以名為寒疫然其治法又與傷寒相去不遠矣如有變證可仿傷寒法治之或問曰先生謂夏令之寒是為陰暑之病倘未交小暑大暑之令而受立夏小滿芒種夏至之寒可以名寒疫否答曰可也昔賢謂夏應熱而反涼是為非時之氣若果見證與寒疫相合不妨用寒疫之方此所謂超乎規矩之外仍不離乎規矩之中也擬用諸法解肌散表法治風邪傷衛頭痛畏風發熱有汗等證嫩桂枝白芍藥粉甘草生薑大棗水煎服此仲景之桂枝湯治風傷衛之證也舒馳遠曰桂枝走太陽之表專驅衛分之風白芍和陰護營甘草調中解熱姜辛能散棗甘能和又以行脾之津液而調和營衛者也微辛輕解法治冒風之證頭微痛鼻塞咳嗽紫蘇梗一錢五分薄荷梗一錢牛蒡子一錢五分苦桔梗一錢五分栝蔞殼二錢廣橘紅一錢去白水煎服凡新感之風邪惟冒為輕只可以微辛輕劑治之夫風冒於皮毛皮毛為肺之合故用紫蘇薄荷以宣其肺皆用梗而不用葉取其微辛力薄也蓋風為陽邪極易化火辛溫之藥不宜過用所以佐牛蒡之辛涼桔梗之辛平以解太陰之表及蔞殼之輕鬆橘紅之輕透以暢肺經之氣氣分一舒則冒自解矣順氣搜風法治風邪中經左右不遂筋骨不用臺烏藥一錢陳橘皮一錢五分天麻一錢紫蘇一錢五分甘菊花一錢參條二錢炙甘草五分宣木瓜一錢加桑枝三錢為引水煎服此師古人順風勻氣散之法以治風邪中經之病也香岩曰經屬氣所以進烏藥陳皮以順其氣天麻蘇菊以搜其風經曰邪之所湊其氣必虛故佐參草輔其正氣更佐木瓜利其筋骨桑枝遂其左右之用也活血祛風法治風邪中絡口眼喎斜肌膚不仁全當歸三錢酒炒川芎一錢五分白芍一錢酒炒秦艽一錢五分冬桑葉三錢雞血藤膠一錢加橘絡二錢煎服此治風邪中絡之法也香岩云絡屬血故用雞藤川芎以活其血即古人所謂治風須養血血行風自滅也經曰營虛則不仁故用當歸白芍補益營血而治不仁也秦艽為風藥中之潤品散藥中之補品且能活血榮筋桑葉乃箕星之精箕好風風氣通於肝最能滋血去風斯二者誠為風中於絡之要劑更佐橘絡以達其絡絡舒血活則風邪自解而喎斜自愈矣宣竅導痰法治風邪中臟中腑及瘧發昏倒等證遠志一錢去心石菖蒲五分天竺黃二錢杏仁三錢去皮尖研栝蔞實三錢研殭蠶三錢炒皂角炭五分水煎溫服風邪中於臟腑者宜施此法其中乎經可以順氣搜風其中乎絡可以活血祛風今中臟腑無風藥可以施之可見中臟之神昏不語唇緩涎流中腑之昏不識人便溺阻隔等證確宜宣竅導痰方中天竺遠菖宣其竅而解其語杏仁蔞實導其痰且潤其腸殭蠶化中風之痰皂角通上下之竅此一法而兩用也尤恐其力之不及中腑更佐以百順中臟更佐以牛黃按法用之庶無差忒辛溫解表法見前辛涼解表法見前清熱保津法見前兩解太陽法治風濕之證頭痛身重骨節煩疼小便欠利桂枝一錢五分羌活一錢五分防風一錢五分茯苓三錢澤瀉一錢五分生米仁四錢苦桔梗一錢五分流水煎服斯法也乃兩解太陽風濕之邪風邪無形而居外所以用桂枝羌防解其太陽之表俾風從汗而出濕邪有形而居內所以用苓澤米仁滲其膀胱之裡俾濕從溺而出更以桔梗通天氣於地道能宣上覆能下行可使風濕之邪分表裡而解也嘉言雖謂風濕之病固宜從汗而解然風勝於濕者則濕可隨風去倘濕勝於風者則宜此法治之備用成方海藏神朮散治外感風寒發熱無汗蒼朮防風甘草加生薑蔥白煎服香蘇飲治四時感冒風寒頭痛發熱或兼內傷胸悶咳逆香附紫蘇陳皮甘草加薑蔥煎傷食加砂曲咳嗽加桑杏有痰加苓夏頭痛加芎芷有汗加桂枝無汗加麻黃參蘇飲治外感內傷發熱咳嗽傷風泄瀉等證人參紫蘇茯苓陳皮半夏甘草枳殼桔梗前胡乾葛木香加薑棗煎外感多者去棗加蔥白肺中有火去人參加杏仁桑皮金沸草湯治肺經傷風頭目昏痛咳嗽多痰金沸草即旋覆花用絹包煎製半夏茯苓前胡荊芥細辛甘草加薑棗煎如胸悶加枳殼桔梗有熱加柴胡黃芩頭痛加川芎桂枝湯治風傷衛陽浮而陰弱發熱頭痛自汗惡風鼻鳴乾嘔等證藥味見解肌散表法豐按神朮散香蘇散皆治風寒之輕證也重則不可恃耳參蘇飲乃治氣虛之外感稍壯者減參可也金沸草湯治肺經之傷風桂枝湯治衛分之傷風此皆疏散之方施治有別弗宜混用通關散治中風不省人事南星皂角細辛薄荷生半夏共為細末吹入鼻中有嚏可治無嚏難治開關散治中風口噤烏梅肉上冰片生南星為末擦牙其噤可開此二方乃救暴中之急預當備之小續命湯治中風不省人事半身不遂口眼喎斜語言蹇澀及剛柔二痙防風桂枝麻黃杏仁川芎白芍人參甘草黃芩防己附子加薑棗煎服三化湯治中風邪氣作實二便不通羌活大黃厚朴枳實水煎溫服大秦艽湯治中風手足不能運掉舌強不能言語風邪散見不拘一經者秦艽石膏當歸白芍川芎生地熟地白朮茯苓甘草黃芩防風羌活獨活白芷細辛水煎溫服烏藥順氣散治中風遍身頑麻骨節疼痛步履艱難語言蹇澀口眼喎斜喉中氣急有痰烏藥橘紅麻黃川芎白芷殭蠶枳殼桔梗薑炭炙草加薑蔥煎順風勻氣散治中風半身不遂口眼喎斜烏藥沉香青皮木瓜白芷天麻蘇葉人參白朮甘草加生薑煎服牽正散治中風口眼喎斜無他證者白附子殭蠶全蠍等分為末每服二錢酒調下豐按以上諸方皆治真中之病若東垣所謂煩勞過度清氣不升而中者丹溪所謂濕熱生痰痰氣上冒而中者河間所謂七情過極五志之火內發而中者此皆為類中之病慎毋誤投黃耆五物湯治風痱身無痛半身不遂手足無力不能動履者久久服之自見其功炙黃耆炒白芍嫩桂枝加薑棗煎服防風黃耆湯治中風不能言脈遲而弱者防風黃耆水煎溫服豐按此二方皆用黃耆是治氣虛之體患中風之病也非腎虛不涵肝木木動生風而發眩僕之虛風可比務宜分別而治庶不齟齬防風通聖散治一切風寒暑濕飢飽勞役內外諸邪所傷及丹斑癮疹等證防風荊芥麻黃桔梗連翹梔炭黃芩薄荷大黃芒硝石膏滑石白朮甘草當歸白芍川芎加生薑蔥白煎豐按此方是河間所制主治甚多不能盡述其藥味表裡氣血皆備醫者不能拘守成方務宜臨時權變本方除大黃芒硝名雙解散汪訒庵曰麻防荊薄川芎以解表芩梔膏滑連翹以解里復有歸芍以和血甘桔白朮以調氣故曰雙解柴葛解肌湯治太陽陽明少陽合病頭目眼眶痛鼻乾不得眠寒熱無汗脈象微洪或兼弦柴胡葛根羌活白芷黃芩赤芍桔梗甘草石膏加薑棗煎服金鑑云此方陶華所制以代葛根湯凡四時太陽陽明少陽合病之輕證均宜此湯加減治之如無太陽證者減羌活無少陽證者減柴胡下利減石膏以避裡虛嘔逆加半夏以降里逆蘇羌飲治寒疫有效並治傷風傷寒可代麻桂十神之用紫蘇羌活防風陳皮淡豉生薑蔥白豐按是方乃劉松峰所制治寒疫之功頗捷倘豐之辛溫解表法未獲效者可繼此方堪為接應之兵也慎毋忽諸臨證治案冒風輕證不慎口食轉重城西孫某感冒風邪豐用微辛輕解法加杏仁象貝治之服二劑復來趕請謂方藥無靈病忽益劇息賁胸閉鼻衄如泉即往診之寸脈皆大沉按滑數而來豐曰此風痰壅閉於肺化火劫絡之證也方中並無補劑何得加閉又無熱藥何得動衄詢其日昨所食之物乃火酒下雞夫雞乃關風之物酒為助火之物宜乎增劇無怪方藥遂用金沸草湯去細辛荊芥加葶藶杏仁降肺氣以開其閉黃芩梔炭清血熱而止其衄連服三煎即中病機若以楂肉雞金消其積葛花枳椇解其酲便是刻舟求劍矣風邪中絡城西馬某之母望八高年素常輕健霎時暴蹶口眼喎斜左部偏枯形神若塑切其脈端直而長左三部皆兼澀象豐曰此血氣本衰風邪乘虛中絡當遵古人治風須治血血行風自滅之法於是遂以活血祛風法加首烏阿膠天麻紅棗治之連服旬余稍為中窾復診脈象不甚弦而小澀左肢略見活動口眼如常神氣亦清爽矣惟連宵少寐睡覺滿口焦乾據病勢已衰大半但肝血腎液與心神皆已累虧姑守舊方除去秦艽桑葉白芍天麻加入枸杞蓯蓉地黃龍眼又服十數劑精神日復起居若舊矣中風急證南鄉余某年將耳順形素豐肥晨起忽然昏倒人事無知口眼喎斜牙關緊閉兩手之脈皆浮滑此為真中風也誠恐痰隨風湧耳令購蘇合香丸未至痰聲遂起急以開關散先擦其齦隨化蘇合香丸頻頻灌下少焉痰如鼎沸隔垣可聞舉家驚惶索方求救又令以鵝翎向喉內蘸痰痰忽湧出約有盈碗人事略清似有軟倦欲寐之狀屏去房內諸人待其寧靜而睡鼻有微鼾膚有微汗稍有痰聲頃間又一醫至遂謂鼾聲為肺絕汗出為欲脫不可救也即拂衣而去豐思其體頗實正未大虛汗出微微諒不至脫痰既湧出諒不至閉詢其向睡亦有鼾聲姑以宣竅導痰法加東參薑汁治之從容灌下直至二更時分忽聞太息一聲呼之遂醒與飲米湯牙關似覺稍松詰其所苦又有垂頭欲睡之態即令弗擾聽其自然依舊鼾聲而寐汗出周身至次日黎明甫醒皮膚汗減痰聲亦平口眼亦稍端正復診其脈滑而不浮似乎風從微汗而去痰尚留滯於絡也繼用茯神柏子養心收汗橘絡半夏舒絡消痰加穭豆桑葉以搜餘風遠志菖蒲以宣清竅更佐參甘輔正蘇合開痰本末兼醫庶幾妥當閤家深信一日連嘗二劑至第五朝諸恙皆減飲食日漸進矣中風脫證城中鄭某年屆古稀倏然昏僕左肢不遂肌膚不仁無力而癱舌強言蹇郡中醫士或專用補益或專以疏風或開竅消痰或標本兼理咸未中病迨邀豐診脈小如纖汗下如雨喘急遺溺神識昏蒙豐曰脫證見矣不可挽也乃郎再四求治念其孝心純篤勉存一法用高麗人參五錢附片三錢薑汁一匙令濃煎頻頻服之又迎他醫亦系參附為君延至三天果歸大暮真中死證北野賀某之妻陡然昏倒口目歪斜神識朦朧左肢不遂牙關緊閉脈大無倫但其鼾聲似睡分明肺絕之徵謂其婿曰死證已彰不可救也復延他醫診治終不能起程曦曰觀前之鄭案至於汗多喘急遺溺神昏脈小如纖知為脫證此案神昏牙閉鼻息如鼾脈大無倫知為絕證脫絕之證已顯死期可必矣思吾師課徒之心甚苦書中輕案重案以及死案一概詳之未始非臨證之一助也風濕兩感海昌濮某之媳孤幃有數載矣性情多郁鬱則氣滯偶沾風濕遂不易解始則寒熱體疼繼則遍身浮腫述服數方僉未中肯豐知其體素虧剝削之方似難浪進姑以兩解太陽法去米仁澤瀉二味白茯用皮再加陳皮厚朴香附鬱金治之服二劑稍有汗出寒熱已無浮腫略消下體仍甚思前賢有上腫治風下腫治濕之說姑照舊法除去羌活更佐車椒巴戟連嘗五劑始獲稍寬後用調中化濕之方醫治旬余得全瘥矣風濕誤為風溫須江毛某販柴來城忽然患病曾延醫治乏效來迓於豐見其所服之方皆作風溫論治診其脈弦而緩考其證寒熱身疼舌苔雖黃黃而滋膩口雖作燥不甚引飲豐曰此屬風濕時邪實非風溫伏氣就目前厥陰主氣而論風溫之病似矣不審今春淫雨纏綿地中之濕上泛隨時令之風而襲人遂成諸證況無咳嗽口渴又無滑數之脈顯然非風溫也宜從風濕立法以平胃神術蔥豉三方合為一劑連進數服而安產後寒疫豫章邱某之室分娩三朝忽患時行寒疫曾經醫治有守產後成方用生化者有遵丹溪之法用補虛者僉未中的而熱勢益張邀豐診之脈似切繩轉索舌苔滿白壯熱汗無豐曰此寒疫也雖在產後亦當辛散為治擬用辛溫解表法去桔梗加芎芷乾薑黑荊穭豆囑服二劑則熱遂從汗解復用養營滌汙之法日漸而瘳時行寒疫城中王某之女剛針黹時偶覺頭痛畏寒身熱無汗延醫調治混稱時證遂用柴葛解肌未效又更醫治妄謂春溫伏氣用蔞蕤湯又未中病始來商治於豐按其脈人迎緊盛舌白而浮口不乾渴豐曰春應溫而反寒寒氣犯之是為時行寒疫前二方未臻效者實有礙乎膏芩幸同羌葛用之尚無大害據愚意法當專用辛溫弗入苦寒自效即以松峰蘇羌飲加神麯豆卷治之令其輕煎溫服謹避風寒覆被安眠待其汗解服一煎果有汗出熱勢遂衰繼服一煎諸疴盡卻矣
