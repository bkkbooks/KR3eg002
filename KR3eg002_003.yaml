body:
  text: 卷之三春傷於風夏生飧泄大意經謂春傷於風者乃即病之新感也即二卷中傷風冒風之證今謂春傷於風夏生飧泄者此不即病之伏氣也蓋風木之氣內通乎肝肝木乘脾脾氣下陷日久而成泄瀉經又云邪氣留連乃為洞泄此亦言伏氣為病可見飧泄洞泄皆由伏氣使然然有寒瀉火瀉暑瀉濕瀉痰瀉食瀉雖不因乎伏氣又不得不並詳之蓋飧泄則完穀不化洞泄則直傾於下寒瀉則脈遲溺白腹中綿痛火瀉則脈數溺赤痛一陳瀉一陳又有煩渴面垢為暑瀉胸痞不渴為濕瀉或時瀉或時不瀉為痰瀉噯氣作酸瀉下腐臭為食瀉泄瀉之病盡於斯矣靈樞又云春傷於風夏生後泄腸澼腸澼者古之痢名也痢有風寒熱濕噤口水穀休息五色之分均宜辨治風痢者似腸風下血而有痛墜寒痢者下稀水而清腥腹中痛甚熱痢者如魚腦而稠黏窘迫而痛濕痢者色如豆汁胸悶腹疼又有下痢不食或嘔不能食名噤口痢糟粕膿血雜下者名水穀痢時發時止者名休息痢五色膿血相混而下名五色痢痢證多端治宜分別復揣夏生後泄腸澼之訓是獨指風痢而言其餘之痢在夏為少在秋為多而吾醫者又弗可膠於句下耳飧泄推飧泄致病之因乃風邪也木勝也寒氣也脾虛也伏氣也內經云春傷於風夏生飧泄又云久風為飧泄據此而論因風邪致病又云厥陰之勝腸鳴飧泄又云歲木太過民病飧泄據此而論因木勝致病又云胃中寒則腹脹腸中寒則飧泄據此而論因寒氣致病又云脾病者虛則腹滿腸鳴飧泄食不化據此而論因脾虛致病又云虛邪之中人也留而不去傳舍於腸胃多寒則腸鳴飧泄食不化多熱則溏出糜據此而論因伏氣致病總而言之良由春傷於風風氣通於肝肝木之邪不能條達鬱伏於脾土之中中土虛寒則風木更勝而脾土更不主升反下陷而為泄也故經又謂清氣在下則生飧泄所以當春升發之令而不得發交夏而成斯證矣其脈兩關不調或弦而緩腸鳴腹痛完穀不消宜以培中瀉木法治之如尺脈沉遲按之無力乃屬下焦虛寒寒則不能消穀而成是病宜以補火生土法治之倘脈細小而遲手足寒者不易治也勉以暖培卑監法治之倘日久穀道不合或肛門下脫乃元氣下陷也急以補中收脫法治之飧泄之病屬虛者多屬實者少如執治瀉不利小便之偏必致不起悲夫或問曰諸賢論飧泄皆謂濕兼風也又謂濕多成五瀉又謂治濕不利小便非其治也今先生論中一無濕字反謂偏利小便必致不起能不違悖古人乎答曰是病專論春傷於風之伏氣所以論風而未及濕如有濕邪相混即有濕之見證辨之明確始可佐之通利蓋飧泄下利清穀乃屬脾土虛寒不能運化而下陷倘執通利趨下之方豈非落井而又下石哉通篇皆本內經何違悖之有又問曰先生謂飧泄乃屬脾土虛寒所以下利清穀殊未見醫統又云胃火由火性急速傳化失常為邪熱不殺穀也指掌亦謂完穀不化以火治之由是觀之又與先生之論不相符節究竟以前人為火乎抑亦以先生為寒乎答曰豐按內經而推飧泄屬虛者固矣醫統指掌皆謂為火者其實即諸瀉中之火瀉也須知寒與火極易明辨如脈數苔黃小溲熱赤即是屬火之瀉否則便是虛寒問者首肯而退洞泄經云春傷於風夏生飧泄邪氣留連乃為洞泄蓋因風木之邪留連既久木氣剋土則倉廩不藏而為洞泄可見是病亦由伏氣所致也李士材曰洞泄一名濡泄濡泄因於濕勝此病非但因伏氣內留中氣失治亦有濕氣相兼致病也考其脈象軟緩乏力或關脈兼弦身重神疲肢體懈怠下利清穀小便短赤是也宜乎培中瀉木法加蒼朮澤瀉治之經曰腎脈小甚為洞泄蓋腎為胃關因腎虛失閉藏之職伏邪乘虛而深陷也宜乎補火生土法加煨葛荷葉治之總之脾虛以補中為先腎虛以固下為亟風勝佐之疏透濕勝佐之滲利臨證之頃神而明之則旋踵之禍庶幾免焉程曦曰觀飧泄洞泄之論總不離乎木氣剋土故治洞泄皆仿飧泄之法然其中之虛實當細別之蓋飧泄因脾虛為多所以完穀不化洞泄因濕勝為多所以體重溺紅屬脾虛者不宜偏利屬濕勝者不宜偏補斯二者皆當審其虛實而分治之寒瀉寒瀉者因寒而致瀉也不比飧泄洞泄皆屬春傷於風之伏氣伏氣之瀉前二篇已詳晰矣所有寒火暑濕痰食等瀉雖不因乎伏氣然又不可不詳蓋寒瀉致病之原良由感受乎寒寒氣內襲於脾脾胃受寒則陽虛虛則不司運用清陽之氣不主上升反下陷而為便瀉故所下澄沏清冷儼如鴨糞腹中綿痛小便清白脈來緩怠近遲此宜暖培卑監法去西潞益智加木香楂炭治之書又云寒瀉即鶩瀉以其瀉出如鴨鶩之糞也又謂鴨溏者濕兼寒也若有濕證所著宜佐化濕之藥隨其證而加減可也火瀉火瀉即熱瀉也經云暴注下迫皆屬於熱暴注者卒暴注瀉也下迫者後重裡急也其證瀉出如射糞出穀道猶如湯熱肛門焦痛難禁腹內鳴響而痛痛一陳瀉一陳瀉復澀滯也非食瀉瀉後覺寬之可比脈必數至舌必苔黃溺必赤澀口必作渴此皆火瀉之證也張介賓曰熱勝則瀉而小水不利者以火乘陰分水道閉塞而然宜用通利州都法去蒼朮加芩連治之大概暴注新病者可利實熱閉澀者可利形氣強壯者可利小腹脹滿者可利今泄瀉屬火而不寒屬實而不虛故可用通利之法如久病陰虧者氣虛屬寒者皆不可利醫者不可以不知也暑瀉長夏暑濕之令有人患泄瀉者每多暑瀉也夫暑熱之氣不離乎濕蓋因天之暑熱下逼地之濕熱上騰人在氣交之中其氣即從口鼻而入直擾中州脾胃失消運之權清濁不分上升精華之氣反下降而為便瀉矣考暑瀉之證瀉出稠黏小便熱赤脈來濡數其或沉滑面垢有汗口渴喜涼通體之熱熱似火炎宜以清涼滌暑法用卻燔蒸譬如商飈颯然倏動則炎𭶟自蕩無餘矣如夾濕者口不甚渴當佐木通澤瀉如濕盛於暑者宜仿濕瀉之法可也濕瀉內經云濕勝則濡泄難經曰濕多成五泄可見泄瀉之病屬濕為多濕侵於脾脾失健運不能滲化致壻門不克泌清別濁水穀併入大腸而成泄瀉矣濕瀉之為病脈象緩澀而來瀉水而不腹痛胸前痞悶口不作渴小便黃赤亦或有腹中微痛大便稀溏之證考治濕瀉之法惟念莪先生可宗乃曰滲利使濕從小便而去如農人治潦導其下流雖處卑監不憂巨浸經曰治瀉不利小便非其治也若此論之必當滲利膀胱宜用通利州都法則瀉自得止矣或問曰觀先生是論既引內經之濡泄復引難經之五泄何書中不列濡泄之門又不發五泄之論如斯簡括詎無掛漏乎答曰濡泄即洞泄洞泄之病已論於前五泄即胃脾大腸小腸大瘕也考五十七難中胃泄脾泄即今之食瀉也大腸泄小腸泄大瘕泄即今之痢疾也食瀉痢疾皆詳於後可弗置論耳痰瀉痰瀉者因痰而致瀉也昔賢云脾為生痰之源肺為貯痰之器夫痰乃濕氣而生濕由脾弱而起蓋脾為太陰濕土得溫則健一被寒濕所侵遂困頓矣脾既困頓焉能掌運用之權衡則水穀之精微悉變為痰痰氣上襲於肺肺與大腸相為表裡其大腸固者肺經自病而為痰嗽其不固者則肺病移於大腸而成痰瀉矣其脈弦滑之象胸腹迷悶頭暈噁心神色不瘁或時瀉或時不瀉是也宜以化痰順氣法治之俾其氣順痰消痰消則瀉自止矣食瀉附飲瀉食瀉者即胃瀉也緣於脾為濕困不能健運陽明胃腑失其消化是以食積太倉遂成便瀉其脈氣口緊盛或右關沉滑其證咽酸噯臭胸脘痞悶惡聞食氣腹痛甚而不瀉得瀉則腹痛遂松當用楂曲平胃法治之又有渴能飲水水下復瀉瀉而大渴名為溢飲滑瀉即金鑑中之飲瀉良由水漬於胃而然宜用增損胃苓法去厚朴蒼朮加白朮甘草治之近來之醫飲食混稱者多豈可不為分別哉或問先生之書專為六氣而設今痰瀉食瀉不關六氣亦雜論其中究系何意答曰痰從濕生濕非六氣之一乎食瀉即胃瀉胃泄居五泄之一越人謂濕多成五泄食瀉豈無濕乎前論飧泄洞泄皆因伏氣致病其寒瀉因寒火瀉因火暑瀉因暑濕瀉因濕然痰瀉食瀉雖因痰食亦難免乎無濕而飧洞寒火暑濕等瀉偶亦有痰食相兼兼證如文字之搭題弗宜顧此失彼醫者不可不明風痢針經云春傷於風夏生後泄腸澼注家謂春令傷乎風邪風木內干損其胃氣則上升清陽之氣反內陷而為飧泄久則傳太陰而為腸澼此分明因風而致故謂之風痢也夫風痢之證先作泄而後作痢脈象每見沉小而弦腹微痛而有後重似腸風而下清血此由春令之伏氣至夏而發是屬木勝土虧之候如體素寒者宜用培中瀉木法加木香蒼朮治之體素熱者宜本法去吳萸炮姜加芩連煨葛治之如胸悶溺赤者必夾濕也宜佐赤苓澤瀉治之吞酸噯腐者必夾食也宜佐山楂厚朴治之或問曰古云先瀉後痢為脾傳腎今風痢亦先瀉後痢究竟系脾傳腎否曰否也昔賢謂先瀉後痢為土剋水之證此言先瀉後痢者由風木克胃胃傳脾之證自是兩途當辨治之又問曰嘗見痢疾發於秋令者多夏令者少今言至夏而發得無謬乎曰諸痢多發於秋令或發於夏秋之交惟風痢獨發於夏蓋由春時之伏氣從內而發經曰春傷於風夏生後泄腸澼此之謂也寒痢前言風痢是論春時伏氣至夏而發其餘之痢則不然今先以寒痢論之其病雖發於夏秋之交其實受寒較受暑為多景嶽云炎熱者天之常令當熱不熱必反為災因熱貪涼人之常事過食生冷所以致痢每見人之慎疾者雖經盛暑不犯寒涼終無瀉痢之患可見寒痢之證實因炎熱貪涼過食生冷冷則凝滯中州之陽不能運化清氣不升脾氣下陷以致腹痛後重痢下白色稀而清腥脈遲苔白者當去其寒兼扶脾土則痢自止宜用暖培卑監法佐以楂炭木香治之然而寒痢亦有赤色者不可不別總之以脈遲苔白為據倘脈數苔黃者便為熱痢溫熱之品又不可施醫者總當以脈舌分其寒熱慎弗忽諸王海藏曰寒毒內傷復用寒涼非其治也況血為寒所凝浸入大腸間而便下得溫乃行所以用熱藥其血自止經曰治病必求其本此之謂也胃既得溫其血不凝而自行各守其鄉矣程曦曰嘗見今之治痢不分屬熱屬寒開口便言濕熱動手便用寒涼蓋因未究脈象未審舌苔之故耳凡辨病之寒熱虛實表裡陰陽皆當於脈舌中細細求之庶幾無誤熱痢附暑痢熱痢者起於夏秋之交熱鬱濕蒸人感其氣內干脾胃脾不健運胃不消導熱挾濕食醞釀中州而成滯下矣蓋熱痢之為病脈滑數而有力裡急後重煩渴引飲喜冷畏熱小便熱赤痢下赤色或如魚腦稠黏而穢者是也治宜清痢蕩積法益以楂肉檳榔治之如體弱者以生軍改為制軍最妥時賢謂熱痢即暑痢也豐細考之則非準繩云暑氣成痢者其人自汗發熱面垢嘔逆渴欲引飲腹內攻痛小便不通痢血頻迸者是也擬以清涼滌暑法去青蒿瓜翠加黃連荷葉治之臨證之間亦當辨治濕痢劉河間論痢總不外乎濕熱孔以立非之乃謂六淫之邪俱可兼傷不獨在乎濕熱也然古有濕痢之名決不可廢竊謂河間專言濕熱似乎太偏以立為不然似乎太過據豐論濕痢有寒熱之分焉蓋夫寒濕之為痢也腹綿痛而後墜胸痞悶而不渴不思穀食小便清白或微黃痢下色白或如豆汁脈緩近遲之象宜用溫化濕邪法加木香治之熱濕之為痢也裡急後重忽思飲飲亦不多忽思食食亦乏味小便熱澀痢下赤色或淡紅焦黃脈來濡數之形當用通利州都法去蒼朮加木香黃連治之又有陰虛患痢裡急欲便坐久而仍不得便者謂之虛坐努責不可偏言乎濕而投滲利利之益傷其陰如當歸白芍生地丹皮阿膠澤瀉及石蓮等品隨證加減可也程曦曰以立論痢謂六淫之邪俱可兼傷由是觀之豈非一歲俱有痢疾耶須知風痢雖傷於風但發於夏寒痢因熱貪涼而受寒亦發於夏非冬令之寒而致痢也熱痢發於相火之令濕痢發於濕土之令其實痢疾雖有風寒熱濕之殊然總髮於夏秋之令而春冬罕見是病以立謂六淫俱傷豈不貿貿哉噤口痢噤口者下痢不食或嘔不能食也痢而能食知胃未病今不食者緣於脾家濕熱壅塞胃口而然又有誤服利藥犯其胃氣者止澀太早留邪於中者脾胃虛寒濕邪干犯者氣機閉塞熱邪阻隔者穢積在下惡氣熏蒸者肝木所勝乘其脾胃者又有宿食不消者水飲停蓄者皆能使人噤口也擬用調中開噤法隨證加減緩緩服之冀其有效然噤口之因非審其脈不能明晰如右部浮濡沉細或緩怠無力胃虛也洪大急滑火熱也渾渾浮大或浮弦濁氣上壅也沉而滑或右澀滯宿食停積也遲細者胃寒也弦急者木勝也細別其脈而治之更為確當倘或絶不思食下痢無度不可治也惟有獨參湯合陳廩米濃煎頻服幸冀萬一耳孔以立曰豫嘗治噤口痢以藕汁煮熟稍和砂糖頻服兼進多年陳米稀糜調其胃氣必效即石蓮子之意也古治噤口痢多有用黃連者苦而且降不能升提非胃虛所宜大抵初痢噤口為熱瘀在胃口故宜苦燥若久痢口噤不食此胃氣告匱非比初痢噤口尚有濁氣可破積滯可驅惟大劑參朮佐以茯苓甘草藿香木香煨葛之屬大補胃氣兼行津液乃可耳但得胃氣一復飲食稍進便宜獨參湯略加陳皮或制香附緩緩調補兼行氣滯方為合劑如茯苓之淡滲木香之耗氣乾葛之行津皆當屏除也江誠曰斯論超出乎衆謂初痢之噤口宜以苦燥久則胃虛必以大劑參朮為君苦燥之黃連又在禁用此洵為治噤口不易之良法也水穀痢水穀痢者糟粕膿血雜下腹中微痛登圊頻頻飲食少餐四肢困倦脈來細緩無力或關部兼弦此因脾胃虛寒虛則不能健運寒則不能消化也當用暖培卑監法治之亦有因風木剋土土虛不運者宜本法內加白芍防風有因勞役過度脾陽困頓者加黃耆荷葉有因下焦無火不能熟腐者加故紙吳萸有因痢後中虛飲食停積者加陳皮楂肉然痢疾總不離乎脾胃為病或木勝或火衰當按法加減治之自然應手耳休息痢下痢屢發屢止久而不愈面色痿黃脈形濡滑者為休息痢也多因止澀太早積熱未盡或不能節飲食戒嗜好所以時作時止也亦有過服寒涼而致者肝脾內傷而致者元氣下陷而致者腎虛不固而致者皆當審其因而分治之擬用調中暢氣法俾其氣機得暢則積熱自清中州得調則脾胃自復倘或腹中隱痛宜加吳萸薑炭以化中焦之寒赤痢纏綿當佐秦皮白芍以清肝脾之血肛門重墜更加升麻桔梗以升下陷之元虛滑不禁再入骨脂龍骨以固下焦之脫凡一切之藥不應手者當細辨其脈象若脈沉實雖日遠仍當攻下切宜辨確勿可誤也五色痢金鑑云五色痢者五色膿血相雜而下也若有臟腑尸臭之氣則凶因於用止澀太早或因滯熱下之未盡蘊於腸胃傷臟氣也用一切補養之藥不應則可知初病非澀之太早即下之未盡也診其脈若有力雖日久仍當攻也醫通曰患五色痢者良由臟腑之氣化並傷是以五色兼見然古人皆言腎病以腎藏精之室所居之位最下最深深者既病其淺而上者安有不病之理精室既傷安能任蟄藏之令乎仲景以五液注下臍築痛命將難全也夫以精室受傷五液不守之患須知益火消陰實脾堤水兼分理其氣使失於氣化之積隨之而下未失氣化之精統之而安誠不出乎此法豐按二論誠痢門之要旨前言止澀太早滯熱未盡後言臟腑之氣化並傷歸於腎病合而論之斯疾有虛有實分別治之庶乎穩妥如初起者為實日久者為虛裡急後重者為實頻頻虛坐者為虛脈實有力者為實脈虛無力者為虛虛則宜補以補火生土法治之實則宜瀉以清痢蕩積法治之擬用諸法培中瀉木法治伏氣飧泄洞泄及風痢白朮二錢土炒白芍一錢土炒陳廣皮一錢軟防風一錢白茯苓三錢粉甘草五分炮薑炭八分吳萸八分泡加新荷葉一錢煎服朮芍陳防四味即劉草窗先生治痛瀉之要方用之為君以其瀉木而益土也佐苓甘培中有力薑炭暖土多功更佐吳萸疏其木而止其痛荷葉升其清而助其脾補火生土法治飧泄洞泄命門無火久瀉虛痢淡附片八分肉桂六分細銼分沖菟絲子一錢破故紙一錢吳茱萸八分泡益智仁一錢蘇芡實二錢加蓮子肉十粒入煎下焦無火不能熏蒸腐化致瀉完穀故以桂附辛甘大熱補命門之火以生脾土菟絲故紙溫補其下吳萸益智暖其下復暖其中中下得其溫暖則火土自得相生而完穀自能消化更佐芡實蓮子補其脾且固其腎蓋火土生脾腎固而飧泄洞泄無不向愈矣暖培卑監法治脾土虛寒泄瀉及冷痢水穀痢西潞黨三錢米炒白茯苓三錢於潛術二錢土炒粉甘草五分水炙炮薑炭八分茅蒼朮六分土炒益智仁一錢葛根五分煨加粳米一撮煎服經云土不及曰卑監法中以四君合理中暖培其脾土也脾喜燥故佐以蒼朮喜溫佐以益智喜升佐以葛根喜甘佐以粳米補中收脫法治泄痢不已氣虛下陷穀道不合肛門下脫東洋參三錢黃耆二錢米炒於潛術一錢土炒粉甘草五分炙罌粟殼一錢炙白芍藥一錢土炒訶黎勒一錢五分加石榴皮一錢同煎此治瀉痢日久氣虛脫肛之法也以參耆朮草之甘溫補中州以提其陷罌芍訶黎之酸澀止瀉痢且斂其肛用榴皮為引者亦取其酸以收脫澀以住痢也通利州都法治火瀉濕瀉濕熱痢疾白茯苓三錢澤瀉一錢五分蒼朮八分土炒車前子二錢通草一錢滑石三錢飛苦桔梗一錢河水煎服斯仿舒馳遠先生加減五苓之意州都者膀胱之官名也首用茯苓甘淡平和而通州都為君澤瀉鹹寒下達而走膀胱為臣佐蒼朮之苦溫以化其濕車前通滑之甘淡以滲其濕使桔梗之開提能通天氣於地道也清涼滌暑法治暑溫暑熱暑瀉秋暑滑石三錢水飛生甘草八分青蒿一錢五分白扁豆一錢連翹三錢去心白茯苓三錢通草一錢加西瓜翠衣一片入煎滑石甘草即河間之天水散以滌其暑熱也恐其力之不及故加蒿扁瓜衣以清暑又恐其干犯乎心更佐連翹以清心夫小暑之節在乎相火之後大暑之令在乎濕土之先故先賢所謂暑不離濕也兼用通苓意在滲濕耳化痰順氣法治痰氣閉塞痰瘧痰瀉白茯苓四錢製半夏二錢陳皮一錢五分粉甘草八分廣木香五分煨厚朴一錢薑製加生薑三片水煎服法中苓夏陳甘即局方二陳湯化痰之妥方也加木香厚朴以行其氣氣得流行則順而不滯故古人謂化痰須順氣氣行痰自消且木香厚朴均能治瀉以此法治其痰瀉不亦宜乎楂曲平胃法治因食作瀉兼治食瘧楂肉三錢炒神麯三錢炒蒼朮一錢土炒厚朴一錢薑製陳廣皮一錢甘草八分加䏶胵二枚為引法內蒼陳朴草系局方之平胃散為消導之要劑佐山楂健脾磨積神麯消食住瀉䏶胵乃雞之脾也不但能消水穀而且能治瀉利食瀉投之必然中鵠增損胃苓法見後清痢蕩積法治熱痢夾食脈滑數煩渴溺赤廣木香六分煨黃連六分吳萸炒生軍三錢酒浸枳殼一錢五分麩炒黃芩一錢酒炒白芍一錢五分酒炒粉甘草五分葛根五分煨加鮮荷葉三錢煎服此法首用香連治痢為主加軍枳以蕩其積芩芍以清其血甘草解毒荷葛升提施於實熱之痢每多奏效耳溫化濕邪法治寒濕釀痢胸痞溺白藿香一錢五分蔻殼一錢二分神麯三錢炒厚朴一錢薑製陳皮一錢五分蒼朮八分土炒加生薑三片為引凡濕在表宜宣散在裡宜滲利今在氣分宜溫藥以化之藿香蔻殼宣上下之邪滯神麯厚朴化脾胃之積濕陳皮理其氣分蒼朮化其濕邪更佐生薑溫暖其中中焦通暢無滯滯下愈矣調中開噤法治下痢不食或嘔不能食即噤口痢證西潞黨三錢米炒黃連五分薑汁炒製半夏一錢五分廣藿香一錢石蓮肉三錢加陳廩米一撮煎服痢成噤口脾胃俱憊矣故用潞黨補其中州黃連清其餘痢半夏和中止嘔藿香醒胃蘇脾石蓮肉開其噤陳廩米養其胃倘絶不欲食者除去黃連可也調中暢氣法治中虛氣滯休息痢疾並治脾虧泄瀉潞黨參三錢米炒於朮二錢土炒黃耆二錢酒炒炙甘草四分陳廣皮一錢腹皮一錢五分酒洗廣木香三分煨加鮮荷葉三錢為引參耆朮草調補中州陳腹木香宣暢氣分加荷葉助脾胃而升陽也備用成方草窗痛瀉方治腹痛便瀉不止白朮白芍陳皮防風水煎服久瀉加升麻胃苓湯一名對金飲子治中暑傷濕腹痛泄瀉豬苓茯苓白朮澤瀉肉桂厚朴蒼朮陳皮甘草水煎服如夾食者可加楂肉四神丸治脾腎兩虛久瀉肉果霜破故紙五味子吳萸用生薑煮棗取棗肉搗丸胃關煎治脾腎虛寒作瀉甚至久瀉腹痛不止冷痢等證大熟地懷山藥淡乾薑吳萸白扁豆白朮炙甘草水煎食遠服豐按草窗痛瀉方主治木乘土位之瀉胃苓湯主治濕氣侵脾之瀉四神丸胃關煎主治脾腎虛寒之瀉如兩關不調者或弦有力者是為土被木乘之象濡緩而怠者是為脾受濕侵之象細小無力者或兩尺沉遲者是為脾腎虛寒之象總須辨脈審證而分治之薑茶飲治寒熱瘧及赤白痢生薑細茶葉每味約三錢濃煎服之豐按此方乃東坡居士所制雖平淡無奇然用意頗妙生薑味辛而溫能解表也茶葉甘苦微寒能清裡也二味合用喜無寒熱之偏功在和解故能治瘧耳諺云無痰不作瘧無食不成痢考薑茶之功並能消痰消食所以治瘧猶兼治痢也香連丸治下痢赤白膿血相雜裡急後重木香黃連醋糊丸米飲下芍藥湯治下痢膿血稠黏腹痛後重芍藥歸尾黃芩黃連木香檳榔大黃甘草肉桂水煎服如痢不減大黃可以加重豐按此二方可治初起之痢而無外感最宜若有寒熱外感之見證者便推人參敗毒散為第一歷嘗試之屢治屢驗嘉言先生取名逆流挽舟之法洵不謬也蒼朮地榆湯治脾經受濕痢疾下血蒼朮泔浸炒地榆炒黑照常煎服人參樗皮散治臟毒挾熱下血久痢膿血不止人參樗根白皮東引者去粗皮醋炙等分為末米飲或酒調下豐按地榆樗皮皆澀劑也觀其主治之證並無裡急後重之字樣其治久痢久虛者可知但有一二實證所彰澀藥便難孟浪思古人立法至精至妥奈今人不察隨手用之未有不殺人者也補中益氣湯治煩勞內傷陽虛自汗氣虛不能攝血久痢久瘧人參黃耆白朮炙草歸身陳皮柴胡升麻加薑棗煎服真人養臟湯治瀉痢日久虛寒脫肛人參白朮當歸白芍罌粟殼蜜炙訶子麵裹煨肉豆蔻麵裹煨木香炙甘草肉桂煎服臟寒甚加附子一方無當歸肉蓯蓉湯治噤口痢日久不愈下焦纍虛肉蓯蓉泡淡附子人參薑炭當歸白芍肉桂湯浸炒水煎緩緩服胃稍開再服豐按此三方惟東垣補中益氣獨超每遇脾氣虛陷而作痢者用之屢效謙甫真人養臟治氣血兩傷之久痢鞠通肉蓯蓉湯治肝腎兩虛之久痢用之偶亦並效但餘氣未清正氣未虛皆不宜輕試臨證治案飧泄誤為食瀉城南程某平素略知醫理於立夏後一日腹痛而瀉完穀不化自疑日昨因餅所傷又執治瀉利小便之說輒用五苓加消食之品未效來邀豐診診得兩關一強一弱氣口之脈不緊乃曰非傷食也是飧泄也此因伏氣致病即內經所謂春傷於風夏生飧泄之候消食利濕益使中虛理當扶土瀉木即用理中湯加黃芩白芍煨葛防風連服三煎遂愈飧泄之病熱補得瘳羊城雷某患瀉無度肌肉忽脫脈象兩關並弦豐曰未瀉之先腹必鳴痛痛必便瀉瀉必完穀曰然也不知病在何經曰此肝風傳脾脾受其制不能變化內經名為飧泄後賢稱為胃風見豐論證確切即請撰方乃用劉草窗痛瀉要方加吳萸益智煨葛木香荷葉為引服一劑未臻大效再加參耆薑附方服一劑遂得小效繼服忽全瘥矣洞泄之疴虛實兼治得效若耶倪某患瀉不瘳來延豐治閲前方乃批暴注下迫皆屬於熱用芩連蘆葛等藥未獲中機脈之神門小弱余皆弦緩舌色少榮苔白而薄直傾無度腹痛溺黃就二便而論似屬火瀉就脈舌而論大為不然思內經謂腎脈小甚為洞泄明是先天素弱伏氣深陷之徵餘部弦緩腹痛頻頻木乘土位之候溺黃者夾濕也此證虛中兼實當補先後二天兼以平肝滲濕病者素諳醫理聞言歎服遂用於朮黨參菟絲故紙防風白芍澤瀉雲苓煨葛木香荷葉為引一日一劑連服五朝痛瀉並愈便瀉剛逢經轉云岫葉某之女於長夏之令忽發熱便瀉前醫用五苓散略見中機月事行來加之歸芍詎知其瀉復甚益加腹痛難禁脈象右勝於左此暑濕之邪在乎氣分氣機閉塞不但邪不透化抑且經被其阻即以溫化濕邪法加木香香附蘇梗延胡連進三煎經行瀉止身熱亦退矣程曦曰濕在氣分本當暢氣以透濕經事當期最宜順氣以行經理氣之方一舉兩得矣傷食作瀉槜李張某年逾五旬素來痰體一日赴宴而歸腹痛而瀉邀豐診之右關獨見弦緊噯氣頻作乃曰此屬䅽飥之邪團結於中脾氣當升不升而瀉作胃氣宜降失降而噯頻當遵薛立齊治劉進士用六君加木香之法更佐山楂枳椇子服二劑腹痛已止但瀉未住復診更加蒼朮厚朴再服二劑方得全瘥小産之後偶沾風痢豫章鄧某之室小産後計有一旬偶沾風痢之疾前醫未曾細辨以腹痛為瘀滯以赤痢為腸紅乃用生化湯加槐米地榆艾葉黃芩等藥服下未效來迎豐診脈之兩關俱弦詰之胎未墮之先先有便瀉瀉愈便血腹內時疼肛門作墜豐曰此風痢也良由伏氣而發亦用生化湯除去桃仁加芥炭防風木香焦芍敗醬草為引服二帖赤痢已瘳依然轉瀉思以立有云痢是閉塞之象瀉是疏通之象今痢轉為泄瀉是閉塞轉為疏通系愈機也照舊方除去防風敗醬益以大腹陳皮繼服二帖諸恙屏去矣風痢病一誤再誤城東孔某之子放學歸來腹中作痛下利清血其父母疑為傷損遂服草藥應效全無始迎豐診脈象緩怠而小右關獨見弦強豐曰非傷損也是屬春傷於風夏生腸澼之候也腸澼雖古痢之名然與秋痢治法有別痢門成方弗宜膠守即用培中瀉木法去炮姜加黃連治之服下未有進退更醫調治便云血痢所用皆是止澀之藥血雖減少而腹痛尤增甚則四肢厥冷仍來商治於豐診其脈往來遲滯右關依舊弦強此中土虛寒被木所凌之象總宜溫補其脾清平其肝用暖培卑監法加黃連川楝服之腹痛頓止手足漸溫惟下紅未愈照前法除去炮薑智棟加芥炭木香枯芩艾葉令嘗五劑喜中病機復用補中益氣方獲全安赤痢亦有屬寒溫補得愈古黔黃某之母望六之年忽患痢疾曾延醫治未應始來邀豐閲前醫之方系潔古芍藥湯加減詢其痢狀腹痛即墜墜則欲便下痢皆赤按其脈右部緩怠而遲左部細小而澀舌無榮苔白薄豐曰此脾土虛寒寒濕竊據陰絡之血得寒而凝凝則氣機不行清氣不升而陷所以有腹痛後墜赤痢等證即進補中益氣加炮薑附片令服二帖遂中病矣後用皆參耆朮附為君約半月而愈程曦曰此案用薑附參耆以收全效益信王海藏謂血為寒氣所凝用熱藥其血自止之訓今之醫者一見赤痢非投涼血之方即需清濕之藥嘗見輕淺之病誤治轉重者衆矣瘧痢兩作云岫錢某忽因冒雨當夜遂發寒熱頭身並疼吾衢土俗怕有齷齪所染即以揪刮當先第三朝始延醫治醫見寒熱交作遂以小柴胡湯加消食之品不但未效更增面浮痛痢閣家驚駭來迓豐醫脈形浮緩兼弦舌苔白澤此風濕由表入里瘧痢兩兼之候也當用嘉言先生逆流挽舟之法加木香荷葉治之服二劑寒熱頓除痛痢並減矣痢下純血死證城中鄭某赴杭鄉試未入闈時忽患痢疾即歸桑梓遂延醫療未獲應手始來商治於豐脈之兩尺俱虛余皆濡數形體尫羸舌光如鏡眠食俱廢痢下純血泄出不禁豐曰此陰分被濕所傷斯時利濕益傷其陰補陰恐礙乎濕正躊躇間其父出前醫之方閲之乃補中兼澀思其吃大癮之煙貪非分之色其真陰未始不耗損者前醫補澀並用似不冰炭豐亦從本調治勉以乾地阿膠養其真陰丹皮白芍清其血分禹糧赤石止痢固脫銀花甘草養血解毒生苡茯苓扶其脾而滲其濕東參荷葉挽其正而升其清方已寫竣謂其父曰書謂下純血者死速當早訪高明後延他醫治之未及一旬而歿實熱痢疾止澀太早用下得瘥安徽蘇某之侄由遠方來途中感受暑熱即病煩熱口渴渴欲引飲醫謂陽暑用白虎湯為君服之熱退腹內轉疼更醫治之遂駁用涼之謬謂涼則凝滯將來必變為痢也用平胃散加薑附吳萸腹痛未除果變為痢其叔深信如神復邀診視詎知乃醫固執不化詢得病者不思穀食遂稱為噤口痢也守原方益以石蓮訶子服後痢雖減少然腹痛益劇叫號不已一家驚惶無策著人來迓於豐其叔令閲前方並述病狀按其脈數大而強舌苔黃燥腹痛拒按口渴喜涼豐曰令侄氣血方剛之體患此暑熱夾食之疴而成燥實之候非攻下猛劑不能望瘳用生軍枳實花粉元明黃連荷葉請服一煎當夜遂下赤白夾雜稠黏而臭又得硬屎數枚腹痛方定神氣疲倦就枕即熟寐矣次日用調中和劑服十餘帖而安高年噤口痢疾城北李某望八高年素來矍鑠秋間忽患痢疾即延醫療藥石無功邀豐診之脈形小緩而怠痢下赤白嘔逆頻來日內全不思食豐曰此脾胃虛弱不能化濕消導壅滯胃口而成噤口痢也即用六君佐以楂肉藿香石蓮倉米黃土漿煎服一劑嘔逆已寧仍不思食登圊無度痢不甚多脈象相符較昨乏力明是脾氣虛陷之象倘見病治病不顧其本虛脫必難保也改用補中益氣去當歸柴胡加煨葛石蓮穀芽倉米令服一帖中機再服幸喜病藥相投覺思飲食但發浮腫舉家驚惶來邀復診脈轉遲細而澀舌淡苔白豐曰斯是脾虛發腫非五皮淡滲等藥所可用也宜以附子理中湯加酒炒黃耆生米仁二味迭進五劑浮腫漸消痢疾亦減仍率舊章略為增損調治匝月而愈痢久脾腎兩虛城東鄭某之母患痢兩月來大勢已衰但頻頻虛坐有時糟粕膿血相雜而下合郡諸醫延之殆盡仍邀豐診脈小而澀兩尺模糊豐曰凡治病有先後緩急初起之時邪勢方盛故用宣散消導之方今牽延六十餘朝而脾腎並纍虧損者理當進暖補二天之法弗謂豐前後之方相去霄壤乃用四君四神加銀花炭炒陳米治之服三劑痢已減矣惟兩足加之浮腫此必因濕從下注再循舊法加生薏苡巴戟天連嘗五劑逐漸而痊休息痢誤認腸風豫章羅某痢後下紅淹綿數月比余診之脈來弦小而澀肛門虛墜神倦懶餐此余濕未罄肝脾內傷而成休息痢也前醫不辨乃作腸風治之投以槐角地榆焉望入彀豐以銀花白芍育血養肝潞黨黃耆補脾益氣薏苡滲其餘濕秦皮清其餘痢穀芽蘇胃荷葉升清連進四五煎赤痢漸少矣後循舊法出入約十餘劑而瘳或問曰曾見準繩論腸風腹中有痛所下清血純血與是痢相似最易魚目混珠不識何以別之答曰極易別也休息痢因痢而起也腸風病因外風內客隨感隨見也陰虛之體患五色痢鄂渚佘某之甥患痢兩月餘矣憔悴不堪夜不成寐渴飲不食脈數苔無取觀所下之痢五色雜見豐曰此五色痢也乃凶症耳佘某頗諳醫藥即告之曰甥體素系陰虧今痢久纏真陰益加虛損先生謂五色痢究系溫熱未盡耶抑亦真陰有損耶豐曰石頑有云痢下五色膿血稠黏滑泄無度多屬陰虛今此證分明久痢傷腎下焦不攝即先哲所謂陰虛痢是也斯時即有濕證所彰亦不能投之滲利當用銀花生地白芍黃芩四者均炒為炭阿膠炒珠山藥炒黃與陳皮石蓮合為一劑連嘗三四服遂中肯矣登圊略減數遭惟口渴寐少脈轉小數缺力缺神此氣血津液皆虧損也照前方除去枯芩加入東參炙草夜交藤服數劑更為合拍後用六味合四君為主調治月餘始得痊可或問曰先生謂五色痢即陰虛痢也嘗見古書之中不惟有陰虛痢之名且有虛滑食積氣滯瘀血蟯蟲蟲疰等痢之名今概而不論毋乃太簡乎答曰實慮其繁故就其簡今既問及姑略言之蓋虛滑痢虛而滑脫法當補澀食積痢因食所積法當消導氣滯痢因氣所滯法當調氣瘀血痢因血所瘀法當行血蟯蟲痢因胃弱腸虛細蟲從穀道而出法當殺蟲蟲疰痢因服金石湯丸逼損真陰痢下黑色形如豬肝為難治也以上等病聊述其概其實風寒熱濕噤口水穀休息五色等痢為多學者得能細玩余痢無難治耳又問曰秋痢之證致死者多何謂無難答曰不犯死證者生也犯者死也曰死證何曰下純血者如塵腐色者如屋漏水者厥逆冷汗者厄逆不止者身熱不除者噤口不食藥不能開者驟然能食為除中者皆死證也又有如赤豆汁者唇若塗朱者大孔如竹筒注者皆不可治也又有如魚腦者如豬肝色者身熱脈大者皆半生半死也用藥得法間有生者不可棄而不治也
