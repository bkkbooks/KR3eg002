body:
  text: 卷之六秋傷於濕大意土寄於四季之末四時皆有濕氣何獨經謂秋傷於濕乎蓋一歲之六氣者風君相濕燥寒也推四之氣大暑至白露正值濕土司權是故謂之秋傷於濕鞠通先生列濕溫於夏末秋初誠有高見豐謂因濕為病者有六一曰傷濕一曰中濕一曰冒濕一曰濕熱一曰寒濕一曰濕溫蓋傷濕者有表裡之分焉在表由於居濕涉水雨露沾衣從外而受者也在裡由於喜飲茶酒多食瓜果從內而生者也中濕者卒然昏倒頗與中風相似冒濕者因冒早晨霧露或冒云瘴山嵐濕熱者夏末秋初感受為多他時為少寒濕者先傷於濕後傷生冷濕溫者濕釀成溫溫未化熱最難速愈非寒濕之證辛散可化濕熱之證清利可平之比也此六者皆濕邪之為病耳喻嘉言先生又謂秋傷於燥發出秋燥之論其說未嘗有謬據按六氣而論其實濕氣在於秋分之前燥氣在於秋分之後理固然矣姑附秋燥一條以備參考傷濕傷濕之病原有表裡之因蓋傷乎表者因於居濕涉水雨露沾衣其濕從外而受束於軀殼證見頭脹而痛胸前作悶舌苔白滑口不作渴身重而痛發熱體疲小便清長脈浮而緩或濡而小者此言濕邪傷於表也又有傷於裡者因於喜飲茶酒多食瓜果其濕從內而生踞於脾臟證見肌肉隱黃脘中不暢舌苔黃膩口渴不欲飲水身體倦怠微熱汗少小便短赤脈沉而緩者此言濕氣傷於裡也李時珍曰凡風藥可以勝濕利小便可以引濕為治表裡濕邪之則也豐師其法治表濕宜辛散太陽法減去桂豉加之蒼朴俾其在表之濕從微汗而解也治里濕宜通利州都法俾其在裡之濕從小便而去也傷濕之證務宜分表裡而治之斯為確當倪松亭云治濕之道非一當細察而藥之如濕氣在於皮膚者宜用麻桂二術之屬以表其汗譬如陰晦非雨不晴也亦有用羌防白芷之風藥以勝濕者譬如清風薦爽濕氣自消也水濕積於腸胃肚腹腫脹者宜用遂戟芫牽之屬以攻其下譬如水滿溝渠非導之不去也寒濕在於肌肉筋骨之間拘攣作痛或麻痹不仁者宜用薑附丁桂之屬以溫其經譬如太陽中天則濕自干也濕氣在於臟腑之內肌膚之外微而不甚者宜用朮蒼朴夏之屬之健脾燥濕譬如些微之濕以灰土糝之則濕自燥也濕氣在於小腸膀胱或腫或渴或小水不通宜用二苓車瀉之屬以滲利之譬如水溢溝澮非疏通其竇不達也學者能於斯理玩熟則治濕之法必中鵠矣豐按此論可為治濕之提綱醫者勿忽中濕中濕者即類中門中之濕中也蓋濕為陰邪病發徐而不驟今忽中者必因脾胃素虧之體宿有痰飲內留偶被濕氣所侵與痰相搏而上衝令人涎潮壅塞忽然昏倒神識昏迷與中風之證亦頗相似但其脈沉緩沉細沉澀之不同且無口眼喎斜不仁不用之各異此即丹溪所謂濕熱生痰昏冒之證也宜以增損胃苓法去豬苓澤瀉滑石加蘇子制夏遠志菖蒲治之倘有痰築喉間聲如鼎沸誠有須臾變證之虞可加蘇合香丸分為兩次沖服倘得痰平人省始有轉機否則不可救也冒濕冒濕之病得之於早晨霧露云瘴山嵐或天陰淫雨晴後濕蒸初受其氣者似乎有物蒙之以致首如裹遍體不舒四肢懈怠脈來濡緩之象宜用宣疏表濕法取其微汗仿嘉言貴徐不貴驟之意俾其濕邪還表而解毋使其由表而入於裡倘或脘中痞悶微熱汗少小便短赤是濕邪已入於裡也宣疏之劑又不相宜宜改通利之方自然中的傷濕條內須參閲之濕熱賈氏曰夏熱則萬物濕潤秋涼則萬物乾燥若此論之濕熱之證在長夏而不在秋豈非與內經之秋傷於濕不合耶細思之斯二句書不重夏秋二字當重在熱涼二字也蓋熱蒸則濕涼勝則燥理固然矣即如立秋處暑之令炎蒸如夏患者非秋濕即秋暑其實秋令之濕熱亦必夾之秋暑也考濕熱之見證身熱有汗苔黃而澤煩渴溺赤脈來洪數是也當用通利州都法治之如大便祕結加栝蔞薤白開其上以潤其下如大便未下脈形實大有力者是濕熱夾有積滯也宜本法內加元明粉製大黃治之或問曰先賢嘗謂暑必夾濕今先生謂濕熱夾暑有是說乎答曰小暑之節在於相火之後大暑之氣在於濕土之先故先賢有暑必夾濕之訓也豐謂濕熱夾暑專在大暑至白露而言蓋斯時濕土主氣暑氣漸退濕令方來而濕甚於暑者故謂之濕熱夾暑也又問曰章虛谷録薛生白濕溫之條加之注解統以濕溫稱為濕熱今先生分門而論者何也曰濕體本寒寒濕可以溫散醞釀成熱熱濕可以清通惟濕溫不熱不寒最為難治斷不可混濕溫為濕熱理當分列濕熱濕溫為二門又問曰濕熱致病者多何略而弗詳乎曰因濕致病者固屬不少如腫滿黃疸淋濁等證諸先賢皆早詳於雜證之書是編專論時病毋庸迭贅可耳寒濕傷濕又兼寒名曰寒濕蓋因先傷於濕又傷生冷也夫寒濕之證頭有汗而身無汗遍身拘急而痛不能轉側近之則痛劇脈緩近遲小便清白宜以辛熱燥濕法治之毋使其醞釀成溫而成濕溫之病溫甚成熱而成濕熱之病又毋使其變為痰飲伏而不發交冬發為咳嗽之病由是觀之可不速罄其濕乎須知寒濕之病患於陽虛寒體者為多辛熱燥濕之法未嘗不為吻合濕熱之證患於陰虛火體者為多此法又宜酌用耳貿貿者不別病之寒濕熱濕體之陰虛陽虛一遇濕病概投通利之方若此魯莽未有不誤人者也濕溫濕溫之病議論紛紛後學幾無成法可遵有言溫病復感乎濕名曰濕溫據此而論是病乃在乎春有言素傷於濕因而中暑暑濕相搏名曰濕溫據此而論是病又在乎夏有言長夏初秋濕中生熱即暑病之偏於濕者名曰濕溫據此而論是病又在乎夏末秋初細揆三論論濕溫在夏末秋初者與內經秋傷於濕之訓頗不齟齬又與四之氣大暑至白露濕土主氣亦屬符節當宗夏末秋初為界限也所有前言溫病復感於濕蓋溫病在春當云溫病夾濕言素傷於濕因而中暑暑病在夏當雲中暑夾濕皆不可以濕溫名之考其致病之因良由濕邪踞於氣分醞釀成溫尚未化熱不比寒濕之病辛散可瘳濕熱之病清利乃解耳是病之脈脈無定體或洪或緩或伏或細故難以一定之脈印定眼目也其證始惡寒後但熱不寒汗出胸痞舌苔白或黃口渴不引飲宜用清宣溫化法去連翹加厚朴豆卷治之倘頭痛無汗惡寒身重有邪在表宜用宣疏表濕法加葛羌神麯治之倘口渴自利是濕流下焦宜本法內去半夏加生米仁澤瀉治之倘有脛冷腹滿是濕邪抑遏陽氣宜用宣陽透伏法去草果蜀漆加陳皮腹皮治之如果寒熱似瘧舌苔白滑是為邪遏膜原宜用宣透膜原法治之如或失治變為神昏譫語或笑或痙是為邪逼心包營分被擾宜用祛熱宣竅法加羚羊鉤藤元參生地治之如撮空理線苔黃起刺或轉黑色大便不通此濕熱化燥閉結胃腑宜用潤下救津法以生軍易熟軍更加枳殼庶幾攻下有力耳倘苔不起刺不焦黃此法不可亂投濕溫之病變證最多殊難罄述宜臨證時活法可也秋燥推六氣之中燥金主氣自秋分而至立冬喻嘉言以燥令行於秋分之後所以謂秋不遽燥確與氣運相合也沈目南云性理大全謂燥屬次寒奈後賢悉謂屬熱大相徑庭如盛夏暑熱炎蒸汗出濈濈肌肉潮潤而不燥也深秋燥令氣行人體肺金應之肌膚乾槁而燥乃火令無權故燥屬涼謂屬熱者非矣豐細玩之誠非謬也凡治初患之燥氣當宗屬涼擬法夫秋燥之氣始客於表頭微痛畏寒咳嗽無汗鼻塞舌苔白薄者宜用苦溫平燥法治之若熱渴有汗咽喉作痛是燥之涼氣已化為火宜本法內除去蘇荊桂芍加元參麥冬牛蒡象貝治之如咳嗽胸疼痰中兼血是肺絡被燥火所劫宜用金水相生法去東參五味加西洋參旱蓮草治之如諸證一無惟腹作脹大便不行此燥結盤踞於裡宜用松柏通幽法治之總而言之燥氣侵表病在乎肺入里病在腸胃其餘肝燥腎燥血枯虛燥皆屬內傷之病茲不立論或問曰先生遵喻氏秋燥論中秋不遽燥燥氣行於秋分以後之說殊未見醫醇賸義中論之最詳又明出喻氏之謬既謂燥氣行於秋分以後而秋分以前四十五日全不關於秋燥矣故云初秋尚熱則燥而熱深秋既涼則燥而涼此誠是振聾發瞶之語先生曷不遵之為龜鑑耶答曰子不知六氣循環亦疑喻氏之謬不察大寒至驚蟄主氣風木春分至立夏主氣君火小滿至小暑主氣相火大暑至白露主氣濕土秋分至立冬主氣燥金小雪至小寒主氣寒水此年年之主氣千古不易由是而推則燥金之令確在乎秋分而至立冬而秋分以前之白露處暑立秋四十五日猶是濕土主氣豈可誤為燥氣乎子以為然否或唯唯而退程曦曰論燥氣者首推嘉言其次目南與鞠通也嘉言論燥引大易水流濕火就燥各從其類乃論燥之復氣也目南所論燥病屬涼謂之次寒乃論燥之勝氣也至鞠通論燥有勝氣復氣與正化對化從本從標之說可為定論乃曰如仲景用麻桂薑附治寒之勝氣也治寒之正化也治寒之本病也白虎承氣治寒之復氣也治寒之對化也治塞之標病也能於此理悟通則燥氣之勝復正對本標亦皆瞭然於胸中矣江誠曰人皆知溫為熱而不知燥為涼以燥為熱者蓋因燥字從火之弊耳試問既以燥為熱曷不以溫字從水而為寒乎不知四時之令由春溫而後夏熱由秋涼而後冬寒目南先生引性理大全之說謂燥屬涼真所謂千載迷津一朝點破耳擬用諸法辛散太陽法見前通利州都法見前增損胃苓法見前宣疏表濕法治冒濕證首如裹遍體不舒四肢懈怠蒼朮一錢土炒防風一錢五分秦艽一錢五分藿香一錢陳皮一錢五分砂殼八分生甘草五分加生薑三片煎服此治冒濕之法也君以蒼朮防秦宣疏肌表之濕被濕所冒則氣機遂滯故臣以藿陳砂殼通暢不舒之氣濕藥頗燥佐以甘草潤之濕體本寒使以生薑溫之辛熱燥濕法治寒濕之病頭有汗而身無汗遍身拘急而痛蒼朮一錢二分土炒防風一錢五分甘草八分羌活一錢五分獨活一錢五分白芷一錢二分草豆蔻七分乾薑六分水煎服法中蒼防甘草即海藏神朮散也用於外感寒濕之證最為中的更加二活白芷透濕於表草蔻乾薑燥濕於裡諸藥皆溫熱辛散倘陰虛火旺之體勿可浪投清宣溫化法見前宣透膜原法見前宣陽透伏法見前祛熱宣竅法見前潤下救津法見前苦溫平燥法治燥氣侵表頭微痛畏寒無汗鼻塞咳嗽杏仁三錢去皮尖研陳橘皮一錢五分紫蘇葉一錢荊芥穗一錢五分桂枝一錢蜜水炒白芍一錢酒炒微焦前胡一錢五分桔梗一錢五分水煎溫服凡感燥之勝氣者宜苦溫為主故以橘杏蘇荊以解之加白芍之酸桂枝之辛是遵聖訓燥淫所勝平以苦溫佐以酸辛是也秋燥之證每多咳嗽故佐前桔以宜其肺肺得宣暢則燥氣自然解耳金水相生法松柏通幽法治燥結盤踞於裡腹脹便閉松子仁四錢柏子仁三錢冬葵子三錢火麻仁三錢苦桔梗一錢栝蔞殼三錢薤白頭八分大腹皮一錢酒洗加白蜂蜜一調羹沖服此仿古人五仁丸之法也松柏葵麻皆滑利之品潤腸之功非小較硝黃之推蕩尤穩耳丹溪治腸痹每每開提上竅或以桔梗蔞薤開其上覆潤其下更加大腹寬其腸白蜜潤其燥幽門得寬得潤何慮其不通哉備用成方羌活勝濕湯治濕氣在表頭痛頭重或腰脊重痛或一身盡痛微熱昏倦羌活獨活川芎藁本蔓荊子防風甘草水煎服平胃散治濕淫於內脾胃不能剋制者蒼朮陳皮厚朴甘草為末薑湯下除濕湯治傷濕腹痛身重足軟大便溏瀉蒼朮陳皮茯苓制夏藿香厚朴甘草水煎服豐按羌活勝濕湯是治表濕平胃散除濕湯是治里濕傷濕之證總當分表裡而治之金匱腎著湯治傷濕身重腹痛腰冷乾薑茯苓白朮甘草水煎服豐按經心録加肉桂牛膝杜仲澤瀉更為切當訒庵雖謂屬外感之濕非腎虛也竊謂受邪之處無有不虛標本兼治未嘗不妥松峰達原飲又可達原飲有知母黃芩無黃柏梔子茯苓治濕熱盤踞膜原檳榔草果厚朴白芍甘草黃柏梔子茯苓水煎服劉松峰曰溫而兼濕故去知母而換黃柏以燥濕且救水而利膀胱去黃芩換梔子瀉三焦之火而下行利水加茯苓利小便而益脾胃三者備而濕熱除矣三仁湯治濕溫胸悶不飢舌白不渴午後身熱狀若陰虛杏仁蔻仁生米仁滑石通草竹葉厚朴制夏水煎日三服蒼苓白虎湯治濕溫身重胸滿頭痛妄言多汗兩脛逆冷蒼朮茯苓石膏知母生甘草加粳米煎服豐按三仁湯治濕溫之輕者蒼苓白虎湯治濕溫之重者當別見證而分治之桂苓甘露飲統治濕溫濕熱茯苓豬苓白朮澤瀉肉桂滑石石膏寒水石水煎溫服豐按此方即五苓散加三石蓋五苓利濕三石清熱治濕溫最合倘治濕熱當去肉桂可也杏蘇散治燥傷本臟頭微痛惡寒咳嗽稀痰鼻塞嗌塞脈弦無汗杏仁蘇梗茯苓制夏陳皮甘草枳殼枯梗前胡加薑棗煎服清燥救肺湯治諸氣膹郁諸痿喘嘔之因於燥者麥冬阿膠杏仁麻仁桑葉枇杷葉人參甘草石膏水煎溫服滋燥養營湯治火爍肺金血虛外燥皮膚皺揭筋急爪枯或大便祕結當歸黃芩生地熟地白芍甘草秦艽防風水煎溫服蜜煎導法治陽明證自汗小便利大便祕者蜂蜜用銅器微火熬頻擾勿令焦候凝如飴捻作挺子頭鋭如指糝皂角末少許乘熱納穀道中用手抱住欲大便時去之加鹽少許亦可鹽能潤燥軟堅豐按六氣之中惟燥氣難明今人治燥動手非沙參玉竹即生地二冬不知燥有勝氣復氣在表在裡之分如杏蘇散是治燥之勝氣清燥救肺湯是治燥之復氣滋燥養營湯血虛外燥者宜之蜜煎導法液虧里燥者宜之一偏滋補清涼非法也臨證治案里濕釀熱將成疸證徽商張某神氣疲倦胸次不舒飲食減少作事不耐煩勞前醫謂脾虧用六君子湯為主未效又疑陰虛改用六味湯為主服下更不相宜來舍就診脈息沉小緩澀舌苔微白面目隱黃豐曰此屬裡濕之證誤用滋補使氣機閉塞則濕釀熱熱蒸為黃黃疸將成之候倘不敢用標藥蔓延日久必難圖也即用增損胃苓法去豬苓加秦艽茵陳楂肉雞金治之服五劑胸脘得暢黃色更明惟小便不得通利仍照原方去秦艽加木通桔梗又服五劑之後黃色漸退小水亦長改用調中補土之方乃得全愈里濕誤補成臌得破則愈西鄉鄭某水濕內侵於脾神疲肢軟自疑為體虧而餌大棗則腹皮日脹納食尤劇來求豐診兩手之脈沉緩而鈍以手按其腹緊脹如鼓此屬氣阻濕留將成臌脹之候乘此體質尚實正氣未衰當用消破之劑以治其標即以蓬朮檳榔青皮蔔子乾薑官桂厚朴蒼朮雞金為引連服七劑而寬中濕誤作虛風城東葉某因公勞役由遠方歸覺眩暈神疲自以為虧先服東參龍眼即延醫治乃作水不涵木木動生風論治服藥後忽倒神識模糊急求治於豐診得脈象沉小而滑思脈沉肢冷為中氣今肢不冷者非忽倒神昏似中風然無口眼喎斜者又非推其起病之初有眩暈神疲等證其神疲者必因濕困於脾也眩暈者無痰不作也此宿伏之痰與新侵之濕相搏上衝所致斯為中濕證也即用宣竅導痰法加竹瀝薑汁治之三劑而神醒矣後用六君為主以收全效秋濕時令忽患暴中丁丑孟秋炎蒸如夏乍雨如黴患急病者甚衆有城北王某刈稻歸來正欲晚餐倏然昏倒不知人事痰響喉間吾衢土俗以為齷齪即倩人揪刮神識略見清明邀豐診之脈來沉細舌苔白滑豐曰此中濕也旁有一醫曰沉細之脈白滑之苔當是中寒分明四逆大順之證豐曰欲用桂附則豫謝不敏矣彼醫不言而退其妻泣涕求治豐聞呼吸之聲將有痰起風雲之變恐在頃刻即用藿香神麯川朴杏仁制夏陳皮菖蒲遠志竹瀝薑汁合為一劑服之未有進退令加蘇合香丸痰響漸平人事稍醒守舊略為增損連嘗數劑而瘥江誠曰舌苔白滑寒象也沉細之脈少陰中寒也考今歲又系太陽在泉寒淫於內彼醫謂中寒欲用四逆大順似乎相象不知中寒中濕大有攸分以脈舌而論似屬中寒以時令而論實為中濕雖脈沉細舌苔白滑但無吐瀉腹痛肢冷等證豈可遽認為寒四逆大順豈可隨手而用況在孟秋正值濕土主氣相火客氣又非寒水加臨之候故是證直斷為濕而用宣竅導痰之藥以收效耳濕溫誤作伏暑錢江陸某偶患濕溫時氣延醫調治從伏暑立方未效來迓於豐推其起病根由確係濕溫之病前用一派涼劑焉望中窾殊不知濕為陰邪因氣機閉阻濕邪漸化為溫而未釀熱所以涼藥無功即熱劑亦無效驗非比寒濕辛散可解熱濕清利可瘥今診脈形右部勝左舌苔黃澤胸悶汗多發熱纏綿靡已此邪尚在氣分猶望其宣透而解當用清宣溫化法加厚朴治之服二劑胸次稍寬汗亦減少惟軀熱尚未退盡繼以舊法除去半夏再加通草蟬衣連服三煎遂愈高年濕溫傷氣微歙程其年屆賜鳩忽患濕溫之證曾延醫治一稱伏暑一稱濕溫一稱虛損清利與補皆未中鵠始來商治於豐診其脈虛數少神心煩口渴微熱有汗神氣極疲此皆濕溫傷氣之證也治宜益氣卻邪即以東參麥味甘草陳皮生苡苓瀉治之令服數帖熱渴並減但精神尚倦飲食少餐姑率舊章佐以神苓夏曲又服數帖日復一日矣濕溫化燥攻下得愈須江周某之郎由濕溫誤治變為唇焦齒燥舌苔乾黑身熱不眠張目妄言脈實有力此分明濕溫化熱熱化燥燥結陽明非攻下不能愈也即用潤下救津法服之未效屢欲更衣而不得後以熟軍改為生軍更加杏霜枳殼始得大解色如敗醬臭不可近是夜得安寐讝妄全無次日舌苔亦轉潤矣繼以清養肺胃調理二旬而安妊娠燥氣為病三湘喻某之內孕經七月忽受燥氣咳嗽音嘶前醫貿貿不詢月數方內遂批為子喑竟忘卻內經有婦人重身九月而喑一段醫者如此未免為識者所譏觀其方案龐雜之至所以罔效豐診其脈弦滑而來斯時肺經司胎咳逆音啞顯系肺金被燥氣所侵之證宜辛涼解表法去蟬衣淡豉加桑葉菊花橄欖為引連嘗三服音揚咳止矣感受秋涼燥氣城西戴某之女賦稟素虧忽患微寒微熱乏痰而咳前醫用耆皮桂芍和其營衛百合款冬潤其乾咳西黨歸身補其氣血方藥似不雜亂但服下胸膈更閉咳逆益勤寒熱依然不減豐診其脈浮弦沉弱舌苔白薄此感秋涼之燥氣也即用蘇梗橘紅蟬衣淡豉蔞皮叭噠象貝前胡服二劑寒熱遂減咳逆猶存病家畏散不敢再服復來邀診豐曰邪不去則肺不清肺不清則咳不止倘懼散而喜補補住其邪則虛損必不可免仍令原方服二劑其咳日漸減矣後用輕靈之藥而愈可見有是病當用是藥知其虧而不補者蓋邪未盡故也血虧液燥加感燥氣云岫錢某之妹素來清瘦營血本虧大解每每維艱津液亦虧固已邇來畏寒作咳胸次不舒脈象左部小澀而右部弦徑此屬陽明本燥加感燥之勝氣肺經受病氣機不宣則大便益不通耳遂用蘇梗杏仁陳皮桔梗蔞皮薤白淡豉蔥葉治之服二劑畏寒已屏咳逆亦疏惟大解五日未行思丹溪治腸痹之證每每開提肺氣使上焦舒暢則下竅自通泰矣今照舊章加之兜鈴紫菀柏子麻仁除去蘇陳蔥豉令服四煎得燥屎數枚肛門痛裂又加麥冬歸地生黑芝麻服下始獲痊愈程曦曰鞠通論燥氣有勝復之分今觀書中之論治更有表裡之別焉如秋分至立冬之候有頭痛惡寒作咳者是燥氣在表之證也法當宣散其肺有大便祕結而艱難者是燥氣在裡之證也法當滋潤腸胃其能識勝復別表裡者則治燥之法無餘蘊矣
