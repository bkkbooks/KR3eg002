body:
  text: 卷之七秋傷於濕冬生咳嗽大意考六氣之中濕氣在乎秋令故經謂秋傷於濕濕土之氣內應乎脾脾土受濕不司運化內濕釀成痰飲上襲於肺遂為咳嗽病矣夫六氣之邪皆能令人咳嗽又不獨乎濕也斯言濕者是為伏氣咳嗽有西昌喻嘉言先生疑濕字之訛改作秋傷於燥發明秋燥之論雖有悖經之罪然亦因乎六氣起見也蓋內經論濕殆在乎立秋處暑白露濕土主氣之時喻氏論燥殆在乎秋分寒露霜降燥金主氣之候據愚意更有界限分焉竊謂秋初傷濕不即發者濕氣內釀成痰痰襲於肺而作嗽名曰痰嗽治宜理脾為主滲濕為佐如秋末傷燥不即發者燥氣內侵乎肺肺失清降而作咳名曰乾咳治宜理肺為主潤燥為佐總之不越兩太陰之治也斯言傷濕傷燥而咳嗽者皆由秋令之伏氣而發於冬其即發者仍歸傷濕秋燥門中治之痰嗽痰嗽者因痰而致嗽也夫作嗽之病風寒暑熱皆能致之古人議論紛紜惟李云間章若耶二先生皆括為內傷外感觀其立論卓犖不群然與內經秋傷於濕之嗽無預豐不揣鄙陋而特補之斯病也良由立秋以後秋分以前先傷於濕濕氣內踞於脾釀久成痰痰襲於肺氣分壅塞治節無權直待冬來稍感寒氣初客皮毛漸入於肺肺氣上逆則潛伏之濕痰隨氣而逆遂成痰嗽之病矣其脈必見弦滑或見微緊右寸關必較餘部不調舌苔白潤胸次不舒痰白而稀口不作渴此皆秋濕伏氣之見證也理當治脾為主滲濕化痰為佐宜以加味二陳法治之如有惡寒發熱者再加蘇梗前胡氣喘者加之旋覆蘇子當隨其證而損益之或問作嗽之病四時皆有今觀是篇獨發於冬他時之嗽因何勿論耶答曰子不觀本論中原有風寒暑熱皆能致之之說四時都有咳嗽之病也曰何不分而論之曰前之風溫風熱風寒冒風暑咳秋燥以及後之冬溫條中皆有咳嗽之證若重復而論之能不令人心厭乎是論專言伏氣釀痰致嗽而風寒暑熱致嗽者可毋重贅耳乾咳乾咳者乏痰而咳逆也此因秋分之後先傷乎燥燥氣內侵乎肺當時未發交閉藏之令乃發斯為金寒水冷之咳也前論秋燥條中是為燥之新邪此論乾咳是為燥之伏氣其證咳逆乏痰即有痰亦清稀而少喉間干癢咳甚則胸脅引疼脈沉而徑舌苔白薄而少津當用溫潤辛金法治之如胸脅痛者可加旋覆橘絡咳逆艱難者再加松子款冬咳劇震動血絡喉痛吐紅脈轉沉滑或沉數此燥氣已化為火也當用清金寧絡法治之如咳逆氣短甚則有汗咽喉乾燥者當用金水相生法治之蹉跎失治最易延為癆損可不謹歟或問曰曾見內經有五臟六腑皆令人咳之訓今先生只列痰嗽乾咳為二門不及臟腑等咳毋乃遺漏乎曰是書專論四時之咳如春令風溫之咳夏令暑熱之咳秋令秋燥之咳冬令冬溫之咳其實五臟六腑之咳不過就其見證而分如胸疼喉痛為心咳兩脅下痛為肝咳右胠痛引肩背為脾咳喘急咳血為肺咳腰背相引而痛為腎咳又有小腸咳者咳而失氣也膽咳者咳嘔苦水也胃咳者咳而欲嘔也大腸咳者咳而遺屎也膀胱咳者咳而遺溺也三焦咳者腹滿而不食也此皆內經分臟腑之咳也念莪先生已分條治之茲不復贅擬用諸法加味二陳法治痰多作嗽口不作渴白茯苓三錢陳廣皮一錢製半夏二錢生甘草五分生米仁三錢杏仁三錢去皮尖研加生薑二片飴糖一匙為引苓陳夏草即二陳湯也汪訒庵曰半夏辛溫體滑性燥行水利痰為君痰因氣滯氣順則痰降故以陳皮利氣痰由濕生濕去則痰消故以茯苓滲濕為臣中不和則痰涎聚又以甘草和中補土為佐也擬加米仁助茯苓以去濕杏仁助陳皮以利氣生薑助半夏以消痰飴糖助甘草以和中凡有因痰致嗽者宜施此法溫潤辛金法治無痰乾咳喉癢脅疼紫菀一錢蜜水炒百部一錢蒸松子仁三錢款冬花一錢五分叭達杏仁二錢去皮尖用陳廣皮一錢蜜水炒加冰糖五錢為引肺屬辛金金性剛燥所以惡寒冷而喜溫潤也紫菀溫而且潤能暢上焦之肺百部亦溫潤之性暴咳久咳咸宜更加松子潤肺燥杏仁利肺氣款冬與冰糖本治乾咳之單方陳皮用蜜制去其燥性以理肺肺得溫潤則咳逆自然漸止清金寧絡法治燥氣化火喉痛咳紅麥冬三錢去心肥玉竹二錢北沙參三錢元參一錢五分細生地三錢旱蓮草三錢冬桑葉三錢加枇杷葉三錢去毛蜜炙為引此治燥氣化火刑金劫絡之法麥冬玉竹清其燥火沙參元參潤其肺金細地旱蓮寧其血絡蓋血藏肝臟故加冬桑葉以平其肝肺氣上逆故加枇杷葉以降其肺使肺氣得降肝血得藏則咳逆吐紅均可定矣金水相生法備用成方瀉白散治肺經有火皮膚蒸熱灑淅寒熱日晡尤甚喘嗽氣急等證桑白皮地骨皮粉甘草粳米水煎溫服清肺飲治痰氣上逆而作咳嗽杏仁貝母茯苓橘紅桔梗甘草五味子加姜煎食遠服瓊玉膏治乾咳嗽地黃四斤茯苓十二兩人參六兩白蜜二斤先將地黃熬汁去渣入蜜煉稠再將參苓為末和入瓷罐封水煮半日白湯化服丹溪咳血方治咳嗽痰血青黛水飛栝蔞去油海石梔子訶肉等分為末蜜丸噙化嗽甚加杏仁千金久嗽方治長久咳嗽神效白蜜一斤生薑二斤取汁先稱銅銚知斤兩訖納蜜薑汁微火熬令薑汁盡惟有蜜斤兩在則止每含如棗大一丸日三服二陳湯治一切痰飲為病咳嗽脹滿嘔吐噁心頭眩驚悸茯苓製半夏陳皮甘草加生薑煎服景嶽六安煎治風寒咳嗽痰滯氣逆等證陳皮半夏茯苓甘草杏仁白芥子加生薑三片煎七分食遠服豐按以上諸方通治咳嗽然而咳屬肺嗽屬脾前於痰嗽乾咳門中已詳辨矣須知前五方多潤肺之品以治咳後二方多理脾之品以治嗽若此分療治無不中臨證治案伏濕作嗽認為冬溫鑑湖沈某孟冬之初忽患痰嗽前醫作冬溫治之閲二十餘天未能奏效延豐診治右部之脈極滯舌苔白滑痰多而嗽胸閉不渴豐曰此即內經秋傷於濕冬生咳嗽之病非冬溫之可比也冬溫之病必脈數口渴今不數不渴者非冬溫治在乎肺此則治在乎脾張冠李戴所以乏效遂用加味二陳法去米仁一味加蘇子芥子治之三劑而胸開五劑而痰嗽減後用六君子湯增損獲全愈矣伏濕致嗽南鄉張某左脈如平右關緩滯獨寸口沉而且滑痰嗽纏綿日久外無寒熱內無口渴前醫用散不效改補亦不見功不知此證乃系伏濕釀痰痰氣竄肺而致嗽即經所云秋傷於濕冬生咳嗽也當理脾為主利肺為佐即以制夏化紅茯苓煨薑杏仁紹貝蘇子甘草治之約服三四劑痰嗽遂減矣後循舊法出入調治旬日而安痰嗽補脾取效城南程某患嗽月餘交冬未愈始延豐診診得脈形沉弱而滑舌體無榮苔根白膩神氣疲倦飲食並廢豐曰此賦稟素弱濕襲於脾脾不運化釀痰入肺所致以脾濕為病本肺痰為病標即先哲云脾為生痰之源肺為貯痰之器治當補脾為主程曰風痰在肺補之恐增其閉即出曾服十餘方皆是荊防枳桔杏貝蘇前等品豐曰此新感作嗽之藥與之伏氣理當枘鑿即用六君加玉蘇子生米仁治之服五劑神氣稍振痰嗽漸疏繼進十餘劑方得全愈江誠曰痰嗽之證須知有新感有伏氣新感之脈必多浮伏氣之脈必多沉新感之嗽必兼鼻塞聲重頭痛發熱伏氣之嗽而無諸證也凡伏氣之證法當宣氣透邪前醫以荊防枳桔反未臻效而吾師用六君補氣蘇子降氣米仁滲濕而反效者何也蓋由風寒暑濕潛伏者固宜透發惟此則不然當知濕氣未成痰之先可以透發既成痰之後焉能向外而解耶因痰之源在脾故用六君子扶脾以去其濕而化其痰蘇子降氣毋使其痰上襲於肺米仁滲濕毋使其濕再釀成痰倘用宣提之方則痰益襲於肺而嗽更無愈期矣燥氣伏邪作咳括蒼馮某陰虛弱質向吃洋烟約乾咳者約半月矣曾經服藥未驗十月既望來舍就醫兩寸之脈極數餘部皆平豐曰據此脈形當有咳嗽馮曰然曾服散藥未效何豐曰散藥宜乎無效是證乃燥氣伏邪之咳非新感風寒之咳理當清潤肺金庶望入彀遂用清宣金臟法去兜鈴杷葉加甘菊梨皮服一劑減一日連服五劑咳逆遂屏後歸桑梓擬進長服補丸燥氣刑金致使咳紅鄂渚阮某之妾乾咳喉痛纏綿匝月始延豐治未診即出前方閲之初用辛散之方後用滋補之藥不但罔效尤增咳血頻頻細診其脈左部緩小右部搏指舌尖絳色而根凝黃此屬燥之伏氣化火刑金雖乾咳吐紅真陰未損前以辛散治之固謬以滋補治之亦非斯宜清暢其肺以理其燥肺得清肅則咳自平而血不止自止即用桑葉杏仁兜鈴浙貝梔皮杷葉蔞殼梨皮再加橄欖為引請服三煎忌食煎炒之物服下稍知中窾繼進三劑遂獲全可陰虛之體伏燥化火刑金古黔劉某婦素吸洋烟清癯弱體自孟冬偶沾咳逆一月有餘未效來商豐診閲前所用之藥頗為合理以桑菊蔞蒡杏蘇桔貝等藥透其燥氣之邪但服下其咳益增其體更怠晝輕夜劇痰內夾雜紅絲脈形沉數而來舌絳無苔而燥豐曰此屬真陰虛損伏燥化火刑金之候也思金為水之母水為金之子金既被刑則水愈虧而火愈熾制火者莫如水也今水既虧不能為母復仇必須大補腎水以平其火而保其金金得清則水有源水有源則金可保金水相生自乏燎原之患倘或見咳治咳見血治血即是捨本求末也豐用知柏八味除去山萸加入阿膠天麥連進五劑一如久旱逢霖而諸疴盡屏卻矣
