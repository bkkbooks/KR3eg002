body:
  text: 附論治時病常變須會通論拙著已告竣矣首先論證其次立法其次成方又其次治案醫者能於此熟玩自然融會貫通弗執定某證之常必施某法某證之變必施某法臨證時隨機活法可也姑先論其常而通其用如初起因於風者宜以解肌散表法因於寒者宜以辛溫解表法因於暑者宜以清涼滌暑法因於濕者宜以增損胃苓法因於燥者宜以苦溫平燥法因於火者宜以清涼透邪法此皆言初患六氣之常證通用之定法也至於反常之變證不定之活法則又不可不知如春溫條中有舌絳齒燥譫語神昏手足瘛瘲昏憒不語之變濕溫條中有或笑或痙撮空理線舌苔黃刺或轉焦黑之變然而亦非一定之變也須知春溫亦有濕溫之變證濕溫亦有春溫之變證論中不能印定須活法而通治之此又不特春溫濕溫可以會通而暑溫冬溫以及諸病皆有等證之變悉可以通治之又如諸病見有舌絳齒燥熱傷於陰者清熱保津法可通用之譫語神昏熱亂神明者祛熱宣竅法可通用之手足瘛瘲熱極生風者清離定巽法可通用之昏憒不語痰襲心包者宣竅導痰法可通用之及至發笑之證皆由邪襲於心發痙之證皆系風乘虛入或至撮空理線循衣摸床等證皆當審其虛實通其活法則不但治時病可以融會即治雜病亦有貫通之妙耳五運六氣論治時令之病宜乎先究運氣經曰不知年之所加氣之盛衰不可以為工也戴人云不讀五運六氣檢遍方書何濟由是觀之治時病者可不知運氣乎近世之醫皆謂五運六氣與歲多有不應置之弗習是未達夫天地之常變也常者如君相司令則當熱寒水主政則當寒變者當熱反寒當寒反熱之類是也試以其常而言之五運者木火土金水也一運主七十二日有奇六氣者風君相濕燥寒也一氣司六十日有奇故五運六氣合行而終一歲蓋主運主氣歲歲皆然客運客氣年年更換每年從大寒日初交木運二為火運三為土運四為金運終為水運此主運也經曰甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之如甲己之年甲己化土土為初運金為二運水為三運木為四運火為五運此客運也主氣亦從大寒日交厥陰風木為初氣少陰君火為二氣少陽相火為三氣太陰濕土為四氣陽明燥金為五氣太陽寒水為終氣此主氣也客氣每歲循環依年推算如子午之年初為寒水二為風木三為君火四為濕土五為相火終為燥金又如丑未初為風木寅申初為君火卯酉初為濕土辰戌初為相火巳亥初為燥金此客氣也每年三氣為司天終氣為在泉如子午之年三氣是君火乃君火司天主熱淫所勝終氣是燥金乃燥金在泉主燥淫於內其餘可類推矣倘遇壬戊甲庚丙之年皆曰太過木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍丁癸己乙辛之年皆曰不及木曰委和火曰伏明土曰卑監金曰從革水曰涸流若太過被克不及得助皆曰平運木曰敷和火曰升明土曰備化金曰審平水曰靜順此述五運六氣之主客司天在泉太過不及之大概在學者先宜熟此有定之常然後審其無定之變可也倘欲深求底蘊再考內經慎毋惑于飛疇運氣不足憑之說耳溫瘟不同論溫者溫熱也瘟者瘟疫也其音同而其病實屬不同又可瘟疫論中謂後人省水加疒為瘟瘟即溫也鞠通溫病條辨統風溫溫熱溫疫溫毒冬溫為一例兩家皆以溫瘟為一病殊不知溫熱本四時之常氣瘟疫乃天地之厲氣豈可同年而語哉夫四時有溫熱非瘟疫之可比如春令之春溫風溫夏令之溫病熱病長夏之暑溫夏末秋初之濕溫冬令之冬溫以上諸溫是書皆已備述可弗重贅而鞠通先生之書其實為治諸溫病而設也至於瘟疫之病自唐宋以來皆未詳細辨論逮至明末年間正值凶荒交迫處處瘟疫慘不堪言吳又可先生所以著瘟疫論一書所謂邪從口鼻而入則其所客內不在臟腑外不在經絡舍於伏脊之內去表不遠附近於胃乃表裡之分界是為半表半裡即針經所謂橫連膜原是也其初起先憎寒而後發熱日後但熱而無憎寒初得之二三日其脈不浮不沉而數頭痛身疼晝夜發熱日晡益甚者宜達原飲治之咸豐八載至同治紀元吾衢大兵之後繼以凶年沿門合境盡患瘟疫其時豐父子診治用方皆宗又可之法也更有頭面頸項頰腮並腫者為大頭瘟發塊如瘤遍身流走者為疙瘩瘟胸高脅起嘔汁如血者為瓜瓤瘟喉痛頸大寒熱便祕者為蝦蟆瘟一名捻頸瘟兩腮腫脹憎寒惡熱者為鸕鷀瘟遍身紫塊發出黴瘡者為楊梅瘟小兒邪郁皮膚結成大小青紫斑點者為葡萄瘟此皆瘟疫之證與溫病因時之證之藥相去徑庭決不能溫瘟混同而論也因憶又可著書正崇禎離亂之凶年鞠通立論際乾嘉升平之盛世一為瘟疫一為溫熱時不同而病亦異由是觀之溫病之書不能治瘟疫瘟疫之書不能治溫病故凡春溫風溫溫病暑溫濕溫冬溫字必從水瘟疫大頭疙瘩瓜瓤蝦蟆鸕鷀楊梅葡萄等瘟字又從疒溫瘟兩字判然不同而況病乎知我者幸弗以豐言為河漢也傷寒書統治六氣論漢長沙著傷寒論以治風寒暑濕燥火六氣之邪非僅為寒邪而設然則其書名傷寒何也蓋緣十二經脈惟足太陽在表為寒水之經凡六淫之邪為病者皆必先傷於寒水之經故曰傷寒今人都以寒水之寒字誤為寒熱之寒若此則傷寒之書專治寒邪而風暑燥濕火了不干涉矣殊不思長沙首列桂枝湯以治風明明指人統治六氣而非僅治一寒邪之意於此已露一斑若果專治寒邪理當列麻黃湯附子湯四逆理中等湯為先而不列桂枝湯為首也況又有白虎湯以治暑五苓散以治濕炙甘草湯以治燥大小承氣以治火此顯明六氣統治之書而今以為專治寒邪則誤甚矣時賢又謂傷寒論六經溫熱論三焦此兩句書更為印定眼目不知邪氣襲人皆由表而入於裡惟溫疫之氣穢濁之氣乃論三焦可也以其氣從口鼻而入先擾於上次傳中下除此而外則風寒暑濕燥火無不盡從表入況李彣謂太陽行身之表外邪皆得傷之其傷寒之書能統治六氣者可無疑矣凡學治時病者必須讀仲景傷寒論參讀時賢之書考古酌今則胸中自有風寒暑濕燥火之界限若不讀仲景之本而專讀時賢之書真所謂捨本求末矣闢俗醫混稱傷寒論人被寒所傷者謂之傷寒夫寒居六氣之一豈可混稱乎嘗考寒水之令在乎小雪大雪冬至小寒之節共主六十日有奇蓋小雪居於十月乃六陰盡出之際而寒氣方盛之時大雪冬至居十一月小寒居十二月正成發栗烈之候斯時之氣人感觸者盡屬傷寒之病勿可以大寒至驚蟄之風木春分至立夏之君火小滿至小暑之相火大暑至白露之濕土秋分至立冬之燥金等等之時所患者混同一稱傷寒然而亦有可稱者不可不知豐於前論中有謂傷寒之寒字為寒水之經之寒非寒熱之寒也凡風寒暑濕燥火無不由表而入皆必先傷於寒水之經六氣之邪僉可稱為傷寒但有不可稱者又不得不力辨其非嘗聞專治傷寒家有溫病傷寒熱病傷寒痧證傷寒瘡瘍傷寒等名不知溫病熱病皆屬伏氣痧因沙穢瘡因濕熱豈可混稱為傷寒乎尤有夾痰傷寒夾食傷寒夾氣傷寒夾血傷寒等名揆厥由來痰食氣血是為傷寒之兼證又豈可混稱為傷寒乎仲景原文從未見有此證竊疑其為杜撰也後見吳中戈存橘先生傷寒補天石中果有以上諸證之名始知其有自也雖然戈氏之書醫者不必宗之其所當宗者如無己之明理嘉言之尚論韻伯之來蘇路玉之大成誠為醫家不可少之書後學所宜奉為圭臬也至時俗混稱傷寒之證更為不通見初起嘔吐者謂為齷齪傷寒泄瀉者為漏底傷寒脅痛者為刺脅傷寒寒不甚寒熱不甚熱綿綿難愈者為癟疲傷寒即徽俗謂之混沌傷寒名目極多難以枚舉總之小雪至小寒而重感者為真傷寒風暑燥濕火先傷寒水之經者亦可稱為傷寒至溫病熱病痧症瘡瘍決不能混入傷寒兼痰食氣血者是為傷寒之兼證其餘種種不通之名皆不足論醫者須按四時之六氣而分其孰為風暑孰為燥濕究不可籠統混為傷寒病也闢時俗齷齪斑證論吾衢土俗凡患四時之感冒見有發熱嘔吐等證開口便云齷齪動手便是刮揪揪之刮之未嘗不善但其邪在肌肉者頃刻而鬆在經絡者非藥不愈最可惡者先服礬湯一碗以為治齷齪之需殊不知齷齪即方書所謂穢濁宜用芳香宣解之方反服酸寒收澀之藥益使穢濁之邪膠固氣分而無解病之期更有一種俗醫以指節括病人之身見有一條扛起者妄言為斑不知人感穢濁時邪氣機阻滯血脈不通用指節括之或粗或細必有一條見出豈可僞稱斑證更為之取出蛇斑蚤斑等等之名其謂為蛇斑者必令人服蜈蚣數條取蛇畏蜈蚣之義而庸夫俗子聽之益信不知蜈蚣之性辛溫有毒直入厥陰初患時邪之證服之極易化火更引最淺之邪而入於深曷不觀方書所云大如錦紋者為斑其色紅紫而成片或至黑色而病危是為胃熱之候古人所以用舉斑湯化斑湯之類以治之或見病人身發紅點遂稱為蚤斑而亂投草藥及至危險便說斑老難醫推其身見紅點即方書所謂小如蚊咬者為疹是為肺熱之候古人所以用升葛湯銀翹散之類以治之俗醫以僞混真豈不可嘆既以初起之時邪為齷齪斑證更禁病人勿服湯藥每見輕病轉重重病轉危此皆吾衢土俗之貽害匪淺也要之揪刮無妨所患者惟礬湯蜈蚣草藥禁藥之弊奉勸病家不可過信俗醫而自誤則幸甚矣夾證兼證論人皆謂夾證與兼證難治豐獨曰無難也曷為夾證譬如受風便是傷風宜桂枝湯之屬受寒便是傷寒宜麻黃湯之屬倘風寒兩傷者即為夾證也蓋風宜散寒宜溫溫散之方宜桂麻各半湯之屬倘或暑邪夾濕濕宜利暑宜清清利之方宜天水散之屬倘或燥氣夾火火宜涼燥宜潤涼潤之方宜清燥救肺湯之屬其餘風暑風濕風燥風火皆系夾證其治法皆可仿此至於兼證奈何假如少壯遺精當分夢之有無有者宜坎離既濟湯之類無者金鎖固精丸之類此定法也或被濕熱所觸者便為兼證利濕必傷其陰補陰必滯其濕思利濕而不傷陰者如豬苓湯六味丸之類若濕邪甚者又當先治其濕濕邪一化再澀其精可也又如老年虛損當分證之淺深淺者宜六君四物之類深者宜固本大造之類此定法也倘被風邪所客者便為兼證散風益虛其正補正必關其邪思散邪而不損正者如參蘇飲補中益氣之類若風邪甚者又當先散其風風邪一解再補其損可也又如女子經事當行必審其或先或後先則為血熱宜丹梔四物之流後則為血寒宜香砂四物之流此為定法或被寒邪所觸者即兼證也考諸方能散寒且能調經如香蘇飲之流若過盛者必須先散其寒再調其經則可矣又如婦人産後發熱必辨其屬虛屬實虛則宜補益如加味四物之流實則宜破瘀如生化失笑之流此為定法設被暑邪所感者即兼證也考諸方能清暑且治産後如竹皮大丸之流若過盛者必須先清其暑再治産後則可矣醫者能於如此圓變則治夾證兼證何難之有成方須損益論自南陽制方而始厥後唐宋元明及國朝以來成方不可勝紀焉能熟悉於胸嘗見有讀千金方者有讀醫方考者有讀景嶽新方者有讀訒庵集解者往往宗此而不知彼宗彼而不知此者不待言矣竊謂古人成方猶刻文也臨證猶臨場也即有如題之刻文慎無直抄必須師其大意移步換形庶幾中式而臨證即有對病之成方亦當諒體之虛實病之新久而損益之思成方不在多而在損益譬如二陳湯即夏苓陳草也治一切痰飲之病除去陳皮乃海藏消暑丸伏暑煩渴用之此一減而主治之法相去徑庭矣平胃散即陳蒼朴草也治一切濕氣之病加入芒硝乃女科之下胎方死胎不下用之此一加而主治之法相懸霄壤矣此損益之法也醫者知是理乎又如氣虛用四君血虛用四物倘氣血兩虛之候者二方合用名八珍湯此深一層之病而加深一層之方也利濕用五苓清熱用三石倘濕熱並盛之候者二方合用名甘露飲此亦深一層之病而加深一層之方也又如固本丸治虛勞損證減去麥冬生地名曰三才以治三焦虧證此輕一等之病而減為佐之藥也香蘇飲治四時感冒減去香附紫蘇名曰二賢以治膈中痰飲此亦輕一等之病而減為君之藥也諸如此類不可枚舉在醫者必須臨證權衡當損則損當益則益不可拘於某病用某方某方治某病得能隨機應變則沉疴未有不起也胎前産後慎藥論胎前之病如惡阻胞阻胎漏墮胎等證是也産後之病如血塊血暈等證是也婦科書中已詳可毋備述而其最要述者惟胎前産後用藥宜慎凡治胎前之病必須保護其胎古人雖有有故無殞亦無殞也大積大聚其可犯也衰其大半而止之訓奈今人膠執有故無殞之句一遇里積之證恣意用攻往往非傷其子即傷其母蓋緣忽略衰其大半之文耳竊揣胎在腹中一旦被邪盤踞攻其邪則胎必損安其胎必礙乎邪靜而籌之莫若攻下方中兼以護胎為妥此非違悖內經實今人之氣體不及古人萬一也且不但重病宜慎其藥即尋常小恙亦要留心如化痰之半夏消食之神麯寬脹之厚朴清腸之槐花涼血之丹皮茅根去寒之乾薑桂附利濕之米仁通滑截瘧之草果常山皆為犯胎之品最易誤投醫者可不警懼乎至於産後之病嘗見醫家不分虛實必用生化成方感時邪者重投古拜體實者未嘗不可虛者攻之而里益虛散之而表益虛虛虛之禍即旋踵矣又有一等病人信虛醫人信補不分虛實開口便說丹溪治産後之法每每大補氣血體虛者未嘗不可倘外有時邪者得補益劇內有惡露者得補彌留雙證迭加不自知其用補之咎耳要之胎前必須步步護胎産後當分虛實而治毫釐差謬性命攸關惟望同志者凡遇胎前産後之疴用藥勿宜孟浪慎之慎之治輕證宜細心重病宜大膽論膽欲大而心欲小此孫真人祝醫最確之語也竊謂治初起之輕證必須細心當辨其孰為風而用疏孰為寒而用溫孰為暑而用清孰為濕而用利孰為燥而用潤孰為火而用瀉尤當審其體之虛實病之新久在女子兼詢經期婦人兼詳胎産如是者則用藥庶無差忒矣倘粗心而不細者大意茫茫不分六氣所感何氣動手便用荊防病家告之有痰遂投陳夏有食遂用神楂問其何病指鹿為馬問其輕重總說無妨往往使輕淺之病日漸延深是誰之過歟聖人云不忽於細必謹於微其可略乎至若垂危之重證必須大膽見心包邪竄者當宣則宣肝風內動者當平則平脾虛氣陷者當培則培肺氣欲絶者當補則補腎液欲涸者當滋則滋更有危險之虛證速宜用參耆之屬實證用硝黃之屬寒證用薑桂之屬熱證用犀羚之屬勿宜遲緩亟亟煎嘗如是者則沉疴庶有挽救矣倘膽小而不大者當用而不敢用或用而不敢重重用恐其增變變證恐其歸怨往往姑息養奸坐觀其敗是誰之過歟古人云不入虎穴焉得虎子其可懼乎若果輕淺之證過於膽大立方不啻小題大做沉重之證過於小心慎藥無異杯水車薪其實膽大而不細心所謂暴虎馮河者誤事也細心而不大膽所謂狐疑鼠首者亦誤事也誠哉孫氏之言足為千古之醫訓矣醫家嫉妒害人論嘗觀世之同行每多嫉妒行行猶可惟醫道中最為甚焉夫醫以蘇人之困拯人之危性命為重功利為輕而可稍存嫉妒哉奈何今之醫者氣量狹窄道不求精見有一神其技者則妒之妒心一起害不勝言或謠言百出或背地破道或前用涼藥不分寒熱而改熱前用熱藥不別寒熱而改涼不顧他人之性命惟逞自己之私心總欲使有道者道晦道行者不行以遂其嫉妒之意每見病家患溫熱之病醫者投以辛涼甘涼本不齟齬但服一二劑未獲深中病者見熱渴不已心中疑懼又換一醫且明告曾延醫治而所換之醫遂不察其病因見前有寒涼之藥便咎前醫用寒涼之害不辨證之寒熱脈之遲數舌苔黃白小水清濁竟亂投溫熱之方不知溫熱之病得溫熱之藥無異火上添油立刻津干液涸而變生俄頃倘前用熱藥以治其寒亦咎其用熱藥之害總不辨其為寒為熱亂用寒涼之方不知寒證服寒涼猶如雪上加霜立使陽亡氣脫而變在須臾直至垂危尚怨前醫之誤可勝悼哉然亦有明駁前醫暗師前法而獲效者竟爾居功索人酬謝若此重財輕命只恐天理難容奉勸醫者毋懷妒忌大發婆心則幸甚矣醫毋自欺論醫者依也人之所依賴也醫毋自欺斯病家有依賴焉夫醫之為道先詳四診論治當精望色聆音辨其臟腑之病審證切脈別其虛實而醫若此可謂毋欺也至臨證之時細分部候知其何為浮主表病沉主裡病遲主寒病數主熱病何為人迎脈大之外感氣口脈大之內傷更須望其青赤黃白黑五色之所彰聞其角徵宮商羽五音之所發問其臊焦香腥腐五氣之所喜以明其肝心脾肺腎五臟之病因而用其酸苦甘辛咸五味之藥餌能如是者何欺之有惟其一種庸流欺人妄誕見病人有寒熱者一疑其為外感欺病家不知診法也不別其脈之虛實而浪投發散之劑又見病人有咳嗽者一疑其為虛損欺病家不諳醫理也不辨其體之強弱而恣用補益之方至於五色五音五氣一概不知審察焉能明其五臟之病而用其五味之藥乎如是者不獨欺人實為自欺見人喜補者遂謂虛衰喜散者遂云外感畏熱藥者便用寒涼畏涼藥者便投溫熱順病人之情意亂用醫方意不讀靈素以下諸書全用欺人之法噫醫之為道死生攸系一有欺心即藥餌妄投存亡莫卜奈何濟人之方竟視作欺人之術也吾願醫者必須志在軒岐心存仲景究四診而治病毫不自欺方不愧為醫者也古今醫書宜參考論昔賢云觀今宜鑑古無古不成今今古醫學均宜參考焉考今古醫書不能盡述姑略提其要者言之如神農本草軒轅靈素越人難經長沙玉函以及劉李張朱四大名家之書皆可備讀也蓋讀本草者可知其性有寒熱溫涼平之不同其味有酸苦甘辛咸之各異何為補正何為祛邪讀靈素者可以上明天文下達地理兼知人身臟腑經絡受病之因讀難經者可補內經脈象病因及奇經八脈之未逮讀玉函者可識傷寒雜病之源頭此皆古聖之醫書必須玩索至於四大家者即河間劉守真法多苦寒溫病熱病者須參考之東垣李明之法多升補內傷脾胃者須參考之大積大聚者須參戴人張子和攻下之法陰虛內損者須考丹溪朱彥修清補之法不特此四家以補先聖之未備可參可考而後賢所發之論偶亦有超出於四大家者如雲間李念莪西昌喻嘉言延陵吳又可金壇王宇泰會稽張介賓長洲張路玉吳郡薛立齊慈溪柯韻伯攜李沈目南錢江張隱菴是也以上諸公各有著作皆當採取亦可以備參閲考近時之醫書亦不能盡述如閲古吳葉香岩之臨證指南可知臨時之圓變用藥之靈機閲若耶章虛谷之醫門棒喝可知名家之疵謬醒醫家之聾瞶閲淮陰吳鞠通之溫病條辨可知寒傷於足經溫傷於手經閲吳門周禹載之溫熱暑疫全書可知溫熱暑疫受病之源各別此皆時賢之書亦宜備考至於長樂陳修園新安程觀泉鹽宮王孟英武進費伯雄皆有著述所傳偶或有導窾之處亦宜參閲竊思書有古今而人亦有古今古人氣體俱厚今人氣體漸薄若執古方以治今人之病不亦重乎故醫家不可執古書而不讀今書亦不可執今書而不讀古書參考古今則醫理自得中和之道矣
