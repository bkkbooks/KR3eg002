body:
  text: 卷之一冬傷於寒春必病溫大意經謂冬傷於寒春必病溫是訓人有伏氣之為病也夫冬傷於寒甚者即病則為傷寒微者不即病其氣伏藏於肌膚或伏藏於少陰至春陽氣開泄忽因外邪乘之觸動伏氣乃發又不因外邪而觸發者偶亦有之其藏肌膚者都是冬令勞苦動作汗出之人其藏少陰者都是冬不藏精腎臟內虧之輩此即古人所謂最虛之處便是容邪之處何劉松峰陳平伯諸公皆謂並無伏氣悖經之罪其何逭乎據豐論春時之伏氣有五曰春溫也風溫也溫病也溫毒也晚發也蓋春溫者由於冬受微寒至春感寒而觸發風溫者亦由冬受微寒至春感風而觸發溫病者亦由冬受微寒寒釀為熱至來春陽氣弛張之候不因風寒觸動伏氣自內而發溫毒者由於冬受乖戾之氣至春夏之交更感溫熱伏毒自內而發晚發者又由冬受微寒當時未發發於清明之後較諸溫病晚發一節也此五者皆由冬傷於寒伏而不發發於來春而成諸溫病者當辨別而分治之程曦曰推松峰與平伯皆謂並無伏氣有由來也一執雲笈七籤冬傷於汗之句一執錢氏冬傷寒水之臟之文殊不知兩家只顧一面文章全不顧春傷夏傷秋傷之訓作何等解思二先生天資高邁亦受其蒙不正其訛反助其説毋怪後之醫者統稱暴感恣用發散羌防麻桂逼汗劫津誤人性命固所不免此不得不歸咎於作俑之人也春溫考諸大家論春溫者惟嘉言與遠公精且密矣嘉言以冬傷於寒春必病溫為一例冬不藏精春必病溫又為一例既傷於寒且不藏精至春同時併發又為一例舉此三例以論溫病而詳其治遠公所論都是春月傷風之見證分出三陽若何證治三陰若何證治觀二家之論可謂明如指掌然宗嘉言不合遠公宗遠公不合嘉言反使後人無從執法其實嘉言之論遵經訓分為三例意在伏氣遠公之論皆系傷風見證意在新感總之春溫之病因於冬受微寒伏於肌膚而不即發或因冬不藏精伏於少陰而不即發皆待來春加感外寒觸動伏氣乃發焉即經所謂冬傷於寒春必病溫冬不藏精春必病溫是也其初起之證頭身皆痛寒熱無汗咳嗽口渴舌苔浮白脈息舉之有餘或弦或緊尋之或滑或數此宜辛溫解表法為先倘或舌苔化燥或黃或焦是溫熱已抵於胃即用涼解裡熱法如舌絳齒燥譫語神昏是溫熱深踞陽明營分即宜清熱解毒法以保其津液也如有手足瘛瘲脈來弦數是為熱極生風即宜卻熱息風法如或昏憒不知人不語如尸厥此邪竄入心包即宜祛熱宣竅法春溫變幻不一而足務在臨機應變可也風溫風溫之病發於當春厥陰風木行令之時少陰君火初交之際陳平伯謂春月冬季居多春月風邪用事冬初氣暖多風風溫之病多見於此其實大為不然不知冬月有熱渴咳嗽等證便是冬溫豈可以風溫名之即按六氣而論冬令如有風溫亦在大寒一節冬初二字大為不妥推風溫為病之原與春溫倣佛亦由冬令受寒當時未發腎虛之體其氣伏藏於少陰勞苦之人伏藏於肌腠必待來春感受乎風觸動伏氣而發也其證頭痛惡風身熱自汗咳嗽口渴舌苔微白脈浮而數者當用辛涼解表法倘或舌絳苔黃神昏譫語以及手足瘛瘲等證之變皆可仿春溫變證之法治之或問曰因寒觸動伏氣為春溫初起惡寒無汗因風觸動為風溫初起惡風有汗二病自是兩途豈可仿前治法答曰新感之邪雖殊伏藏之氣則一是故種種變證可同一治必須辨其孰為勞苦之輩孰為冬不藏精之人最為切要試觀病勢由漸而加其因於勞苦者可知一病津液即傷變證迭出其因於冬不藏精者又可知凡有一切溫熱總宜刻刻顧其津液在陰虛者更兼滋補為要耳又問風溫之病曷不遵仲景之訓為圭臬今觀是論並未有脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出等證豈非悖仲景之言以為醫乎曰此仲景論風溫誤治之變證也非常證也曰常證何曰太陽病發熱而渴不惡寒者為溫病此常證也又問平伯論風溫一十二條總稱暴感時氣肺胃為病鞠通雜於諸溫條中分治三焦試問以平伯為然抑亦以鞠通為然曰總宜遵內經冬傷於寒春必病溫之論庶乎宜古宜今見肺胃之證即為肺胃之病見三焦之證即為三焦之病弗宜印定可也又問春溫風溫皆有伏氣為病今時醫每逢春令見有寒熱咳嗽並無口渴之證便言風溫可乎曰可蓋春令之風從東方而來乃解凍之溫風也謂風溫者未嘗不可耳其初起治法仍不出辛涼解表之範圍也溫病嘗謂介賓之書謂溫病即傷寒治分六要五忌又可之書謂溫病即瘟疫治法又分九傳殊不知傷寒乃感冬時之寒邪瘟疫乃感天地之厲氣較之伏氣溫病大相徑庭豈可同日而語哉推溫病之原究因冬受寒氣伏而不發久化為熱必待來年春分之後天令溫暖陽氣弛張伏氣自內而動一達於外表裡皆熱也其證口渴引飲不惡寒而惡熱脈形愈按愈盛者是也此不比春溫外有寒邪風溫外有風邪初起之時可以辛溫辛涼是病表無寒風所以忌乎辛散若誤散之則變證蜂起矣如初起無汗者只宜清涼透邪法有汗者清熱保津法如脈象洪大而數壯熱譫妄此熱在三焦也宜以清涼蕩熱法倘脈沉實而有口渴譫語舌苔乾燥此熱在胃腑也宜用潤下救津法凡溫病切忌辛溫發汗汗之則狂言脈躁不可治也然大熱無汗則死得汗後而反熱脈躁盛者亦死又有大熱脈反細小手足逆冷者亦死或見痙搐昏亂脈來促結沉代者皆死醫者不可不知劉松峰曰雲笈七籤中引作冬傷於汗甚妙蓋言冬時過暖以致汗出則來年必病溫余屢驗之良然冬日嚴寒來春並無溫病以其應寒而寒得時令之正故耳且人傷於寒豈可稽留在身俟逾年而後發耶豐按冬傷於汗汗字欠妥松峰反贊其妙既謂冬傷於汗試問春夏秋三時所傷為何物耶又謂冬時過暖來年病溫此説是有伏氣又謂人傷於寒豈可稽留此説又無伏氣片幅之中如此矛盾誠為智者一失耳溫毒溫毒者由於冬令過暖人感乖戾之氣至春夏之交更感溫熱伏毒自內而出表裡皆熱又有風溫溫病冬溫誤用辛溫之劑以火濟火亦能成是病也其脈浮沉俱盛其證心煩熱渴咳嗽喉痛舌絳苔黃宜用清熱解毒法加甘草桔梗治之然有因溫毒而發斑發疹發頤喉腫等證不可不知蓋溫熱之毒抵於陽明發於肌肉而成斑其色紅為胃熱者輕也紫為熱甚者重也黑為熱極者危也鮮紅為邪透者吉也當其欲發未發之際宜用清涼透斑法治之如斑發出神氣昏蒙加犀角元參治之心法云疹發營分營主血故色紅棒喝云邪郁不解熱入血絡而成疹疹亦紅輕紫重黑危也雖然邪郁未解熱在營分但其溫毒已發皮毛與斑在肌肉為大異蓋肺主皮毛胃主肌肉所以古人謂斑屬足陽明胃病疹屬手太陰肺病疆界攸分不容混論鞠通混而未別虛谷已駁其非洵非謬也當其欲發未發之時速用辛涼解表法加細生地緑豆衣治之甚者加青黛連翹治之又有溫熱之毒協少陽相火上攻耳下硬腫而痛此為發頤之病頤雖屬於陽明然耳前耳後皆少陽經脈所過之地速當消散緩則成膿為害宜內服清熱解毒法去洋參麥冬加馬勃青黛荷葉治之連面皆腫加白芷漏蘆腫硬不消加山甲皂刺外用水仙花根剝去赤皮與根鬚入臼搗爛敷於腫處干則易之俟膚生黍米黃瘡為度又有溫熱之毒發越於上盤結於喉而成腫痹內經云一陰一陽結謂之喉痹一陰者手少陰君火也一陽者手少陽相火也二經之脈並絡於喉今溫毒聚於此間則君相之火併起蓋火動則生痰痰壅則腫腫甚則痹痹甚則不通而死矣急用玉鑰匙以開其喉繼以清熱解毒法去洋參麥冬加殭蠶桔梗牛蒡射干治之溫毒之病變證極多至於斑疹頤喉時恆所有故特表而出之晚發晚發者亦由冬令受寒當時未發發於來年清明之後夏至以前較之溫病晚發一節故名晚發病也其證頭痛發熱或惡風惡寒或有汗無汗或煩躁或口渴脈來洪數者是也亦當先辨其因寒因風而觸發者始可定辛溫辛涼之法治之但其曩受之伏寒必較溫熱之伏氣稍輕峻劑不宜孟浪如無風寒所觸者仍歸溫病論治此宜清涼透邪法加蟬衣梔殼治之如有變證可仿諸溫門中及熱病之法治之但是病與秋時之晚發相去雲泥彼則夏令之伏暑而發於秋此則冬時之伏氣而發於春慎勿以晚發同名而誤同一治耳或問曰細考風溫春溫發於大寒至驚蟄溫病溫毒發於春分至立夏界限雖分然與內經先夏至日為病溫不相符節何獨晚發一病發於清明之後夏至以前偏與內經拍合何也答曰大寒至驚蟄乃厥陰風木司權風邪觸之發為風溫初春尚有餘寒寒邪觸之發為春溫春分至立夏少陰君火司令陽氣正升之時伏氣自內而出發為溫病溫毒晚發仍是溫病不過較諸溫晚發一節也以上五證總在乎夏至之先誠與內經先夏至日為病溫皆不枘鑿矣擬用諸法辛溫解表法治春溫初起風寒寒疫及陰暑秋涼等證防風一錢五分桔梗一錢五分杏仁一錢五分去皮尖研廣陳皮一錢淡豆豉三錢加蔥白五寸煎是法也以防風桔梗祛其在表之寒邪杏子陳皮開其上中之氣分淡豉蔥白即蔥豉湯乃肘後之良方用代麻黃通治寒傷於表表邪得解即有伏氣亦冀其隨解耳涼解裡熱法治溫熱內熾外無風寒及暑溫冬溫之證鮮蘆根五錢大豆卷三錢天花粉二錢生石膏四錢生甘草六分新汲水煎服溫熱之邪初入於胃者宜此法也蓋胃為陽土得涼則安故以蘆根為君其味甘其性涼其中空不但能去胃中之熱抑且能透肌表之邪誠涼而不滯之妙品大勝尋常寒藥佐豆卷之甘平花粉之甘涼並能清胃除熱更佐石膏涼而不苦甘草瀉而能和景嶽名為玉泉飲以其治陽明胃熱有功凡寒涼之藥每多敗胃惟此法則不然清熱解毒法治溫毒深入陽明劫傷津液舌絳齒燥西洋參三錢大麥冬三錢去心細生地三錢元參一錢五分金銀花二錢連翹二錢去心加緑豆三錢煎服此法治溫熱成毒毒即火邪也溫熱既化為火火未有不傷津液者故用銀翹緑豆以清其火而解其毒洋參麥冬以保其津元參細地以保其液也卻熱息風法治溫熱不解劫液動風手足瘛瘲大麥冬五錢去心細生地四錢甘菊花一錢羚羊角二錢鉤藤鉤五錢先將羚羊角煎一炷香再入諸藥煎凡溫熱之病動肝風者惟此法最宜首用麥冬細地清其熱以滋津液菊花羚角定其風而寧抽搐佐鉤藤者取其舒筋之用也祛熱宣竅法治溫熱濕溫冬溫之邪竄入心包神昏讝語或不語舌苔焦黑或笑或痙連翹三錢去心犀角一錢川貝母三錢去心鮮石菖蒲一錢加牛黃至寶丹一顆去蠟殼化沖是法治邪入心包之證也連翹苦寒苦入心寒勝熱故瀉心經之火邪經曰火淫於內治以鹹寒故兼犀角鹹寒之品亦能瀉心經之火邪凡邪入心包者非特一火且有痰隨火升蒙其清竅故用貝母清心化痰菖蒲入心開竅更用牛黃至寶之大力以期救急扶危於俄頃耳辛涼解表法治風溫初起風熱新感冬溫襲肺咳嗽薄荷一錢五分蟬蛻一錢去足翅前胡一錢五分淡豆豉四錢栝蔞殼二錢牛蒡子一錢五分煎服如有口渴再加花粉此法取乎辛涼以治風溫初起無論有無伏氣皆可先施用薄荷蟬蛻輕透其表前胡淡豉宣解其風葉香岩云溫邪上受首先犯肺故佐蔞殼牛蒡開其肺氣氣分舒暢則新邪伏氣均透達矣清涼透邪法治溫病無汗溫瘧渴飲冬溫之邪內陷鮮蘆根五錢石膏六錢煨連翹三錢去心竹葉一錢五分淡豆豉三錢緑豆衣三錢水煎服此治溫病無汗之主方其伏氣雖不因風寒所觸而發然亦有有汗無汗之分無汗者宜透邪有汗者宜保津一定之理也凡清涼之劑涼而不透者居多惟此法清涼且透蘆根中空透藥也石膏氣輕透藥也連翹之性升浮竹葉生於枝上淡豆豉之宣解緑豆衣之輕清皆透熱也伏邪得透汗出微微溫熱自然達解耳清熱保津法治溫熱有汗風熱化火熱病傷津溫瘧舌苔變黑連翹三錢去心天花粉二錢鮮石斛三錢鮮生地四錢麥冬四錢去心參葉八分水煎服此治溫熱有汗之主方汗多者因於裡熱熏蒸恐其傷津損液故用連翹花粉清其上中之熱鮮斛鮮地保其中下之陰麥冬退熱除煩參葉生津降火清涼蕩熱法治三焦溫熱脈洪大而數熱渴譫妄連翹四錢去心西洋參二錢石膏五錢煨生甘草八分知母二錢鹽水炒細生地五錢加粳米一撮煎服是法也以仲聖白虎湯為主治其三焦之溫熱也連翹洋參清上焦之熱以保津膏甘粳米清中焦之熱以養胃知母細地瀉下焦之熱以養陰潤下救津法治熱在胃腑脈沉實有力壯熱口渴舌苔黃燥熟大黃四錢元明粉二錢粉甘草八分元參三錢麥冬四錢去心細生地五錢流水煎服陽明實熱之證當用大小承氣急下以存津液但受溫熱之病弱體居多雖有是證不能遽用是藥故以仲聖調胃承氣為穩且芒硝改為元明粉取其性稍緩耳合用鞠通增液湯方更在存陰養液之意清涼透斑法治陽明溫毒發斑石膏五錢煨用生甘草五分銀花三錢連翹三錢去心鮮蘆根四錢豆卷三錢井水發加新荷錢一枚煎服如無用乾荷葉三錢亦可凡溫熱發斑者治宜清胃解毒為主膏甘治之以清胃銀翹治之以解毒更以蘆根豆卷透發陽明之熱荷錢者即初發之小荷葉也亦取其輕升透發之意熱勢一透則斑自得化矣備用成方葳蕤湯治風溫初起六脈浮盛表實壯熱汗少者先以此方發表葳蕤白薇羌活葛根麻黃川芎木香杏仁石膏甘草共十味水煎日三服豐按風溫之病因風觸發發熱有汗不可汗之今謂汗少者風必兼寒可知故兼用羌葛麻黃倘汗多者不宜浪用如春溫之病因寒觸發熱重無汗體素盛者此方權可用之弱者尚嫌太猛耳銀翹散治風溫溫病冬溫等證金銀花連翹苦桔梗薄荷荊芥穗淡豆豉牛蒡子竹葉生甘草鮮蘆根湯煎服小定風珠方治溫病厥而且厄脈細而徑者生龜版真阿膠淡菜雞子黃加童便一杯沖服大定風珠方治溫熱爍陰或誤表妄攻神倦瘛瘲脈氣虛弱舌絳苔少時時欲脫者大生地生白芍真阿膠麥冬生龜版生鱉甲生牡蠣雞子黃火麻仁五味子炙甘草水煎服豐按以上三方皆鞠通先生所制銀翹散方極輕靈風溫冬溫初起者用之每多應手至於大小定風珠似乎膩滯非脈證審確不可輕用消毒犀角飲治風熱之毒喉腫而疼發斑發疹防風荊芥牛蒡子甘草犀角水煎服如熱盛加連翹薄荷黃芩黃連連翹敗毒散治時毒發頤連翹天花粉牛蒡子柴胡荊芥防風升麻桔梗羌活獨活紅花蘇木川芎歸尾粉甘草水煎服如兩頤連面皆腫加白芷漏蘆堅腫不消加皂刺穿山甲大便燥結加酒炒大黃犀角地黃湯治胃火熱盛陽毒發斑吐血衄血大生地生白芍牡丹皮犀角水煎服熱甚如狂者再加黃芩三黃石膏湯治傷寒溫毒表裡俱盛或已經汗下或過經不解三焦大熱六脈洪盛及陽毒發斑黃連黃芩黃柏石膏梔子麻黃淡豆豉加薑棗細茶入煎熱服涼膈散治溫熱時行表裡實熱及心火亢盛目赤便閉胃熱發斑連翹梔子黃芩薄荷大黃芒硝甘草加竹葉煎服一方加白蜜一匙豐按以上五方皆治時風溫熱之毒而成發斑發疹發頤喉腫等證在體實者皆可施之虛者俱宜酌用九味羌活湯治感冒四時不正之氣傷寒傷風溫病熱病羌活防風細辛蒼朮川芎白芷黃芩生地甘草加生薑蔥白煎豐按張元素制是方者必欲人增減用之如傷寒傷風初起者黃芩生地斷斷難施溫病熱病初發者羌細蒼防又難輒用可見醫方不能膠守此所謂能使人規矩不能使人巧也臨證治案春溫過汗變症城東章某得春溫時病前醫不識遂謂傷寒輒用荊防羌獨等藥一劑得汗身熱退清次劑罔靈復熱如火大渴飲冷其勢如狂更醫治之謂為火證竟以三黃解毒為君不但熱勢不平更變神昏瘛瘲急來商治於豐診其脈弦滑有力視其舌黃燥無津豐曰此春溫病也初起本宜發汗解其在表之寒所以熱從汗解惜乎繼服原方過汗遂化為燥又如苦寒遏其邪熱以致諸變叢生當從邪入心包肝風內動治之急以祛熱宣竅法加羚羊鉤藤服一劑瘛瘲稍定神識亦清惟津液未回唇舌尚燥守舊法除去至寶菖蒲加入沙參鮮地連嘗三劑諸恙咸安春溫甫解幾乎誤補三湘劉某之子忽患春溫熱渴不解計有二十朝來始延豐診脈象洪大鼓指舌苔灰燥而干既以涼解裡熱法治之次日黎明復來邀診詣其處見幾上先有藥方二紙一補正回陽一保元斂汗劉曰昨宵變證故延二醫酌治未識那方中肯即請示之豐曰先診其脈再議劉某伴至寢所見病者覆被而臥神氣尚清汗出淋漓身涼如水六脈安靜呼吸調勻豐曰公弗懼非脫汗也乃解汗也曰何以知之曰脈靜身涼故知之也倘今見汗防脫投以溫補必阻其既解之邪變證再加遂難治矣喬梓仍信豐言遂請疏方思邪方解之秋最難用藥補散溫涼概不可施姑以蔞皮暢其氣分俾其餘邪達表穭豆衣以皮行皮使其盡透肌膚蓋汗為心之液過多必損乎心再以柏子茯神養其心也加沙參以保其津細地以滋其液米仁甘草調養中州更以浮小麥養心斂汗連服二劑肢體回溫汗亦收住調治半月起居如昔矣或問曰先生嘗謂凡學時病必先讀仲景之書曾見傷寒論中漏汗不止而用附子今見大汗身涼而用沙參細地能不令人駭然請詳其理答曰用附子者其原必寒其陽必虛今用沙地者其原乃溫其陰乃傷一寒一溫當明辨之又問春溫之病因寒觸動豈無寒乎曰子何迂也須知溫在內寒在外今大汗淋漓即有在外之寒亦當透解故不用附子以固其陽而截其既解溫邪之路用沙地以滋津液而保其既傷肺腎之陰若執固陽之法必使既散之邪復聚子知是理乎風溫入肺胃誤作陰虛膩補增劇云岫孫某平素清癯吸煙弱質患咳嗽熱渴計半月矣前醫皆以為陰虛肺損所服之藥非地味阿膠即沙參款麥愈治愈劇始來求治於豐按其脈搏大有力重取滑數舌絳苔黃熱渴咳嗽此明是風溫之邪盤踞肺胃前方盡是滋膩益使氣機閉塞致邪不能達解當暢其肺清其胃用辛涼解表法加蘆根花粉治之服二劑胸次略寬咳亦暢快氣分似獲稍開復診其脈稍緩但沉分依然舌苔化燥而灰身熱如火口渴不寐此溫邪之勢未衰津液被其所劫也姑守舊法減去薄荷加入石膏知母服至第三劑則肌膚微微汗潤體熱退清舌上津回脈轉緩怠繼以調補日漸而安風溫誤補致死里人範某患風溫時病藥石雜投久延未愈請豐診視視其形容憔悴舌苔尖白根黃脈來左弱右強發熱纏綿不已咳嗽勤甚痰中偶有鮮血此乃賦稟素虧風溫時氣未罄久化為火刑金劫絡理當先治其標緩治其本遂以銀翹散去荊芥桔豉加川貝兜蟬此雖治標實不礙本倘見血治血難免不入虛途病者信補不服復請原醫仍用滋陰涼血補肺之方另服人參燕窩不知溫邪得補益不能解日纍日深竟成不起嗚呼醫不明標本緩急誤人性命固所不免矣風溫夾濕南鄉梅某望七之年素來康健微熱咳嗽患有數朝時逢農事方興猶是勤耕緑野加冒春雨則發熱忽熾咳嗽頻頻口渴不甚引飲身痛便瀉有謂春溫時感有言漏底傷寒所進之方僉未應手延豐診治按其脈濡數之形舌苔黃而且膩前恙未除尤加胸悶溺赤此係風溫夾濕之證上宜清暢其肺中宜溫化其脾以辛涼解表法去蔞殼加葛根蒼朮神麯陳皮治之服二劑身痛已除便瀉亦止惟發熱咳嗽口渴喜涼似乎客濕已解溫熱未清當步原章除去蒼朮神麯加入紹貝蔞根蘆根甘草迭進三劑則咳嗽漸疏身熱退淨復診數次諸恙若失矣胃虛溫病海昌張某於暮春之初突然壯熱而渴曾延醫治胥未中機邀豐診之脈駛而躁舌黑而焦述服柴葛解肌及銀翹散毫無應驗推其脈證溫病顯然刻今熱勢炎炎津液被劫神識模糊似有逆傳之局急用石膏知母以祛其熱麥冬鮮斛以保其津連翹竹葉以清其心甘草粳米以調其中服之雖有微汗然其體熱未衰神識略清舌苔稍潤無如又加厄逆脈轉來盛去衰斯溫邪未清胃氣又虛竭矣照前方增入東洋參刀豆殼服下似不齟齬遍體微微有汗熱勢漸輕厄逆亦疏脈形稍緩繼以原法服一煎諸恙遂退後用金匱麥門冬湯為主調理匝月而安胃實溫病山陰沈某發熱經旬口渴喜冷脈來洪大之象舌苔黃燥而焦豐曰此溫病也由伏氣自內而出宜用清涼透邪法去淡豉竹葉緑豆衣加杏仁蔞殼花粉甘草治之服一劑未中肯綮更加譫語神昏脈轉實大有力此溫邪熾盛胃有燥屎昭然改用潤下救津法加杏霜枳殼治之午前服下至薄暮腹內微疼先得矢氣數下交子夜始得更衣有堅燥黑屎十數枚繼下溏糞色如敗醬臭不可近少頃遂熟寐矣鼾聲如昔膚熱漸平至次日辰牌方醒醒來腹內覺飢啜薄粥一碗復脈轉為小軟舌苔已化津液亦生豐曰病全愈矣當進清養胃陰之藥服數劑精神日復耳程曦曰斯二症皆是溫病見證似乎相仿一得人參之力一得承氣之勳可見學醫宜參脈證一加厄逆脈轉洪形便知其為胃氣之虛一加譫語脈轉實大便知其為胃氣之實論其常證相去不遠見其變證虛實攸分臨證之秋苟不審其孰虛孰實焉能迎刃而解耶有孕發斑建德孫某之妻懷胎五月忽發溫毒之病延豐診之已發斑矣前醫有用辛溫發散有用補養安胎不知溫毒得辛溫愈熾得補養彌盛是以毒勢益張壅滯肌肉而發為斑其色紫者胃熱盛也脈數身熱苔黃而焦此宜解毒清斑不宜專用安補遂以石膏蘆根透陽明之熱黃芩鮮地清受灼之胎佐連翹甘草以解毒荷葉以升提服一帖身熱稍清斑色退淡惟脈象依然數至舌苔未見津回仍守舊章重入麥冬少增參葉繼服二帖諸恙盡退後用清補之法母子俱安溫毒發疹古越胡某之郎年方舞象忽患熱渴咳閉已半月矣前醫罔效病勢日加沉重遣人延豐診治詣其寓所先看服過三方皆是沙參麥冬桑皮地骨清金止咳等藥審其得病之時始則發熱咳嗽今更加之胸閉矣診其脈兩寸俱盛此明系溫熱之毒盤踞於上初失宣氣透邪之法頓使心火內熾肺金受刑蓋肺主皮毛恐溫毒外聚膚腠而發為疹遂令解衣閲之果見淡紅隱隱乘此將發未透之際恰好輕清透劑以治之宜以辛涼解表法去蔞殼加荷葉緑豆衣西河柳葉服下遂鮮紅起粒再服漸淡漸疏而熱亦減咳亦平繼以清肅肺金之方未及一旬遂全瘥耳喉痹急證城東陳某之室偶沾溫毒而成喉痹來邀診治見其頸腫牙閉不能納食惟湯水略為可咽脈象浮中不著沉分極數豐曰此溫毒之證過服寒涼則溫毒被壓益不能化索前方一閲果然據愚意理當先用溫宣解其寒涼藥氣俟牙松腫減而後以涼劑收功滿座皆曰然遂以穀精紫菀開其喉痹薄荷荊芥宣散風邪橘紅快膈化痰甘草瀉火解毒桔梗載諸藥之性在上仍能開暢咽喉細辛治喉痹有功且足少陰本藥以少陰之脈循喉嚨也速令煎嘗另用玉鑰匙即馬牙硝錢半蓬砂五分殭蠶三分大泥冰片一分擂細吹喉令涎多出自日晡進藥至二更時候牙關略展忽作咳嗽連聲次日復邀診視告以病情豐曰有生機也脈形稍起苔色純黃此溫毒透達之象改以元參細地紹貝牛蒡參葉射干大洞果金果欖等藥迭進三劑頸腫盡消咽喉暢利咳嗽亦漸愈矣或問曰觀先生數案皆用法而不用湯嘗見古人治斑疹頤喉皆不出吳氏舉斑湯錢氏升葛湯活人玄參升麻湯東垣普濟消毒飲等方方內皆用升麻竊思斑疹賴其透發頤喉借其升提今先生舍而不用者是何意也答曰吳淮陰雲升騰飛越太過之病不當再用升提説者謂其引經亦愚甚矣誠哉非謬也豐深有味乎斯言即遇當升透之病莫如荷葉桔梗為穩升麻升散力速他病為宜於斑疹頤喉究難用耳伏氣晚發若耶趙某頗知醫理偶覺頭痛發熱時或惡風自以為感冒風邪用辛溫散劑熱勢增重來迓於豐脈象洪滑而數舌根苔黃時欲煩躁口不甚渴豐曰此晚發證也不當辛散宜乎清解之方病者莞爾而笑即謂晚發在乎秋令春時有此病乎見其几上有醫書數種內有葉香岩醫效祕傳隨手翻出使閲閲之而增愧色遂請賜方以辛涼解表法加蘆根豆卷治之連服三煎一如雪汙拔刺諸恙咸瘳
