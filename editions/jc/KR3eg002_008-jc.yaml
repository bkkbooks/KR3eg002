body:
  text: 卷之八冬傷於寒大意經曰冬傷於寒謂交立冬之後寒氣傷人其能固密者何傷之有一有不謹則寒遂傷於寒水之經即病寒熱無汗脈來浮緊名曰傷寒是也一交春令便不可以傷寒名之然冬令受寒有淺深之別焉深者為中淺者為冒蓋中寒者寒邪直中於三陰之裡故有吐瀉腹痛急宜熱劑祛寒冒寒者寒邪冒於軀殼之外則有寒熱身疼不難一汗而愈傷寒中寒冒寒略述其概猶有冬溫之證不可不詳冬溫者冬應寒而反溫非其時而有其氣人感之而即病者是也宜用辛涼之法慎勿誤用麻桂青龍若誤用之必變證百出矣此四者乃冬時即病之新感也倘受微寒微溫之氣當時未發必待來春而發者便是伏氣之病須別諸溫而治之或問曰曾見東垣之書已有冬傷於寒春必病溫等論先生拾前人之唾餘竟以為獨開生面之創欺人乎抑亦自欺之甚也答曰子言過矣豐亦見此事難知之內有論四篇所云都是五行生剋有餘不足所勝所不勝之理其義難明誠難知之書也豐今分論八篇以為時證提綱其理透徹閱者易知明出冬傷於寒之新感所見何證冬傷於寒春必病溫之伏氣所見何證一一詳明瞭如指掌與東垣之論意思懸殊何嘗拾其唾餘以為己出耶此猶應試共一題目而文字實不雷同奚敢欺人復自欺耳然乎否乎傷寒傷寒者由冬令之寒邪傷於寒水之經也考諸賢之書皆謂霜降之後春分以前有感觸者是為傷寒據六氣而推之似乎不然蓋霜降之後猶是燥金主氣有感之者是涼氣也如或天氣大寒即金匱所謂未至而至也春分以前正是風木司權有感之者是風邪也如或天氣大寒即金匱所謂至而不去也若此則界限分矣其實傷寒之病確在乎立冬之後寒水主政之時一交春令風木主政便不可以傷寒名之即有寒熱為病與傷寒相似者便是先賢所謂春應溫而反寒寒疫之病也夫傷寒之為病頭疼身痛寒熱無汗脈來浮緊者宜用辛散太陽法去前胡紅棗加紫蘇蔥白治之如體實邪盛者仲聖麻黃湯亦可用之若果有汗脈浮而緩便是傷風之病倘誤用之變證蜂起矣此略述寒邪初傷太陽寒水之經之證也其傳經兩感合痛並病及誤治變證壞證仲景書中細詳可毋重贅豐嘗謂凡學時病者必須參讀仲景傷寒論庶可融會貫通否則不可以言醫也中寒中寒者交一陽之後時令過於嚴寒突受寒淫殺厲之氣卒然腹痛面青吐瀉四肢逆冷手足攣蜷或昏閉身涼或微熱不渴等證丹溪曰倉卒中寒病發而暴難分經絡溫補自解斯說似乎滅裂其實有三陰之別焉蓋太陰中寒則脘中作痛少陰則臍腹作痛厥陰則少腹作痛見證既分更當審其脈象如沉緩中太陰沉細中少陰沉遲中厥陰若此別之庶幾導窾如果脈微欲絕昏不知人問之不能答似此難分經絡始可遵丹溪用溫補之劑急擬挽正回陽法治之三陰中寒皆以甘熱祛寒法治之若寒中太陰以乾薑為君少陰以附子為君厥陰以吳萸為君吐甚加藿香豆蔻瀉甚加蒼朮木香筋攣者佐以木瓜橘絡呃逆者佐以柿蒂丁香臨證之間切宜細辨而治庶無貽誤冒寒冒寒之病偶因外冒寒邪較傷寒則輕比中寒甚緩蓋傷寒傷乎六經中寒直中乎里惟冒寒之病乃寒氣罩冒於軀殼之外而未傳經入里也是以遍體痠疼頭亦微痛畏寒發熱而乏汗脈象舉之而有餘宜辛溫解表法治之服藥之後務宜謹避風寒覆被而臥俾其微微汗出而解否則傳經入里當審何經而分治之倘或伏而不發來年必發為春溫風溫等病不可以不知也冬溫昔賢謂冬應寒而反溫非其時而有其氣人感之而即病者名曰冬溫是也其勞力辛苦之人動作汗出溫氣乘襲多在於表其冬不藏精之人腎經不足溫氣乘襲多在於里冬溫雖發於冬時然用藥之法與傷寒迥別蓋溫則氣泄寒則氣斂二氣本屬相反誤用辛溫變證迭出矣其證頭痛有汗咳嗽口渴不惡寒而惡熱或面浮或咽痛或胸疼陽脈浮滑有力者乃溫邪竄入肺經也宜用辛涼解表法加連翹象貝治之口渴甚者溫邪入胃腑也再加蘆根花粉治之如或下利陰脈不浮而滑溫邪已陷於裡也宜以清涼透邪法加葛根黃芩治之倘熱勢轉劇神氣昏憒讝語錯亂舌苔轉黑者不易治也勉以祛熱宣竅法治之紫雪丹亦可用之種種變證不能盡述須仿諸溫門中之法可也或問冬溫發熱而不惡寒倘惡寒者為何病也答曰冬溫惡寒偶亦有之良由先感溫氣即被嚴寒所侵寒在外而溫在裡宜用辛溫解表法先去寒邪繼用涼解裡熱法而清溫氣又問曰傷寒冒寒皆惡寒何以別之曰傷寒冒寒初起無口渴以此別之曰溫邪當發為冬溫倘其微者伏而不發為何病也曰伏而不發來春必變為溫毒也凡治時病者新邪伏氣切要分明庶不至千里毫釐之失又問先生之書專為六氣而設風寒暑濕燥皆已詳明何獨火證不詳恐為不全之書而火證可補述否答曰子不知君火秉權之候有溫病溫毒也相火主政之時有熱病暑病也君相司令而病者非火證而何何不全之有哉況火為陽邪其證最著如脈數有力舌苔黃燥或目赤或口渴或喉痛或溺紅皆火證也法當清涼治之其餘五志之火龍雷之火悉屬內傷茲不論之擬用諸法辛散太陽法見前挽正回陽法見前甘熱祛寒法治寒邪直中三陰之證甘草二錢炙淡乾薑一錢淡附片一錢淡吳萸一錢用開水略煎冷服此即仲景四逆湯也擬加吳萸之大熱祛厥陰之寒邪以之治寒中三陰最為中的訒庵原解曰寒淫於內治以甘熱故以薑附大熱之劑伸發陽氣表散寒邪甘草亦散寒補中之品又以緩薑附之上僭也必冷服者寒盛於中熱飲則格拒不納經所謂熱因寒用又曰治寒以熱涼而行之是也辛涼解表法見前清涼透邪法見前祛熱宣竅法見前辛溫解表法見前涼解裡熱法見前備用成方麻黃湯治傷寒太陽病惡寒發熱頭痛項強無汗而喘脈浮而緊者麻黃桂枝杏仁甘草水煎溫服覆取微汗葛根湯治傷寒太陽未罷又傳陽明脈浮長緣緣面赤頭痛連額發熱惡寒而無汗目痛鼻乾不得眠等證葛根麻黃桂枝白芍甘草生薑大棗水煎溫服取微似汗小柴胡湯治傷寒少陽病往來寒熱口苦耳聾脅滿脈弦目眩不欲食心煩喜嘔及婦人傷寒熱入血室等證柴胡人參制夏黃芩甘草生薑大棗水煎溫服理中湯治傷寒太陰病自利不渴寒多而嘔腹痛便溏脈沉無力或厥冷拘急或結胸吐蛔及感寒霍亂人參白朮炮姜炙草本方加附子名附子理中湯真武湯治少陰傷寒腹痛小便不利四肢沉重疼痛自下利者此為有水氣或咳或嘔或小便利及太陽病發汗汗出不解仍發熱心悸頭眩筋惕肉瞤振振欲擗地氣虛惡寒附子白芍白朮茯苓加生薑煎服四逆湯治三陰傷寒身痛腹痛下痢清穀惡寒不渴四肢厥冷或反不惡寒面赤煩躁裡寒外熱或乾嘔或咽痛脈沉微細欲絕附子乾薑炙甘草水煎冷服豐按傷寒之方計有一百一十三道長沙書中已全備矣凡學醫者必須熟玩今錄此六方不過明六經傷寒之用其寒邪化熱及傳變諸方不能盡錄當閱傷寒之書自明著矣千金陽旦湯治冬溫脈浮發熱項強頭痛桂枝白芍黃芩甘草加薑棗煎服千金陰旦湯治冬溫內寒外熱肢節疼痛中挾寒食即陽旦湯加乾薑豐按陽旦湯主治先感冬溫又被風寒所遏之病陰旦湯主治體質本寒忽受冬溫之病如咳嗽口渴甚者薑桂究難浪用凡一切溫熱之病最忌辛溫之藥偶或用之非本質屬寒即外加寒氣倘拘於陽旦陰旦為冬溫一定之方不亦惑乎臨證治案傷寒調治失法變證須江毛某患傷寒之病壯熱不退計半月來前醫當汗不汗當下不下調治失法變為神昏譫語循衣摸床舌苔黃燥脈來沉實此傷寒誤治之變證也速宜攻下之劑蕩熱保津倘以硝黃為砒鴆者則不可救即以大承氣湯加生地石膏煎一大劑午後服頭煎未見動靜薄暮服次煎至四更時分得硬屎數十枚譫語漸少手足漸定肌膚微汗身熱退清神識亦稍省矣次日復邀豐診脈形仍實不柔舌苔尚少津液此餘熱未淨也當守原方再服一帖其兄恐藥力太過豐曰必要脈象轉柔舌苔轉潤裡熱始盡否則餘邪復聚遂難治矣復將原方煎服服下又得硬屎數枚其兄急來問曰次煎可服否豐曰往診再議幸得脈轉平緩舌苔亦見有津改用仲景炙甘草湯除去桂枝薑棗加入柏子茯神連服數煎得全瘥耳程曦曰凡治病必以脈舌為主若遇神昏譫語循衣摸床之證倘其脈見軟弱者舌淡苔微者皆不可攻也必須脈來沉實或大有力舌苔黃燥或起芒刺方可攻之以上見證有虛有實或補或攻當細別之又不可執於承氣一法也傷寒吐蛔新定章某患傷寒六七日來身熱如焚前醫初用辛散繼用苦寒熱仍不退更加嘔逆吐蛔四末微冷急來求治於豐診其脈細小而沉舌苔白薄豐曰此陰陽錯亂之證將成蛔厥之徵思先哲云雜病吐蛔責於熱傷寒吐蛔責於寒即用椒姜以溫其中桂枝以透其表參附以扶其正連梅以安其蛔更佐豆蔻和中止嘔也令服一劑嘔逆已定四末轉溫惟軀熱未清姑守舊方除去薑附加入芩柴一服中機後議數方並效調理半月得安陽體中寒仍用熱劑而愈瀔水姜某稟體屬陽生平畏嘗熱藥一日腹中作痛比豐診之兩手之脈皆沉遲舌根苔白豐曰此寒氣中於太陰理當熱藥祛寒曰素不受熱藥奈何曰既不任受姑以溫中化氣為先中機最妙否則再商即以豆蔻砂仁吳萸烏藥木香厚朴蘇梗煨姜服之未驗復診其脈益見沉遲四肢逆冷更甚豐曰寒邪深入誠恐痛厥非薑附不能效也雖然陽臟亦當先理其標即用甘熱祛寒法加肉桂白芍治之遂中病機腹痛頓減脈形漸起手足回溫改用調中始得安適可見有病有藥毋拘稟體陰陽但陽體中寒辛熱不宜過劑陰質患熱寒涼不可過投遵內經衰其大半而止最妥冬溫肺胃合病城北方某木火體質偶患冬溫約有半月矣治療乏效轉請豐醫按之脈形洪數兩寸極大苔黃舌絳口渴喜涼喘咳頻頻甚則欲嘔痰內時有鮮紅思內經有肺咳之狀咳甚唾血胃咳之狀咳甚欲嘔之文此顯系肺胃受邪明若觀火矣見前方都是滋陰滋血之劑宜乎冰炭耳豐用清宣金臟法去桔梗加花粉鮮斛治之迭進五劑諸證漸平調治旬余遂愈冬溫新感適值經行徽歙鮑某之女閨中待字經水素不調勻一月兩期難免血海無熱一日忽患冬溫發熱咳嗽胸閉喉疼天癸又至斯時用芩連梔子以卻其溫實有礙乎經事倘用歸芎艾葉以調其經實有礙乎溫氣細推其證口不作渴其邪在肺而不在胃腹不作痛其經因熱而不因寒古人雖謂室女莫重於調經然今溫邪告急不得不先治標其實清肺之方治上而不妨下遂用牛蒡象貝桔梗射干桑葉薄荷蔞皮叭杏青果為引連服三劑軀熱退清咳嗽亦衰大半但腹內轉疼天癸滴瀝靡盡仍照原方益以香附澤蘭又服數煎諸恙平復矣冬溫傷陰將欲成損豐於冬至赴龍掃墓經過安仁街適有楊某患冬溫未愈有相識者謂豐知醫楊即懇診查其所服之方非辛溫散邪即苦寒降火皆未得法其脈細小滑數咳嗽痰紅發熱顴赤此溫熱傷陰之證也當用甘涼養陰辛涼透熱虛象已著急急堤防若再蔓延必不可挽即用清金寧絡法去枇杷葉麥冬細地改為大地再加丹皮地骨川貝蟬衣治之服至五帖熱退紅止矣豐返復過其處見病者面有喜色謂先生真神醫也病勢減半惟賸咳嗽數聲日晡顴赤而已診之脈亦稍和此欲愈之象也姑照原方去旱蓮蟬蛻加龜版鱉甲令其多服可以免虛歲暮以茶食來謝始知其恙全可
