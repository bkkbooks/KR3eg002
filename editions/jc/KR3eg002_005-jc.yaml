body:
  text: 卷之五夏傷於暑秋必痎瘧大意經云夏傷於暑秋必痎瘧謂夏令傷於暑邪甚者即患暑病微者則舍於營復感秋氣涼風與衛並居則暑與風涼合邪遂成痎瘧矣景岳云痎者皆也總瘧之稱也瘧者虐也凌虐之義也瘧之為病非止一端當分晰而冶之考古有暑瘧風瘧寒瘧濕瘧溫瘧瘴瘧癉瘧牝瘧痰瘧食瘧疫瘧鬼瘧虛瘧勞瘧瘧母三日瘧之名臨證之時不可不辨治也暑瘧者惡寒壯熱煩渴引飲也風瘧者寒少熱多頭疼自汗也寒瘧者寒長熱短頭疼無汗也濕瘧者寒重熱輕一身盡痛也溫瘧則先熱後寒因於冬令伏氣瘴瘧則發時昏悶因感山嵐瘴氣癉瘧則獨熱天寒牝瘧則寒多熱少又有頭痛而眩瘧發昏迷為痰瘧寒熱交併噫氣惡食為食瘧沿門合境證皆相似為疫瘧寒熱日作多生恐怖為鬼瘧元氣本虛感邪患瘧為虛瘧瘧疾患久遇勞即發為勞瘧經年不愈結成痞塊藏於脅腹為瘧母正氣本虛邪客於腑間兩日而作者為三日瘧更有似瘧非瘧之伏暑亦因伏天受暑而發於秋最難速愈倘秋時炎蒸於夏而內並無伏氣其見證與陽暑相似者名曰秋暑此二證皆在乎秋今附論於斯蓋恐誤為瘧治耳暑瘧暑瘧者多因長夏納涼感受陰暑暑汗不出則邪遂伏於內直待秋來加冒涼氣而發先賢云暑氣內伏者陰氣也秋涼外束者陰邪也新邪與衛氣並居則內合伏暑故陰陽相搏而瘧作矣其證惡寒壯熱口渴引飲脈來弦象或洪或軟或著衣則煩去衣則凜肌膚無汗必待汗出淋漓而熱始退治宜清營捍瘧法治之如渴甚者麥冬花粉佐之凡瘧連日而發者則病淺間日而發者則病深間二日而發者則愈深矣漸早為輕因正氣勝而外出漸晚為重因邪氣勝而內入初起多實宜以祛邪為先患久多虛宜以養正為主醫者須分淺深輕重虛實新久而治之則庶幾投劑有效耳張景岳曰傷暑為瘧何謂陰邪蓋陽暑傷氣其證多汗感而即發邪不能留其留藏不去者惟陰暑耳以其無汗也故凡患瘧者必因於盛暑之時貪涼取快不避風寒或浴以涼水或澡於河流或過食生冷壯者邪不能居未必致病怯者蓄於營衛則所不免但外感於寒者多為瘧內傷於寒者多為痢使能慎此二者則瘧痢何由來也風瘧經云夏暑汗不出者秋成風瘧金鑑謂風瘧先傷於寒後傷於風據此二說而論是證之因亦由長夏先受陰暑至秋感風而發也然而有暑無風惟病暑有風無暑惟病風必風暑合邪始成瘧病此雖與暑瘧得病之因無異發病之時亦同但其見證自有攸分不可以不辨也蓋風瘧之為病寒少熱多不似暑瘧惡寒壯熱或著衣則煩去衣則凜風瘧則頭疼自汗出不似暑瘧肌膚無汗必待汗出淋漓而熱始退風瘧之脈弦而兼浮不似暑瘧脈象純弦或洪或軟若此分別投劑自合拍耳初宜辛散太陽法去羌活加秦艽治之必俟寒熱分清始可進和解之法總當細審其因可散則散可和則和可補則補可截則截全在臨時活法耳江誠曰細觀暑瘧風瘧皆由長夏感受陰暑併發於秋但暑瘧因秋涼所觸風瘧因秋風所觸以此別之毫釐無謬寒瘧寒瘧者緣於先受陰寒或沐浴之水寒寒氣伏於肌腠之中復因外感邪風觸之而發正合經云寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也蓋寒瘧之脈證弦緊有力寒長熱短連日而發或間日而發發時頭痛微汗或無汗乾熱此當遵古訓體若燔炭汗出而散之旨擬用辛散太陽法治之如寒熱按時而至方可繼進和解今人不別何經動手概用小柴胡湯則誤甚矣濕瘧濕瘧之證因於久受陰濕濕氣伏於太陰偶有所觸而發發則惡寒而不甚熱脈象緩鈍而不弦一身盡痛而有汗手足沉重嘔逆脹滿者是也俗謂脾寒大概指是證耳此宜宣透膜原法使其邪化瘧除但辛燥之劑於陰虧熱體者須酌用之陽虛寒體者更可加老蔻乾薑所有斷截之法不宜早用用之非變膨鼓即成瘧母之疴瘧證殊多總宜分別而治江誠曰寒瘧因寒水伏於肌腠濕瘧因濕氣伏於太陰斯二瘧夏秋皆有非比暑瘧風瘧受於夏天發於秋令也溫瘧經謂溫瘧由冬令感受風寒伏藏於骨髓之中至春不發交夏陽氣大泄腠理不致或有所用力伏邪與汗並出此邪藏於腎自內而達於外如是者陰虛而陽盛陽盛則熱矣衰則其氣復入入則陽虛陽虛生外寒矣又謂先傷於風後傷於寒故先熱而後寒也亦以時作名曰溫瘧溫瘧之證先熱後寒其脈陽浮陰弱或汗多或汗少口渴喜涼宜清涼透邪法治之如汗多者去淡豉加麥冬花粉如舌苔化為焦黑者宜清熱保津法治之嘉言云治溫瘧當知壯水以救其陰恐十數發而陰精盡盡則真火自焚頃之死矣此與香岩論溫病當刻刻護陰之說不相悖也凡有變證仿春溫風溫溫病溫毒門中之法可也或問溫瘧得之於冬發之於夏何不列於溫病之門或附於熱病之後今列如斯其意何也答曰就溫字而言當列於彼就瘧字而論當附於此欲使學者知諸瘧有先熱後寒有先寒後熱有寒多熱少有寒少熱多有獨熱不寒之各異也又問金匱論溫瘧謂身無寒但熱今先生論中謂先熱後寒得毋有違仲景乎曰先熱後寒者遵內經之訓也金匱謂無寒但熱定系傳寫之訛殊不知但熱無寒乃癉瘧也不可不為分辨瘴瘧瘴瘧之證嶺南地方為多也乃因天氣炎熱山氣濕蒸多有嵐瘴之毒人感之者即時昏悶一身沉重或寒甚熱微或寒微熱甚亦有迭日間日而作者亦有狂言妄語者亦有口喑不言者揆其諸證初起之時邪必鬱於氣分甚則血瘀於心涎聚於脾先宜宣竅導痰法探吐其痰然後辨其輕重表裡為要其輕者在表宜用芳香化濁法加草果檳榔其重者在裡宜用和解兼攻法為治癉瘧帝曰癉瘧何如岐伯曰癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍肌肉故命曰癉瘧帝曰善金匱云師曰陰氣孤絕陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰癉瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消爍肌肉豐按素問謂肺素有熱又謂氣內藏於心金匱亦謂邪氣內藏於心而未及肺合而論之似異而實同也蓋肺心皆居膈上主乎陽位陽氣盛故但熱而不惡寒石頑注金匱云少氣煩冤者肺主氣肺受火邪也手足熱者陽主四肢陽盛則四肢熱也欲嘔者火邪上衝胃氣逆也內藏於心者陽盛則邪氣內藏而外舍分肉之間也消爍肌肉者火盛則肌肉爍也治癉瘧惟宜白虎蓋白虎專於退熱其分肉四肢內屬於胃非切於所舍者乎又瀉肺火非救其煩冤者乎據此而觀不但病在肺心亦且兼之胃病嘉言意用甘寒亦屬非謬真所謂智謀之士所見略同竊思陽氣盛則陰益傷擬用甘寒生津法庶幾針芥牝瘧金匱云瘧多寒者名曰牝瘧趙以德不辨魚魯注為邪在心而為牡喻嘉言亦為邪伏於心心為牡臟即以寒多熱少之瘧名為牡瘧二公皆以牝瘧為牡又皆謂邪藏於心石頑已正其非堪為來學之圭臬也乃曰若系邪氣內藏於心則但熱而不寒是為癉瘧此則邪氣伏藏於腎故多寒而少熱則為牝瘧以邪氣伏結則陽氣不行於外故作外寒患斯證者真陽素虛之體為多緣當盛夏之時乘涼飲冷感受陰寒或受陰濕其陽不能制陰邪之勝故瘧發時寒盛熱微慘慼振慄病以時作其脈必沉而遲面色必淡而白宜以宣陽透伏法治之因寒者薑附為君因濕者蒼果為主日久不愈溫補之法為宜痰瘧痰瘧者因夏月多食瓜果油膩鬱結成痰或素系痰體其痰據於太陰脾臟伏而不發一旦外感涼風痰隨風起變為瘧病矣初發之時頭痛而眩痰氣嘔逆寒熱交作脈來弦滑之象古諺云無痰不作瘧豈不然乎宜以化痰順氣法加草果藿香治之如昏迷卒倒者宜以宣竅導痰法加厚朴草果蘇合香丸治之肥盛之人痰藥更宜多用食瘧食瘧者即胃瘧也因於飲食失節飢飽不常穀氣乖亂營衛失和一有不謹則外邪冒之遂成瘧疾矣其證寒已復熱熱已復寒寒熱交併噫氣惡食食則吐逆胸滿腹脹脈滑有力或氣口緊盛者宜以楂曲平胃法加藿香草果治之如脈遲滯必兼寒也可加乾薑白蔻如脈緩鈍者必兼濕也可加半夏茯苓食瘧之證兼寒兼濕為多法當分治或問曰介賓之書謂瘧疾之作無非外邪為之本豈果因食因痰有能成瘧者耶據此而論痰食是為兼證今先生專列痰瘧食瘧之門何也豐曰素來痰體加感涼風而致瘧者以痰為本故曰痰瘧飲食停積加受外邪而致瘧者以食為本故曰食瘧如前所論暑風寒濕溫瘴癉牝等瘧倘有頭眩嘔逆脈滑者是痰為兼證也噫氣惡食脈緊者是食為兼證也遂不能以痰瘧食瘧名之本證兼證詎可以不辨哉疫瘧疫瘧之為病因天時寒熱不正邪氣乘虛而襲膜原欲出表而不能透達欲陷里而未得空隙故作寒熱往來或一日二三次或一次而無定期也寒輕熱重口渴有汗右脈多勝於左是為疫瘧也蓋疫者役也若役使然大概沿門合境長幼之瘧相似者皆可以疫名之竟不必拘於一定之見證當隨時令而治此司天運氣之所宜考也擬以宣透膜原法為主鬼瘧鬼瘧者因卒感屍疰客忤寒熱日作惡夢多端時生恐怖言動異常脈來乍大乍小者是俗云夜發為鬼瘧者非獨有通一子謂無鬼瘧不啻阮瞻一流人也豐歷見之患是證者都系體弱屬陰之人而強壯屬陽之體無一患者古云壯士不病瘧殆指鬼瘧而言擬用驅邪辟祟法治之程曦曰佚虛瘧元氣本虛感邪患瘧名虛瘧也其證寒熱交作自汗倦臥飲食並減四肢乏力脈象舉按俱弦尋之則弱宜以補氣升陽法治之又有久患瘧疾脾胃累虛亦名虛瘧也蓋胃虛則惡寒脾虛則發熱寒則洒洒熱則烘烘脈象浮之則濡按之則弱此宜營衛雙調法則瘧疾不截而自罷矣倘有肢涼便瀉者均加附子乾薑或吐涎不食者並加砂仁半夏治虛瘧之法盡於斯矣勞瘧勞瘧者因瘧疾日久延為癆也或因久病勞損氣血兩虛而病瘧也或因勞役過度營衛空虛而患瘧也脈象或軟或弱或小滑或細數發熱惡寒寒中有熱熱中有寒或發於晝或發於夜每遇小勞即發氣虛者多汗飲食少進血虛者午後發熱至晚微汗乃解此似瘧非瘧也若誤為瘧治而投剝削之劑未有不成瘵疾者也擬用營衛雙調法氣虛者倍加參耆血虛者倍加歸芍倘寒熱分清按時而至脈兼弦象顯出少陽兼證始可佐柴胡青蒿否則不可耳瘧母凡瘧經年不愈者謂之老瘧或食積或痰涎或瘀血皆能結成痞塊藏於腹脅作脹而痛令人多汗謂之瘧母亦有因調治失宜營衛俱虛或截瘧太早邪伏肝經脅下而成痞塊者豐歷見之其痞居左脅者為多蓋左脅屬肝當補虛之中兼以疏肝為治宜用調中暢氣法去耆朮甘荷加青皮鱉甲牡蠣半夏治之如形氣未衰塊痛甚者蓬稜肉桂並可加入倘偏用攻破剝削以治其塊而不顧其正者延為中滿遂不可醫可不謹歟三日瘧三日瘧又名三陰瘧間兩日而發者是也丹溪曰發於子午卯酉日者為少陰瘧寅申巳亥日者為厥陰瘧辰戌丑未日者為太陰瘧其說似乎近理然介賓路玉皆駁為非悉以軒岐之訓為準則也經曰時有間二日或至數日而發者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也李念莪釋云客猶言會也邪在六腑則氣遠會稀故間二日或休數日也由是觀之丹溪之言不足為訓蓋間二日而作者以邪氣深客於腑是與衛氣相失而然宜以雙甲搜邪法治之如陰虛之體益以首烏當歸陽虛之體益以鹿霜潞黨至間數日而作者其邪愈深不待言矣凡邪深陷者必因正氣空虛當用補氣升陽法助其既虛之正提其已陷之邪使正氣復旺邪氣自出則瘧不驅自遁矣或問先生論瘧既及三陰而不及三陽者何也答曰丹溪分別三陰前賢已駁之矣今既問及三陽不得不略言之大概瘧在太陽則寒重法當汗之在陽明則熱重法當清之在少陽則寒熱往來法當和之又問諸瘧悉詳何獨遺胎瘧一證究竟何如曰胎瘧今之俗名也有謂襁褓小兒患瘧為胎瘧有謂從未患瘧為胎瘧又以母年之多寡與瘧期相應此未盡然總之無論其襁褓壯年而未曾患瘧者悉稱為胎瘧也仍當分暑風寒濕等瘧而治歷嘗見之較諸瘧逾格纏綿最難速愈必俟其勢衰微方可斷截耳伏暑伏天所受之暑者其邪盛患於當時其邪微發於秋後時賢謂秋時晚發即伏暑之病也是時涼風颯颯侵襲肌膚新邪欲入伏氣欲出以致寒熱如瘧或微寒或微熱不能如瘧分清其脈必滯其舌必膩脘痞氣塞渴悶煩冤每至午後則甚入暮更劇熱至天明得汗則諸恙稍緩日日如是必要二三候外方得全解倘調理非法不治者甚多不比風寒之邪一汗而解溫熱之氣投涼則安擬用清宣溫化法使其氣分開則新邪先解而伏氣亦隨解也然是證變易為多其初起如瘧先服清宣溫化法倘畏寒已解獨發熱淹綿可加蘆竹連翹本法內之半夏陳皮乃可刪去恐其溫燥之品傷津液也其舌苔本膩倘漸黃漸燥漸黑漸焦是伏暑之熱已傷其陰於本法內可加洋參麥冬元參細地治之倘神識昏蒙者是邪逼近心包益元散紫雪丹量其證之輕重而用倘壯熱舌焦神昏譫語脈實不虛是邪熱歸併陽明宜用潤下救津法治之如年壯體強以生軍易熟軍更為有力種種變證務在臨證之時細審病之新久體之虛實按法用之庶無差忒耳或問曰曾見禹載書中論伏暑謂三伏之時以書曬曝烈日之中隨即收藏於笥火氣未散冬時啟笥觸之遂病今是論中全未言及得毋遺漏乎答曰子誠刻舟求劍也此不過偶一有之之證若此論之則伏暑之證專病曬書之家而無書曬者則不病專病在冬而三秋則不病可發一笑秋暑附秋涼七月大火西流暑氣漸減而涼氣漸生其時炎𭶟尚存一如盛夏亦有較盛夏更熱之年人感其熱而病者為秋暑即世俗所稱秋老虎是也斯時濕土主氣猶是暑濕交蒸但見壯熱煩渴蒸蒸自汗脈象洪濡或數是秋暑之證其治法與陽暑相同亦宜清涼滌暑法倘交秋令以來涼氣襲人人感其氣即患頭痛惡寒發熱無汗脈象浮弦或緊是秋涼之證其治法與陰暑無異亦宜辛溫解表法若交秋分之後燥金主氣遇有秋涼之見證者是為燥之勝氣宜用苦溫平燥法遇有秋暑之見證者是為燥之復氣宜用甘寒生津法每見近時之醫不究六氣者多一交秋令便云秋燥不知初秋煩熱是為秋暑又不知斯時濕土主令指暑指濕而為燥氣不甚謬哉擬用諸法清營捍瘧法治暑瘧惡寒壯熱口渴引飲連翹一錢五分去心竹葉一錢五分扁豆衣二錢青蒿一錢五分木賊草一錢黃芩一錢酒炒青皮一錢五分加西瓜翠衣一片為引此治暑瘧之法也夫暑氣內舍於營故君以翹竹清心卻其上焦之熱臣以扁衣解暑青蒿祛瘧佐以木賊發汗於外黃芩清熱於內古云瘧不離乎少陽故使以青皮引諸藥達少陽之經瓜翠引伏暑透肌膚之表辛散太陽法治風瘧寒少熱多頭痛自汗兼治傷寒傷濕嫩桂枝一錢羌活一錢五分防風一錢五分甘草五分前胡一錢五分淡豆豉三錢加生薑二片紅棗三枚煎服凡外邪襲人必先傷於太陽之表瘧雖因於伏暑又必因外感秋風而觸發也蓋風瘧有風在表故宜辛散之方其中桂羌防草即成方桂枝羌活湯本治風瘧之劑也內加前胡散太陽復泄厥陰淡豉解肌表且祛瘧疾更加攘外之姜安內之棗表裡俱安何瘧之有哉宣透膜原法治濕瘧寒甚熱微身痛有汗肢重脘懣厚朴一錢薑製檳榔一錢五分草果仁八分煨黃芩一錢酒炒粉甘草五分藿香葉一錢半夏一錢五分薑製加生薑三片為引此師又可達原飲之法也方中去知母之苦寒及白芍之酸斂仍用樸檳草果達其膜原祛其盤踞之邪黃芩清燥熱之餘甘草為和中之用擬加藿夏暢氣調脾生薑破陰化濕濕穢乘入膜原而作瘧者此法必奏效耳清涼透邪法見前清熱保津法見前宣竅導痰法見前芳香化濁法見前和解兼攻法治寒熱瘧疾兼之裡積柴胡一錢五分黃芩一錢酒炒半夏一錢五分薑製甘草六分元明粉二錢熟軍二錢枳殼一錢五分流水煎服柴芩夏草以和解元明軍枳以攻裡此仿長沙大柴胡之法也甘寒生津法治癉瘧獨熱無寒手足熱而欲嘔大生地五錢大麥冬三錢去心連翹三錢去心竹葉一錢五分北沙參三錢石膏四錢煨加蔗漿梨汁每一盞沖服金匱癉瘧條下但云以飲食消息止之嘉言主以甘寒生津可愈豐立是法即遵斯訓也首用生地麥冬甘寒滋膩以生津液此證不離心肺胃三經故以翹竹清心沙參清肺膏蔗清胃梨汁生津宣陽透伏法治牝瘧寒甚熱微或獨寒無熱淡乾薑一錢淡附片一錢厚朴一錢薑製蒼朮一錢土炒草果仁一錢煨蜀漆一錢五分加白豆蔻三顆去殼細研分沖乾薑宣其陽氣附子制其陰勝厚朴開其滯氣蒼朮化其陰濕草果治獨勝之寒蜀漆逐盤結之瘧佐以豆蔻不惟透伏有功抑且散寒化濕施於牝瘧豈不宜乎化痰順氣法見前楂曲平胃法見前驅邪辟祟法治鬼瘧寒熱日作多生恐怖脈來乍大乍小龍骨三錢煅茯苓三錢雄黃染黃茅蒼朮一錢土炒廣木香五分柏子仁三錢正粒石菖蒲五分加桃葉七片為引方解刪補氣升陽法治氣虛患瘧寒熱汗多倦怠食減西潞參三錢米炒上黃耆二錢蜜炙於潛術二錢米炒粉甘草五分炙廣陳皮一錢五分當歸身二錢酒炒綠升麻五分柴胡梢五分加生薑二片紅棗三枚為引此東垣補中益氣湯也首用參耆朮草以補其氣陳皮以行其氣弗使補而呆滯俾其補而靈動也當歸以活其血血氣流行則邪不能容矣升柴提其瘧邪薑棗和其營衛此方治虛瘧最為確當營衛雙調法治灑寒烘熱脈濡且弱虛瘧勞瘧並宜嫩桂枝一錢黃耆皮二錢蜜炙當歸身一錢五分土炒白芍一錢土炒西潞參三錢甘草五分炙加生薑二片紅棗三個煎服古人云胃者衛之源脾者營之本今脾胃累虛而作寒熱者宜以營衛雙調故用桂耆護衛歸芍養營參草補益胃脾薑棗調和營衛此從源本立方勿見寒熱便投和解調中暢氣法雙甲搜邪法治三日瘧久纏不愈穿山甲一錢醋炙鱉甲一錢五分炙木賊草一錢去節嫩桂枝一錢制首烏三錢鹿角霜二錢東洋人參二錢當歸身二錢土炒頭服輕煎次服濃煎瘧邪深竄而成三瘧者須此法也穿山甲善竄之物主搜深踞之瘧鱉甲蠕動之物最搜陰絡之邪木賊中空而輕桂枝氣薄而升合而用之不惟能發其深入於陰分之邪而且能還於陽分之表以何首烏養其陰也鹿霜助其陽也人參益其氣也當歸補其血也陰陽氣血並復則瘧邪自無容身之地矣清宣溫化法治秋時晚發之伏暑並治濕溫初起連翹三錢去心杏仁二錢去皮尖研栝蔞殼三錢陳皮一錢五分茯苓三錢製半夏一錢甘草五分佩蘭葉一錢加荷葉二錢為引連翹寒而不滯取其清宣杏仁溫而不燥取其溫化蔞殼宣氣於上陳皮化氣於中上中氣分得其宣化則新涼伏氣皆不能留茯苓夏草消伏暑於內佩蘭荷葉解新邪於外也潤下救津法見前辛溫解表法見前清涼滌暑法見前苦溫平燥法見後備用成方小柴胡湯治傷寒少陽證往來寒熱口苦耳聾脅痛脈弦瘧發寒熱及婦人傷寒熱入血室等證柴胡半夏黃芩人參甘草加薑棗煎服豐按此方專治寒熱往來邪在少陽之瘧也倘惡寒甚者兼太陽也宜加羌活發熱甚者兼陽明也宜加葛根景岳木賊煎凡瘧疾形實氣強多濕多痰者宜此截之大效木賊草小青皮製厚朴製半夏檳榔蒼朮水煎露一宿於未發之先二時溫服能飲者酒煎最妙豐按此方用木賊取其入肝經氣分蓋肝與膽相表裡故可通治瘧疾喜其輕能升散空能發汗即太陽之餘邪未盡者亦可用之較柴胡更為穩耳嚴氏清脾飲治瘧疾熱多寒少口苦嗌乾小便赤澀脈來弦數青皮厚朴柴胡黃芩製半夏草果仁茯苓白朮甘草加姜煎一方加檳榔瘧不止加酒炒常山烏梅豐按是方即小柴胡湯加減減人參之補大棗之滯以解少陽往來寒熱之邪其方不名清膽而名清脾者何也蓋因近世稱瘧為脾寒其脾受寒而作瘧者亦屬不少故加厚朴溫其脾胃苓術輔其中州更加草果青皮祛其瘧邪而脾自得清肅故曰清脾其存小柴胡法者良由瘧不離乎少陽之意耳麻杏甘石湯治溫瘧先熱後寒麻黃杏仁甘草石膏水煎服豐按集解謂此方以治溫瘧不知溫瘧系冬令伏邪發於夏令陽氣大泄之時麻黃辛散豈可用乎如體實壯熱無汗而喘者只宜暫用否則不可輕試慎之慎之柴平湯治濕瘧身重身痛柴胡制夏黃芩人參厚朴蒼朮陳皮甘草加薑棗煎服藿香平胃散治胃寒腹痛嘔吐及瘴疫濕瘧藿香制夏蒼朮厚朴陳皮甘草加薑棗煎服太無神朮散治感山嵐瘴氣憎寒壯熱一身盡痛頭面腫大瘴瘧時毒藿香石菖蒲蒼朮厚朴陳皮甘草水煎溫服豐按以上之方治濕瘧瘴瘧之證極為平妥但柴平湯之人參必體弱氣虛者乃可用之倘不細審而概施之恐補其氣而阻其邪病必增劇人參敗毒散治傷寒頭痛憎寒壯熱及時氣疫癘嵐障鬼瘧腮腫毒痢諸瘡斑疹人參茯苓枳殼桔梗羌活獨活前胡柴胡川芎薄荷甘草加生薑三片煎服豐按此方非但主治傷寒疫癘鬼瘧等證而嘉言每以治痢亦屢奏功豐遇瘧痢兩兼之證用之更有神效誠良方也截瘧七寶散治實瘧久發不已鬼瘧食瘧皆治之常山酒炒草果煨青皮陳皮檳榔厚朴薑製甘草等分用酒水各一杯煎好以紗蓋之露一宿於當發之早面東溫服局方常山飲瘧久不止者用此截之常山火酒炒二錢草果煨二錢檳榔一錢烏梅二個知母一錢貝母去心一錢加生薑三片棗一枚半酒半水煎露一宿日未出時面東空心溫服子和常山散治痰瘧神效常山一兩甘草二兩五錢上為細末水煎空心服之取吐豐按常山之功在乎祛痰截瘧其性猛烈體稍虛者不可遽用鱉甲飲治瘧久不愈腹中結塊名曰瘧母白朮黃耆川芎白芍檳榔草果厚朴陳皮鱉甲甘草等分姜三片棗一枚烏梅少許煎四獸飲治瘧病胃虛中挾痰食人參茯苓白朮炙草陳皮制夏草果烏梅加薑棗煎服豐按前方用耆朮烏梅此用參朮烏梅皆是補中兼收非體虛久瘧切弗輕試追瘧飲截瘧甚佳凡血氣未衰屢散之後而瘧有不止者用此截之已經屢驗何首烏當歸青皮陳皮柴胡半夏甘草井水河水合煎何人飲截瘧如神凡氣血俱虛久瘧不止可服何首烏人參當歸陳皮煨生薑水煎八分於發前二三時溫服之休瘧飲此止瘧最妙之劑若汗散既多元氣不復或以衰老或以弱質而瘧有不能止者俱宜用此此化暴善後之第一方也人參白朮何首烏當歸炙甘草煎七分食遠服豐按以上三方皆景岳治瘧之劑揆其用意在乎少陽觀其治實瘧者每以木賊治虛瘧者不離首烏當歸蓋木賊疏肝透邪歸烏滋肝養血肝與膽相為表裡其意在少陽者可想而知矣臨證治案虛寒之體忽患暑瘧建陵靳某之妾於仲秋忽患暑瘧連日一作寒灑熱蒸汗出如雨口渴欲飲脈來弦滑舌苔微黃此暑瘧也靳問曰因何致病豐曰良由暑月貪涼過食生冷其當時為患者是為陰暑伏匿日久至今而發者即內經所謂夏傷於暑秋為痎瘧是也即用清營捍衛法服下益熱急邀復診脈之轉為弦遲詢之口反不渴豐曰此瘧邪外達之徵請勿慮耳觀其形體肥白知其本質虛寒改用溫補為主以理中湯加豆蔻制夏蜀漆柴胡薑棗為引以河井水合煎連嘗三劑瘧邪遂遁矣暑瘧熱盛逼血上吐城南葉某之子偶染瘧疾邀豐診之脈象迢迢有力寒熱間日而來口渴喜涼熱退多汗此為暑瘧遂用清營捍衛法去木賊加藿香草果柴胡甘草治之服下瘧勢仍來尤吐鮮紅數口覆按其脈轉為弦大而數必因暑熱內炎逼傷血絡所致思古聖有治病必求其本之訓此證暑熱是本吐血是標可不必見病治病也即用清涼滌暑法去扁豆加黃芩知母治之連進兩帖瘧發漸早熱勢漸輕不知不覺而解血恙亦未復萌截瘧太早變成腫脹西鄉鄭某偶患瘧疾熱重寒微口渴便瀉先用符禁未效又服斷截之藥瘧與瀉並止矣數日後腹中忽脹小便短少來舍就診兩手脈鈍沉取尚強此乃暑瘧夾濕之證其邪本欲向表分里而出誤用截法阻其邪路暑欲達表而不能濕欲下行而不得交阻於中氣機不行而成腫脹法當治標為先即以木瓜蒿藿以解其暑芩蒼通草以行其濕又以青皮厚朴杏粒檳榔行其氣而寬其膨服下稍為中病每得一矢氣腹內略鬆更加菔子以破其氣雞金以消其水服之矢氣更多溺亦通快其腹逐漸消去後用調脾化氣得全安耳江誠曰觀以上三案雖暑瘧之輕證但其夾證各有不同設不細辨而妄治之則輕證轉重重證轉危耳如靳案本體虛寒得溫補而愈葉案暑熱劫絡得清劑而安鄭案夾濕變脹得破削而寬可見醫法有一定之理無一定之方倘膠於某證某藥則鈍根莫化矣風瘧時邪乘入血室城南龔某之女先微寒而後發熱口渴有汗連日三發脈弦而數舌苔黃膩此因夏傷於暑加感秋風名風瘧也遂用辛散太陽法去羌活加秦艽藿梗治之服二帖瘧勢未衰漸發漸晏且夜來頻欲譫語復診其脈與昨彷彿但左部之形力頗勝於右思仲景有云晝則明瞭夜則譫語是為熱入血室今脈左勝疑其血室受邪即詢經轉未曾其母曰昨來甚寡以後未行此顯然邪入血室之證也姑守前方去防風淡豉加當歸赤芍川芎柴胡服之經水復來點滴而少譫語亦減惟瘧疾仍然再復其脈左部轉柔余皆弦滑已中病藪可服原方幸得瘧勢日衰一日改用宣透膜原法加柴胡紅棗治之迭進三煎瘧邪遂解程曦曰時證易治兼證難療若此案不細詢其經事則醫家病家兩相誤也倘見譫語之證而為邪入心包或為胃家實熱清之攻之變證必加苟不熟仲景之書而今日之證必成壞病矣吾師嘗謂不通仲景之書不足以言醫也信夫寒瘧之證溫補治驗城東潘某體素豐滿大便常溏中土本屬虛寒固無論矣忽於孟秋寒熱交作肌膚汗少即延醫診遂作陰暑論治輒投四味香薷飲加寒涼之劑未獲奏效即來商治於豐診其脈弦而兼緊舌苔白薄寒先熱後隔日而來此寒瘧也良由體質本寒加感秋涼致病若果陰暑之證在長夏而不在秋況陰暑之寒熱從未見隔日而發當用附子理中湯加柴胡草果藿香陳皮治之服二劑周身微汗寒熱略清繼服二帖瘧邪遂未發矣濕瘧之證辛散獲效新定王某之室浣衣度活平日難免無濕所受患瘧半月以來前醫之法無效懇豐治之切脈緩大有力遍身浮腫而疼寒熱汗無連日一發此明是濕邪為瘧也思先哲有風能勝濕之論宜以辛溫散邪遂以羌活滲濕湯加草果厚朴為治先服二劑小效繼服二劑全瘥溫瘧誤為暑熱豫章張某於仲夏中旬發熱連日口渴喜飲醫者皆作暑熱論治所用不離藿薷滑扁等藥未臻效驗轉商豐治診之脈濡且弱舌苔微燥而黃合其見證參之似屬暑熱但其未審既熱之後每有灑淅惡寒之證此即內經所謂先熱後寒病以時作名曰溫瘧是也溫瘧之證最易傷陰切忌溫散治宜清涼透邪法服之熱勢已挫口渴依然仍守原方益以麥冬鮮地連服三劑始得全愈產後癉瘧熱補至變四明沈某之室誕後將匝月以來忽然壯熱汗多口渴欲飲有謂產後陰虛陽無所附有謂氣血大虛虛熱熏蒸皆用溫補之方嚴禁寒涼之藥見病者忽爾尫羸日晡發熱益信其為蓐癆愈增熱補更加唇焦齒燥舌絳無津復請前二醫合議議用導龍入海引火歸源之法不但諸證未減尤加氣急神昏始來商之於豐豐即往診兩手之脈皆大無倫推其致病之因閱其所服之藥實因誤補益劇非病至於此險也沈曰此何證也豐曰乃癉瘧也此即古人所謂陰氣先傷陽氣獨發不寒癉熱令人消爍肌肉當用甘涼之劑治之曰產後用涼可無害乎曰有病則病當之若再躊躕陰液立涸必不可救矣即用甘寒生津法加兩洋參紫雪丹治之頭煎服下未見進退次煎似有欲寐之形大眾見之無不疑昏憒之變復來請診脈象稍平唇舌略潤諸恙如舊但增手戰循衣豐曰此陰陽似有相濟之意無何肝風又動之虞仍守原章佐以阿膠龜版及雞子黃令其濃煎溫服是夜安神熟寐熱勢大衰次早診之諸逆證皆已屏去繼以清滋補養調理兩月方瘳陰邪入腎發為牝瘧江南陶某之室寡居五載腰如兩截帶下淋漓時值中秋炎蒸如夏或當風而納涼或因渴而飲冷其陰邪乘虛而陷少陰發為牝瘧脈來沉小之象畏寒而不甚熱肌膚浮腫面色痿黃飲食減少而乏味小水淡黃而欠舒此陰虛邪陷之證顯而易見豐用金匱腎氣去萸肉丹皮加乾薑蒼朮連服十餘劑諸恙全安寒濕入脾證成牝瘧金陵張某作客來衢形素豐肥向有盧同之癖其體屬寒濕者先露一斑忽患間日惡寒按時而至胸前痞悶口不作干脈緩近遲苔膩而白此牝瘧也古人雖有邪氣伏藏於心於腎之論但今之見證皆屬乎脾宜用平胃合二陳加乾薑草果白蔻砂仁治之令嘗五劑三日服盡諸證咸瘥程曦曰凡學醫者必須天機活潑毫無膠固之人而後可如趙喻注金匱皆言邪舍於心石頑正其失專言邪藏乎腎吾師前以石頑之訓為準繩今觀是案又謂在脾其實非矛盾也良由見證而斷也總因間日惡寒按時而至稱為牝瘧可見醫者審證為第一耳瘧發昏迷治痰得效南鄉酆某之母年逾六旬偶沾瘧疾淹纏數月藥石無功乘輿來舍就診診其脈兩手皆弦其瘧連日而發每於薄暮時先微寒而後微熱神識漸漸昏悶約一時許始蘇日日如是閱前醫之方皆不出小柴胡湯清脾飲等法思其發時昏悶定屬痰迷即以二陳湯加老蔻藿香杏仁草果潞參薑汁治之連進三劑神識遂清繼服二劑寒熱亦卻時行疫瘧己卯夏五患寒熱者甚眾醫者皆以為瘧所用鹹是小柴胡湯清脾飲及何人飲休瘧飲等方未有一方奏效殊不思經謂夏傷於暑秋必痎瘧瘧每發於秋令今於芒種夏至而發者何也考歲氣陽明加於少陽天政布涼民病寒熱斯時病瘧者盡是時行疫瘧也有建德錢某來舍就醫曰患瘧久矣請先生截之豐曰此乃時行疫瘧遂用宣透膜原法加豆卷乾薑治之其效捷於影響後來求治者皆與錢病無異悉以此法治之莫不中窾可見疫瘧之病不必拘瘧門一定之方又不必拘一定之證更又不必拘一定之時但其見證相同而用藥亦相同者斷斷然矣鬼瘧東鄉葉某自初秋患瘧至孟冬未愈每每發於午後寒不甚寒熱不甚熱言語錯亂如見鬼神至後半夜神識遂清倦怠而寐日日如是曾延醫治盡屬罔靈請豐診之兩手之脈不調之至曰此鬼瘧也即用驅邪辟祟法去龍骨加草果常山服之神氣稍清久瘧陰虛及陽鑑湖黃某之內患瘧三年尫羸之至無醫不迓靡藥不嘗邀豐治之脈象纖微無力灑寒烘熱每發於申酉之時舌淡無榮眠食俱廢大便溏薄月水不行豐曰此虛瘧也出方閱之計有數百餘紙聊審近日之方非參耆朮草即地芍歸膠未嘗有一劑桴鼓細思是證乃瘧邪深踞於陰陰虛及陽之候即用制首烏五錢補其陰也淡附片三錢補其陽也鱉甲二錢青蒿五分搜其陰分久踞之邪鹿霜三錢羌活五分隨即領邪而還於表東洋參三錢炙甘草八分補其正而御其邪生薑二片紅棗五枚安其內而攘其外諸藥雖經服過然制方實屬不同古云用藥如用兵孰為主將孰為先鋒指揮得法自可望其破壘耳黃某深信即使人揀來煎服二劑寒熱覺輕又二劑精神稍振再又二劑諸疴盡卻調補三月月信始行起居猶昔矣體虛勞瘧安徽汪某體本虛怯飲食並減神氣極疲精遺於夢汗漏於寐閒居靜養諸恙如無偶有煩勞遂作寒熱等證延豐診之脈來小澀此屬勞瘧之證分明若繪矣擬用何人散加鱉甲牡蠣茯神龍骨令服十餘劑調養數月而康瘧母破劑無效溫補鹼軟得安南鄉傅某自同治紀元患瘧之後左脅下結成一塊即瘧母也迄今十五載矣身體安然不知不覺每一違和漸次居中初服常山飲子後用鱉甲煎丸皆無效驗因停藥勿治邇苦眩暈遺精耳鳴盜汗曾用六黃兼六味服之雖妥但其痞塊漸大漸中將有變蠱之勢脈形緩滯兩尺皆弱先天虧損斷斷無疑消破之劑決難浪施余用桂附八味加龍骨牡蠣龜版鱉甲蜜丸服一料諸恙少減二料得全瘥矣瘧母攻破致死歙北一醫在吾衢名冠一時時有里人範某久患瘧母寢食若舊動作如常聞此醫欲歸梓里恐郡內諸醫不能杜其病根即商其治所用硝黃枳樸巴豆蓬稜一派攻伐之劑未數日腹如復釜神氣頓疲飲食減少病勢日加一日至於危急始來商治於豐診其脈沉小而澀此因攻破太猛正氣受傷之候證弗易治囑商名手其兄再四哀求不得已勉以香砂六君損益服之未效復請固辭再商他醫終不能起程曦曰古人謂不服藥為中醫誠哉是言歷見因病致死者少因藥致死者多若此病是藥速其亡也不思李念莪云養正則邪自除譬如滿座皆君子一二小人自無容身之地曦之鄙見當補正為君稍兼攻積庶乎穩妥偏於攻破非法也三瘧擾傷氣血補益得效南鄉李某患三日瘧纏綿兩三載方藥靡效近用多是甜茶服之嘔吐吐傷胃氣穀食減少神氣愈疲而瘧疾仍來來舍求治於豐診其脈緩澀沉弦形色清癯之至此氣血陰陽受虧之象也非補益不能望痊即用制首烏五錢潞黨四錢鱉甲鹿霜各二錢乾薑附片各八分囑服十劑臨發之日勿服至第八劑寒熱遂未發矣復來就診曰先生之方效於拔刺然諸藥前醫亦曾用而未驗者何也豐曰一則藥味雜亂二則服法未精不知間二日之瘧其邪深其正虛所以用補法於未發之先助其氣血陰陽則邪不能勝正而自止矣今脈轉為緩小沉分亦然瘧邪果遠遁也當守舊法加之熟地歸身薑棗為引連服十劑而安產後三瘧久纏北鄉杜某之內自誕後氣血未復偶沾三瘧糾纏半載未瘳發時背如負重腰如兩截寒洒洒欲覆被熱烘烘欲思飲診其脈舉之若浮綿按之不滿部面色白而無榮舌色淡而無苔此屬奇經本虛瘧邪竄入於陰陰虛及陽之證斯宜未發之日大補奇脈陰陽俾正氣復充邪氣自卻倘以常山草果專治其瘧便是捨本求末矣豐用東參熟地鹿霜狗脊龜版牡蠣炙耆桂枝薑棗為引約服二十餘劑瘧始脫體或問曰曾見景岳治瘧每迎其銳而擊之最捷最效今先生治瘧用藥於未發之先究遵景岳耶抑遵先生耶答曰治初患之瘧邪氣方盛正氣未虛可以迎其銳而擊之久患之瘧邪氣深陷正氣已虛則不可耳故於未發用補補其正氣正氣旺則邪自衰不用擊而瘧自罷矣伏暑過服辛溫改用清涼而愈武林陳某素信於豐一日忽作寒熱來邀診治因被雨阻未往伊有同事知醫遂用辛散風寒之藥得大汗而熱退盡詎知次日午刻熱勢仍燃汗多口渴痰喘宿恙又萌脈象舉取滑而有力沉取數甚舌苔黃黑無津豐曰此伏暑病也理當先用微辛以透其表荊防羌芷過於辛溫宜乎劫津奪液矣今之見證伏邪已化為火金臟被其所刑當用清涼滌暑法去扁豆通草加細地洋參服二劑舌苔轉潤渴飲亦減惟午後尚有微燒姑照舊方更佐蟬衣荷葉又服二劑熱從汗解但痰喘依然夜臥不能安枕改用二陳加蘇葶旋杏服之又中病機後議補養常方稛載歸里矣產後伏暑城東孔某之室素來多病其體本孱分娩三朝忽然頭痛難忍寒熱無汗大渴引飲脈來浮大之象此肌表重感秋涼而曩伏之暑熱觸動而繼起矣詢知惡露勻行腹無脹痛生化成方可勿用耳即以白芷青蒿秦艽荊芥當歸川芎加敗醬草合為一劑蓋白芷為產後疏風妙藥青蒿乃產後卻熱最宜秦艽荊芥活血散風當歸川芎生新去瘀本草謂敗醬草味苦而平主治產後諸病此方最穩請服二煎其熱從汗而退次日邀診脈象頓平詢之口亦不渴惟覺神倦少眠此伏暑已隨秋涼而解心脾被邪擾攘而虧當守原方去白芷之香燥荊芥之辛散加茯神柏子以安神神安自熟寐矣又加西潞炙草以扶元元復自強健矣後用八珍損益未及半月而康
