body:
  text: 卷之四夏傷於暑大意夏傷於暑者謂季夏小暑大暑之令傷於暑也其時天暑地熱人在其中感之皆稱暑病夫暑邪襲人有傷暑冒暑中暑之分且有暑風暑溫暑咳暑瘵之異傷暑者靜而得之為傷陰暑動而得之為傷陽暑冒暑者較傷暑為輕不過邪冒肌表而已中暑者即中暍也忽然卒倒如中風狀暑風者須臾昏倒手足遂抽暑溫者較陽暑略為輕可暑咳者暑熱襲肺而咳逆暑瘵者暑熱劫絡而吐血又有霍亂之證因暑氣夾風寒濕食擾亂於中痧氣之證因南方體弱偶犯沙穢之氣穢濁之證因暑氣夾穢而襲人即俗稱為齷齪也此皆季夏由暑氣所傷之證也更有春末夏初之疰夏孟夏之熱病仲夏之黴濕亦當論治蓋疰夏者因時令之火為病熱病者因冬時之伏氣為病黴濕者入黴之後梅雨淫淋感其雨濕之氣為病斯三者附論於茲則夏令之病皆全備矣傷暑長夏傷暑有陰陽之別焉夫陰暑之為病因於天氣炎蒸納涼於深堂大廈大扇風車得之者是靜而得之之陰證也其脈浮弦有力或浮緊頭痛惡寒身形拘急肢節疼痛而心煩肌膚大熱而無汗此為陰寒所逼使周身陽氣不得伸越宜用辛溫解表法減去防風益以香薷藿香治之嘔逆加茯苓半夏便瀉加厚朴木香又有陽暑之病緣於行旅長途務農田野烈日下逼得之者是動而得之之陽證也其脈浮洪有力或洪數面垢喘咳壯熱心煩口渴欲飲蒸蒸自汗此為炎熱所蒸使周身中外皆熱宜以清涼滌暑法去扁豆通草加石膏洋參治之嘔逆加竹茹黃連便瀉加葛根荷葉更宜審其體實體虛而藥之自無不當耳張介賓曰陰暑證或在於表或在於里惟富貴安逸之人多有之總由恣情任性不慎風寒所致也陽暑證惟辛苦勞役之人多有之由乎觸冒暑熱有勢所不容已也然暑熱逼人者畏而可避可避則犯之者少陰寒襲人者快而莫知莫知則犯之者多故凡有病暑者陽暑多不見而陰暑居其八九今之人治暑者但見發熱頭痛等證則必曰此中暑也而所用無非寒涼其不達也亦甚矣江誠曰介賓先生謂陰暑多於陽暑最為確切今人治暑不別陰陽一見發燒遂投涼藥若此貿貿則害人匪淺矣冒暑冒暑者偶然感冒暑邪較傷暑之證稍為輕淺耳夫暑熱之邪初冒於肌表者即有頭暈寒熱汗出咳嗽等證宜以清涼滌暑法加杏仁蔞殼治之其證雖較傷暑為輕然失治入里此又不可以不知也如入於肉分者則周身煩躁頭脹體燒或身如針刺或有赤腫等證宜以祛暑解毒法治之如入於腸胃者則有腹痛水瀉小便短赤口渴欲飲嘔逆等證宜以增損胃苓法佐黃連治之然冒暑之證雖謂為輕亦必須防微杜漸耳中暑即中暍附暑厥潔古曰靜而得之為中暑東垣曰避暑乘涼得之者名曰中暑其實二說皆是陰暑之證而無中字情形似不可以中暑名之考中暑即系中暍中暍之證可以不必另分蓋中暑忽然而發如矢石之中人也不似傷暑初則寒熱無汗或壯熱蒸汗之可比是病忽然悶倒昏不知人軀熱汗微氣喘不語牙關微緊亦或口開狀若中風但無口眼喎斜之別其脈洪濡或滑而數緣其人不辭勞苦赤日中行酷暑之氣鼓動其痰痰阻心包所致宜清暑開痰法治之如果手足厥冷名曰暑厥宜蘇合香丸化開灌之或以來復丹研末白湯灌之或以蒜水灌之或剝蒜肉入鼻中皆取其通竅也俟其人事稍蘇繼進卻暑調元法為治暑風暑風之病良由暑熱極盛金被火刑木無所畏則風從內而生此與外感風邪之治法相懸霄壤若誤汗之變證百出矣夫木既化乎風而脾土未嘗不受其所制者是以卒然昏倒四肢搐搦內擾神舍志識不清脈多弦勁或洪大或滑數總當去時令之火火去則金自清而木自平兼開鬱悶之痰痰開則神自安而氣自寧也擬用清離定巽法佐以鬱金川貝治之倘有角弓反張牙關緊閉者宜加犀角羚羊痰塞喉間有聲者宜加膽星天竺服藥之後依然昏憒者宜加遠志菖蒲然而證候至此亦難治矣暑溫考暑溫之證較陽暑略為輕可吳淮陰曰溫者熱之漸熱乃溫之極也其名暑溫比暑熱為輕者不待言矣在醫者務宜留心慎藥弗使溫盛成熱耳夫暑溫之初病也右脈勝於左部或洪或數舌苔微白或黃而潤身熱有汗或口渴或咳嗽此邪在上焦氣分當用清涼滌暑法加杏仁蔞殼治之倘汗少而有微寒或有頭痛者宜透肌膚之冒於本法內去扁豆瓜翠加藿香香薷治之如口不渴者乃兼濕也加米仁半夏治之如舌苔黃燥渴欲喜飲宜清胃家之熱用涼解裡熱法治之如舌苔光絳傷於陰也宜用清熱保津法加西洋參北沙參元參治之總當細究其因或夾冒或夾濕或胃熱或陰傷按證而分治之未有不向愈者暑咳暑咳之為病獨在暑月也良由暑熱下逼先傷乎上夫五臟之位惟肺最高為諸臟之華蓋暑熱襲之肺經先病者固無論矣且暑中有火肺體屬金火未有不剋金者也其脈濡滑而數兩寸有力而強咳逆乏痰即有亦少或身熱口渴或胸悶脅痛此皆暑熱入肺之脈證也宜用清宣金臟法加滑石甘草治之如痰多者不因暑而因濕不名咳而名嗽不在肺而在脾不用清而用溫果因痰而致嗽者宜用加味二陳法治之倘不細辨以暑為濕誤用溫藥擾動其絡絡中血沸而成吐血之疴然則宜用卻暑調元法去東參半夏加杏仁花粉旱蓮生地治之大概總宜清暑保金庶不至蔓延虛損耳暑瘵暑瘵者驟然吐血衄血頭目不清煩熱口渴咳嗽氣喘脈象浮取則洪中取則空沉取復有此因盛夏之月相火用事火爍肺金復燃陽絡絡血上溢所致昧者以為癆瘵殊不知火載血上非真陰虧損而為虛癆者比也當清暑熱以保肺清絡熱以止血如初起體實者宜以清宣金臟法加枯芩黑梔治之體弱者宜以卻暑調元法去石膏半夏粳米加鮮地鮮斛鮮藕節治之如未止再加丹皮旱蓮草可也雖非癆瘵之病但失血後有潮熱咳嗽之證小數之脈其陰分不虧亦虧又當以甘鹹養陰法治之倘蹉跎失治傷及真陰遂難療矣霍亂霍亂之證在夏秋為多得之於風寒暑熱飲食生冷之邪雜糅交病於中正不能堪一任邪之揮霍擾亂故令三焦混淆清濁相干亂於腸胃也其證嘔吐瀉利腹中大痛脈多微澀或沉而伏或大而虛其風甚者則頭痛寒熱寒甚者則轉筋厥冷暑甚者則大渴引飲邪在上焦則吐多下焦則瀉多中焦則吐瀉俱甚總宜治亂保安法加減主之風甚加蘇葉橘紅寒甚加草蔻木瓜暑甚加蘆根竹茹吐多加黃連乾薑瀉多加葛根荷葉倘吐瀉不已損傷中焦之氣以致陰陽間隔手足厥冷脈微欲絕不多飲水者無分風寒暑熱急以挽正回陽法救之若欲吐不吐欲瀉不瀉名曰乾霍亂也又名絞腸痧也急用古方炒鹽調童便服之探吐則愈若舌卷筋縮卵陰入腹為難治大率霍亂之脈洪大而滑者生微澀漸遲者死痧氣南方之人體氣不實偶觸糞土沙穢之氣即腹痛悶亂名之曰痧即沙字之訛也蓋痧在皮膚氣分者宜刮之在肌肉血分者宜刺之此輕而淺者言也若深重者脹塞腸胃壅阻經絡直犯乎心斯須莫救刮刺無功非藥劑不能救也須知痧無定脈凡脈與證不應者即為痧脈也其見證不可不分如風痧者頭疼自汗腹痛肢麻暑痧者頭暈汗多吐瀉腹痛陰痧者腹痛肢冷即涼痧也陽痧者腹痛肢暖即熱痧也又有膚隱紅點一如瘄疹此痧在肌表為紅痧也滿身脹痛且有黑斑此痧毒在乎臟腑為烏痧也欲吐不吐欲瀉不瀉心腹大痛為絞腸痧也痧之為病不盡六氣所觸或因飢飽勞役或因穢濁所犯皆可成痧總宜芳香化濁法治之法內有半夏藿香慎勿信俗醫為痧病中之禁藥也風痧加荊芥防風暑痧加滑石木瓜陰痧加豆蔻砂仁陽痧加連翹梔子紅痧加牛蒡薄荷烏痧加檳榔枳殼悶痧加細辛桔梗絞腸痧加檀香烏藥倘其勢急不及進湯藥者先以痧疫回春丹治之穢濁穢濁者即俗稱為齷齪也是證多發於夏秋之間良由天暑下逼地濕上騰暑濕交蒸更兼穢濁之氣交混於內人受之由口鼻而入直犯膜原初起頭痛而脹胸脘痞悶膚熱有汗頻欲噁心右脈滯鈍者是也然有暑濕之分不可以不察也如偏於暑者舌苔黃色口渴心煩為暑穢也偏於濕者苔白而膩口不作渴為濕穢也均宜芳香化濁法治之暑穢加滑石甘草濕穢加神麯茅蒼吾衢見穢濁之證便禁藥餌惟以揪刮當先殊不知禁滋膩呆滯之藥如地歸沙參等味是也芳香氣分之品又何害乎倘執禁藥之說每見其輕證轉重重證轉危誤人性命不可勝數悲哉悲哉疰夏疰夏者每逢春夏之交日長暴暖忽然眩暈頭疼身倦腳軟體熱食少頻欲呵欠心煩自汗是也蓋緣三月屬辰土四月屬巳火五月屬午火火土交旺之候金水未有不衰夫金衰不能制木木動則生內風故有眩暈頭疼金為土之子子虛則盜母氣脾神困頓故有身倦足軟體熱食少又水衰者不能上濟乎心故有頻欲呵欠心煩自汗等證此皆時令之火為患非春夏溫熱之為病也蔓延失治必成癆怯之根宜以金水相生法治之如眩暈甚者加菊花桑葉頭痛甚者加佩蘭荷錢疲倦身熱加潞黨川斛心煩多汗加浮麥蓮子加減得法奏效更捷耳熱病金鑑云經曰冬傷於寒春必病溫至夏為熱病熱病者乃冬傷正令之微寒未即病也倪氏謂交立夏以來久伏之氣隨時令之熱而觸發故初病即發熱汗出口渴心煩不惡寒而反惡熱脈來洪大之象是為熱病也醫通曰邪非外來故但熱而不惡寒熱自內發故口燥渴而多引飲其邪既郁為熱不得復言為寒合而觀之熱病因伏氣者瞭然然較晚發更發於晚比諸溫更伏於深初起之時宜用清涼透邪法熱勢不衰繼用清涼蕩熱法倘有惡寒相兼脈象舉取浮緊是有夏時暴寒所加寒在外而熱在裡先用辛溫解表法以透其外外邪得透再用清涼之劑以蕩其裡熱也設無浮緊之脈又無惡寒之證誤用辛溫之方耗傷津液者宜用清熱保津法加西洋參石膏治之倘或兼之惡風微微汗出脈象舉取浮緩此表有風邪所加風在外而熱在裡當用辛涼解表法先解其外也至於舌苔化燥譫語昏狂急用清涼蕩熱法加紫雪丹治之發斑者加黃連梔子發疹者加荷葉牛蒡須知熱病最易傷陰當刻刻保陰為要辛溫劫液之劑勿浪用也黴濕黴濕之為病在乎五月也芒種之後逢丙入黴黴與梅通其時梅熟黃落乍雨乍晴天之日下逼地之濕上蒸萬物感其氣則黴人感其氣則病以其氣從口鼻而入即犯上中二焦以致胸痞腹悶身熱有汗時欲噁心右脈極鈍之象舌苔白滑以上皆黴濕之濁氣壅遏上中氣分之證非香燥之劑不能破也擬以芳香化濁法俾其氣機開暢則上中之邪不散而自解也倘或連朝風雨人冒之者即患身痛腰疼惡寒發熱此邪由太陽之表而入於少陰之裡即內經所謂雨氣通於腎也宜乎表裡兩解擬以二活同祛法倘兼腹痛泄瀉再加煨葛木香治之或問曰濕土之令始於大暑終於白露今論黴濕在乎芒種之後夏至節中斯時相火司令不論火而論濕得非矛盾乎答曰濕土之令在於夏末秋前蓋按內經六氣之主政也然而土寄於四季之末四時皆有濕病總當因時制宜不必拘於常例即如春日陽和夏日炎熱秋日燥烈冬日溫暖何濕之有惟其春雨瀟瀟夏雨淋淋秋雨霏霏冬雨紛紛人感之者皆為濕病今專論黴濕在乎五月以其乍雨乍晴濕中有熱熱中有濕與諸濕之病頗異故列黴濕為一門擬用諸法辛溫解表法見前清涼滌暑法見前祛暑解毒法治暑毒煩熱赤腫身如針刺茯苓三錢製半夏一錢五分滑石三錢水飛粉甘草五分參葉六分黃連八分銀花三錢連翹三錢去心加綠豆衣三錢煎服凡暑熱成毒者此法最宜苓夏偕甘即海藏消暑方也滑石偕甘即河間清暑方也更佐參葉以卻暑黃連以清心銀翹綠豆以解毒也增損胃苓法治暑濕內襲腹痛水瀉小便熱赤蒼朮一錢米泔炒厚朴一錢薑汁炒廣陳皮一錢五分豬苓一錢五分白茯苓三錢澤瀉一錢五分滑石三錢水飛藿香一錢五分水煎溫服蒼樸陳皮以化濕即平胃散損甘草也二苓澤瀉以利濕即五苓散損桂術也增滑石清暑滲濕增藿香止瀉和中凡因暑濕而致瀉者是法最為拍合耳清暑開痰法治中暑神昏不語身熱汗微氣喘等證黃連一錢二分香薷一錢扁豆衣三錢厚朴一錢薑汁炒杏仁二錢去皮尖研陳皮一錢五分制夏一錢五分益元散三錢入煎加荷葉梗七寸為引汗多除去香薷連薷扁樸清熱祛暑杏仁陳夏順氣開痰益元散清暑寧心荷葉梗透邪宣竅卻暑調元法治暑熱盛極元氣受傷石膏四錢煨滑石三錢飛白茯苓三錢製半夏一錢東洋人參二錢或用西洋人參麥門冬二錢去心粉甘草六分加粳米一撮為引石膏滑石卻暑瀉火為君茯苓半夏消暑調中為臣暑熱刑金故以人參麥冬保肺為佐暑熱傷氣故以甘草粳米調元為使清離定巽法治昏倒抽搐熱極生風之證連翹三錢去心竹葉一錢五分細生地四錢元參三錢甘菊花一錢冬桑葉三錢鉤藤鉤四錢宣木瓜一錢井華水煎服此法治熱極生風之證故用連翹竹葉以清其熱熱甚必傷陰故用細地元參以保其陰菊花桑葉平其木而定肝風鉤藤木瓜舒其筋而寧抽搐大易以離為火以巽為風今曰清離定巽即清火定風之謂也涼解裡熱法見前清熱保津法見前清宣金臟法治熱爍肺金咳逆胸悶身體發熱牛蒡子一錢五分川貝母二錢去心馬兜鈴一錢杏仁二錢去皮尖研陳栝蔞殼三錢桔梗一錢五分冬桑葉三錢加枇杷葉三錢去毛蜜炙為引夏日炎暑火旺剋金宜乎清熱宣氣保其金臟法中蒡貝兜鈴清其肺熱杏蔞桔梗宣其肺氣夫人身之氣肝從左升肺從右降今肺被暑熱所爍而無降氣之能反上逆而為咳矣故佐桑葉以平其肝弗令左升太過杷葉以降其肺俾其右降自然升降如常則咳逆自安謐矣加味二陳法見後甘鹹養陰法治熱傷血絡損及陰分潮熱咳嗽大幹地四錢龜版三錢炙阿膠二錢另燉沖旱蓮草三錢女貞子二錢牡丹皮一錢五分加淡菜三錢井水煎服法中乾地甘寒龜版鹹寒皆養陰之要藥阿膠甘平淡菜鹹溫並治血之佳珍旱蓮甘寒汁黑屬腎女貞甘涼隆冬不凋僉能補益腎陰佐以丹皮之苦清血中之伏火火得平靜則潮熱咳血均愈矣治亂保安法治夏秋之間霍亂吐瀉腹中絞痛廣藿香一錢五分臺烏藥一錢廣木香五分製半夏一錢白茯苓三錢茅蒼朮八分米泔浸炒陽春砂仁八分研沖加伏龍肝三錢水煎服邪擾中州揮霍擾亂宜此法也首用藿香烏木行氣分以治其亂夏苓蒼朮祛暑濕以保其中更佐砂仁和其脾伏龍安其胃此猶兵法剿撫兼施之意也挽正回陽法治中寒腹痛吐瀉肢冷或昏不知人脈微欲絕東洋參三錢米炒白茯苓三錢於潛術一錢土炒粉甘草五分炙安桂八分細銼分沖淡附片八分炮薑炭六分吳茱萸八分泡淡頭服略煎次服濃煎是法即陶節菴回陽救急湯除陳夏五味也蓋以參苓朮草挽其正炮薑桂附回其陽更佐吳茱萸破中下之陰寒陰寒一破有若撥開雲霧而見天與日也芳香化濁法治五月黴濕並治穢濁之氣藿香葉一錢佩蘭葉一錢陳廣皮一錢五分製半夏一錢五分大腹皮一錢酒洗厚朴八分薑汁炒加鮮荷葉三錢為引此法因穢濁黴濕而立也君藿蘭之芳香以化其濁臣陳夏之溫燥以化其濕佐腹皮寬其胸腹厚朴暢其脾胃上中氣機一得寬暢則濕濁不克凝留使荷葉之升清清升則濁自降金水相生法治疰夏眩暈神倦呵欠煩汗及久咳肺腎並虧東洋參三錢麥冬三錢去心五味子三分知母一錢五分元參一錢五分炙甘草五分水煎溫服法內人參補肺麥冬清肺五味斂肺此千金生脈飲也主治熱傷元氣氣短倦怠口渴汗多等證今以此方治疰夏真為合拍加色白之知母以清其肺復清其腎色黑之元參以滋其腎兼滋其肺更以甘草協和諸藥俾金能生水水能潤金之妙耳二活同祛法治表裡受濕寒熱身疼腰痛等證羌活一錢五分防風一錢五分獨活一錢五分細辛五分茅蒼朮一錢五分甘草五分加生薑三片煎服兩感表裡之濕證此法堪施其中羌活防風散太陽之表濕獨活細辛搜少陰之裡濕蒼朮燥濕氣生薑消水氣蓋恐諸藥辛溫苦燥故佐甘草以緩之備用成方藿香正氣散治外感風寒內傷飲食及傷冷傷濕瘧疾中暑霍亂吐瀉凡感嵐障不正之氣並宜增減用之藿香紫蘇白芷桔梗大腹皮厚朴陳皮半夏曲白朮茯苓甘草加薑棗煎服六和湯治夏月飲食不調內傷生冷外傷暑氣寒熱交作霍亂吐瀉及伏暑煩悶等證藿香砂仁杏仁厚朴扁豆木瓜人參白朮茯苓半夏甘草加薑棗煎服縮脾飲清暑氣除煩渴止吐瀉霍亂及暑月酒食所傷扁豆葛根烏梅草果砂仁粉甘草豐按正氣散之白朮六和湯之人參縮脾飲之烏梅凡病初起者如參術之滯烏梅之收不克遽用務宜臨證時增減可也香薷飲治感冒暑氣皮膚蒸熱頭痛肢倦或煩渴或吐瀉香薷製厚朴扁豆本方加黃連名四味香薷飲治同新加香薷飲治暑溫汗不出者香薷厚朴鮮扁豆花銀花連翹水煎稍涼服豐按香薷辛溫香散宜於陰暑而不宜於陽暑也蓋陰暑無汗用香薷以發之陽暑多汗用之能無害乎李時珍曰香薷乃夏月解表之藥猶冬月之用麻黃由是論之其發表之功可見矣今人不別陰陽一概用之則誤甚桂苓甘露飲治中暑受濕引飲過多頭痛煩渴濕熱便秘石膏寒水石滑石甘草白朮茯苓豬苓澤瀉肉桂豐按河間制是方以膏寒滑草清其暑熱佐以五苓利其濕熱如舌苔白者或黃澤者皆可用之稍乾燥者是暑熱將化為火肉桂又當禁用竹葉石膏湯治傷暑發渴脈虛竹葉石膏人參甘草麥冬制夏加粳米生薑水煎溫服人參白虎湯治太陽中暍身熱汗出惡寒足冷脈微口渴人參石膏知母甘草加粳米為引先煮石膏數十沸再投藥米米熟湯成溫服豐按斯二方皆長沙所作人皆知長沙之書專治傷寒誰知其亦治暑乎故豐嘗謂欲治六氣之時邪總當先讀傷寒書而後可六一散治傷寒中暑表裡俱熱煩熱口渴小便不通瀉痢暑瘧霍亂吐瀉滑石六兩水飛甘草一兩為末燈心湯調下此方是河間所作也一名天水散少加辰砂以清心名益元散少加薄荷以清肺名雞蘇散少加青黛以清肝名碧玉散治同三石湯治暑溫蔓延三焦舌滑微黃邪在氣分者生石膏寒水石飛滑石通草杏仁竹茹銀花金汁水煎溫服清營湯治暑溫逼近心包舌赤煩渴不寐譫語舌苔白滑不可與也元參丹參生地麥冬黃連竹葉連翹銀花犀角水煎溫服豐按鞠通先生云溫者熱之漸熱者溫之極也暑溫較暑熱為輕者不述可知此二方乃大寒之劑治暑溫似乎過峻試問治暑熱之病將何寒藥所用耶竊謂治暑熱二方最可治暑溫不若豐之清涼滌暑法為穩來復丹治上盛下虛裡寒外熱及伏暑泄瀉中暍冒暑玄精石硝石硫黃五靈脂青皮陳皮米飲糊丸如桐子大每服三十丸開水送下豐按此丹可備中暑之急介賓玉女煎治水虧火盛六脈浮洪滑大煩熱乾渴失血等證生石膏知母麥冬熟地牛膝水煎服如火盛極者加梔子地骨皮之屬豐按此方以生地易熟地最妥生脈散治熱傷元氣氣短倦怠口渴多汗肺虛而咳人參麥冬五味子水煎服清暑益氣湯治長夏濕熱炎蒸四肢困倦精神減少胸滿氣促身熱心煩口渴惡食自汗身重肢體疼痛小便赤澀大便溏黃而脈虛者人參黃耆白朮炙草麥冬五味子蒼朮神麯青皮陳皮黃柏澤瀉升麻葛根當歸加薑棗煎服豐按千金生脈散治熱傷元氣熱中無濕所以用麥冬以清熱人參以補氣五味以斂氣無濕之證故用甘涼滋臟無害也東垣清暑益氣湯治暑傷元氣暑中有濕所以用柏蒼陳澤等藥於益氣之中有濕之證故佐苦燥通利無害也古人用藥少而不漏多而不亂學者當細玩之漿水散治中暑泄瀉多汗脈弱炮姜附子炙甘草肉桂高良薑醋炒半夏漿水煎去滓冷服醫通曰漿水者乃秫米和曲釀成如醋而淡集解曰泄利漿水澄澈清冷觀此二說全不相合豐每用是方以土漿煎藥無不取效似不必辨其孰是考土漿之功能主治瀉痢入此方中最合拍耳冷香飲子治中暑內夾生冷飲食腹痛瀉痢附子草果橘紅炙草加生薑水煎冷服大順散治冒暑伏熱引飲過多脾胃受濕霍亂吐瀉乾薑肉桂杏仁甘草共為末每服二錢沸湯調服豐按漿水散冷香飲子皆治中暑之泄瀉而用薑附之熱劑其實治暑月之陰寒非治陽暑之證可想而知矣大順散亦然也所以治暑宜分陰陽弗執暑為陽邪之說耳痧疫回春丹治一切痧疫神效蒼朮二兩雄黃七錢飛淨沉香六錢丁香一兩木香一兩鬱金一兩蟾酥四錢麝香一錢共研細末水泛為丸加飛淨硃砂為衣每服五釐開水吞服亦可研末吹鼻豐按此丹治痧極妥無論風暑陰陽紅烏悶絞等痧皆可治之倘能辨者於藥引中變動可也行軍散治霍亂痧疫去一切穢惡西牛黃一錢當門子一錢雄黃八錢飛淨火硝三分蓬砂一錢梅冰一錢飛金二十頁真珠一錢八味各研極細再合擂勻每二三分冷開水下絳雪一名紅靈丹治霍亂吐瀉痧脹時疫等證硃砂一兩雄黃六錢飛飛金五十頁礞石四錢煅牙硝一兩蓬砂六錢當門子三錢梅片三錢共研極細末每一分開水送下豐按此二方皆可援一時之急凡有求名遠處者覓利他方者皆可預藏於篋以備自用或可濟人紫雪治內外煩熱一切火證寒水石石膏滑石磁石硝石朴硝辰砂沉香木香丁香麝香升麻元參羚羊角犀角甘草黃金合成退火氣冷開水調服每一二錢豐按是方藥力峻猛體非強壯證非實火不宜浪用嘗見今之醫者一遇神昏譫語不分虛實遂謂邪入心包隨手用之毫無忌憚倘鄭聲喃喃由心神不足而致者一妄用之禍必旋踵臨證之際當分虛實而施庶無差誤黃龍湯治失下循衣撮空體虛熱盛不下必死大黃厚朴枳實芒硝熟地黃當歸人參照常煎服豐按此方治熱病已成可下之證醫者因其體虛當下失下而成撮空理線循衣摸床等證所以用攻補兼施之方蕩其邪而不傷正補其正而不礙邪誠穩妥之良方今醫畏用何哉臨證治案陰暑誤用陽暑之藥古黔吳某晚餐之後貪涼而睡醒來頭痛畏寒壯熱無汗氣口脈緊舌苔邊白中黃豐曰此陰暑兼食之證也即以藿香正氣散去白朮加香薷治之服一煎未有進退又更一醫遂駁陰暑之謬暑本屬陽何謂為陰見病人身熱如火遂用白虎湯加蘆根連翹等藥初服一帖似得小效繼服一帖即譫語神昏頻欲作嘔舌苔灰黑醫謂邪入心包照前方再加犀角黃連紫雪等品服下全無應驗仍求豐診其脈右勝於左形力並強此邪尚在氣分猶未逆傳心包視其舌苔灰黑而厚依然身熱昏譫嘔逆等證竊思其邪必被寒涼之藥所阻非溫宣透法不克望其轉機當用杏仁薤白豆卷藿香神麯蔻仁香薷橘殼加益元散合為一劑服頭煎熱勢益劇次煎通身有汗則壯熱漸退盡矣來邀復診神未清明譫語仍有舌苔未退更覺焦乾右脈仍強愈按愈實豐曰汗出熱退理當脈靜津回神氣清爽今不然者定有燥結留於腸胃思表邪退盡攻下無妨用黃龍湯以芒硝改元明粉以人參換西洋參服下半日許遂得更衣諸恙忽退繼用蘇土養陰之法日漸全可或問曰彼醫證雖誤治謂暑本屬陽何謂為陰亦似近理其說當有所本也答曰然也即條辨有云暑字從日日豈陰物乎暑中有火火豈陰邪乎殊不知前賢取陰暑二字之義陰陰寒也暑暑月也暑月傷於陰寒故名陰暑曰何不以傷寒名之曰寒乃冬令之氣在暑月不能直指為寒蓋恐後學不明時令先賢之用心亦良苦矣驟然中暑盛夏時豐赴西鄉療病路過石梁村口見一人奄然昏倒於道旁遂停輿出診脈之兩手洪大其為暑熱所中者昭然即以通關散吹鼻似欲噴嚏而不得令輿夫揪之又令入村採蒜取汁頻頻灌之連得噴嚏少焉乃蘇求賜一方遂用六和湯去參朮厚朴加滑石通草囑服三帖數日後登門泥首而去暑風急證城西陳某年近五旬倏然昏倒人事無知手足抽掣一醫作中暑論治雖不中亦不遠矣一醫輒稱中風反駁前醫有誤敢以小續命湯試之更加搐搦身熱大汗迓豐商治診其脈洪大而數牙關緊閉舌不能出但見唇焦齒燥豐曰此暑風證也稱中風之醫亦在座中遂曰子不觀指南醫案常有暑風何得有搐搦之證曰香岩之案謂暑風系暑月所感之風非熱極生風之內風也豐今所謂乃暑熱內燃金被火爍木無所制致發內風之證也理當清其暑熱兼平風木遂用清離定巽法加石膏甘草橘絡扁豆花治之彼醫似為不然病家咸信於豐即使人揀來煎服幸喜法中病機抽搐稍定神識亦省繼服二帖得全愈矣江誠曰今之醫者每見夏月有頭痛發熱而無昏倒肢抽皆批為暑風之證大概亦得香岩之皮毛而未得其骨髓此耳聽之學非神聽之學可知暑溫過服大寒致變西鄉吳某偶患暑溫半月餘矣前醫認證無差惜乎過用寒劑非但邪不能透而反深陷於裡竟致身熱如火四末如冰復邀其診乃云熱厥仍照舊方添入膏知犀角等藥服之益劇始來求治於豐診其左右之脈舉按不應指沉取則滑數豐曰邪已深陷於裡也其兄曰此何證也曰暑溫證也曰前醫亦云是證治之無效何曰暑溫減暑熱一等蓋暑溫之勢緩纏綿而愈遲暑熱之勢暴涼之而愈速前醫小題大作不用清透之方恣用大寒之藥致氣機得寒益閉暑溫之邪陷而不透非其認證不明實系寒涼過度刻下厥冷過乎肘膝舌苔灰黑而膩倘或痰聲一起即有倉扁之巧亦莫如何明知證屬暑溫不宜熱藥今被寒涼所壓寒氣在外在上而暑氣在裡在下暫當以熱藥破其寒涼非治病也乃治藥也得能手足轉溫仍當清涼養陰以收功遂用大順散加附子老蔻服一帖手足漸轉為溫繼服之舌苔仍化為燥通身大熱此寒氣化也暑氣出也當變其法乃用清涼透邪法去淡豉加細地麥冬蟬衣荷葉一日連服二劑周身得汗而熱始退盡矣後擬之法皆養肺胃之陰調治匝月而愈程曦曰學醫知常為易知變為難病有千變而藥亦有千變即如是證過服寒涼熱證未去而寒證又生此病一變也暫用溫熱之劑先破寒涼之氣此藥一變也服之肢體回溫舌苔仍燥此病又一變也即舍熱藥轉用涼劑收功此藥又一變也不知通變之醫反謂朝秦暮楚僥倖圖功耳暑熱劫絡致成暑瘵長洲葉某忽然血湧盈升身熱口渴速來求治於豐抵其寓見幾上有參湯一盞病者即詢可服否豐曰姑診其脈辨其虛實可知按之洪大而來舌苔黃而欠潤此暑熱內劫陽絡之候即經謂陽絡傷血從上溢是也當從暑瘵治之速清暑熱以養其陰參湯勿可服也遂用玉女煎以生地易熟地再加滑石蔞根杏仁桑葉兩日連嘗四劑咳血並止身熱亦退矣陰寒霍亂熱補而瘳施秉羅某之父大耋高年素來矍鑠忽於孟秋之初霍亂吐瀉肢痛肢涼差人來請豐診其脈遲細神識模糊曰此中陰寒之證也急以挽正回陽法治之至日晡腹痛益甚汗出淋漓逆冷益深倏然昏倒大眾驚慌復來邀診診得六脈全無不語如屍呼吸微絕思丹溪有云倉卒中寒病發而暴難分經絡溫補自解忽記其家有真參寶藏速取一錢合野山高麗參五錢淡附片四錢濃煎滲下次煎繼之約一時許忽長嘆一聲漸有呼吸五更時分身體稍溫次日清晨又邀復診按其脈象沉細如絲舌淡無榮苔白而潤四肢轉暖人事亦清吐瀉腹痛僉減今當溫補脾陽兼養心營仍用二參附片加入薑炭耆甘歸神柏棗服下又中病機一候遂全瘥矣陰虛疰夏江蘇張某於麥秋患頭暈目眩食減神疲偶患頭痛一醫作水不涵木治之雖未中機尚稱平穩一醫作風濕侵脾治之服之神氣更疲邀豐診之脈濡且弱毫無外感之形見其呵欠頻頻似屬虧象豐曰此陰虛之體過於煩勞勞傷神氣所致所以前醫滋補無妨後醫宣散有損張曰頭痛非外感乎曰非也外感頭痛痛而不止今痛而暈時作時止是屬內傷曰何證也曰疰夏也當用金水相生法去玄參知母加冬桑葉穭豆衣省頭草治之服至第三劑諸疴皆屏矣熱病化燥傷津芹嶺王某來郡應試忽沾熱病其師知醫以為風食而用羌防楂曲等藥則熱渴更甚譫語發狂邀豐醫治脈形洪數有力舌苔黑燥而厚此屬熱邪化燥津液被劫非鹹苦下法不能攻其熱而保其陰倘畏而不用則津液告匱為難治即以潤下救津法加紫雪五分隨即揀來煎服服後約半日許遂欲更衣乃得燥屎數團狂勢似緩繼進次煎又得燥屎無數神氣覺疲令房中寂靜待其安睡計五六時始醒醒來神識已清身涼微汗舌黑而潤六脈不躁豐曰邪已解也用西洋參麥冬生地玉竹麻仁蔞殼米仁炙草等藥令服三劑而安黴濕時病東鄉劉某來舍就醫面目浮腫肌膚隱黃胸痞脘悶時欲寒熱舌苔黃膩脈來濡緩而滯豐曰此感時令之濕熱也必因連日務農值此入黴之候乍雨乍晴之天濕熱之邪固所不免病者曰然豐用芳香化濁法加白芷茵陳黃芩神麯治之服五帖遂向愈矣
